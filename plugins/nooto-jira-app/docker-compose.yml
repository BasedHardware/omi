services:
  nooto-jira-app:
    build: .
    image: nooto-jira-app:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - coolify

networks:
  coolify:
    external: true
