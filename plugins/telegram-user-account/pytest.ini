[pytest]
# Make `import redact`, `import simple_storage`, `import main` (bare
# names per plugin convention) work in tests. The plugin's
# directory has a hyphen (`telegram-user-account`) which is a
# non-Python identifier, so we put the plugin's directory on
# sys.path directly. The plugins/ parent is needed for
# `plugins._shared` imports.
#
# pythonpath values are resolved relative to the INVOCATION ROOTDIR
# (the directory pytest is invoked from), not the pytest.ini file.
# All paths below are relative to the worktree root, which is
# where CI invokes pytest. For local dev, also invoke from the
# worktree root.
#
# We intentionally do NOT include ../../.. (the parent of the
# worktree) — that would let sibling directories' top-level Python
# modules shadow repo modules and create non-hermetic tests
# (cubic P2 review 4614064929).
pythonpath =
    .
    ./plugins
asyncio_mode = strict
filterwarnings =
    ignore::DeprecationWarning
