[pytest]
# Make `from plugins.telegram_user_account import ...` work in tests.
# `pythonpath` in pytest.ini is interpreted relative to the **invocation
# rootdir** (the directory pytest is invoked from), so we use absolute
# paths here. The worktree root is hardcoded for the dev sandbox; for
# CI, run pytest from the worktree root with PYTHONPATH set to the
# repo root + plugins/.
pythonpath =
    .
    ..
    ../../..
asyncio_mode = strict
filterwarnings =
    ignore::DeprecationWarning
