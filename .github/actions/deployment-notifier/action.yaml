name: Notify Telegram
description: Sends deployment status details to a Telegram.

inputs:
  telegram_bot_token:
    description: Telegram bot token used to send the notification.
    required: true
  telegram_chat_id:
    description: Telegram chat ID that receives the notification.
    required: true
  workflow_name:
    description: Pipeline or workflow name to show in the Telegram message.
    required: true
  environment:
    description: Deployment environment to show in the Telegram message.
    required: true
  branch:
    description: Deployment branch to show in the Telegram message.
    required: true
  tag:
    description: Deployment tag to show in the Telegram message.
    required: true
  actor:
    description: User or actor that triggered the deployment.
    required: true
  status:
    description: Deployment status to show in the Telegram message.
    required: true
  run_id:
    description: GitHub Actions run ID to link to the logs.
    required: true
  job_id:
    description: GitHub Actions job ID to link to the logs.
    required: true

runs:
  using: composite
  steps:
    - name: Set deploy status
      if: always()
      shell: bash
      run: |
        if [ "${{ inputs.status }}" == "success" ]; then
          echo "ICON=✅" >> $GITHUB_ENV
          echo "STATUS=Success" >> $GITHUB_ENV
        else
          echo "ICON=❌" >> $GITHUB_ENV
          echo "STATUS=Failed" >> $GITHUB_ENV
        fi

    - name: Notify Telegram
      if: always()
      shell: bash
      run: |
        WORKFLOW_NAME="${{ inputs.workflow_name }}}"
        ENVIRONMENT="${{ inputs.environment }}}"
        DEPLOY_BRANCH="${{ inputs.branch }}}"
        DEPLOY_TAG="${{ inputs.tag }}}"
        ACTOR="${{ inputs.actor }}}"
        FINISH_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"
        JOB_URL="https://github.com/BasedHardware/omi/actions/runs/${{ inputs.run_id }}/job/${{ inputs.job_id }}"

        # Keep the Telegram body explicit so deployment context stays readable in chat.
        MESSAGE=$(printf '%s\n' \
          "🚀 <b>$WORKFLOW_NAME</b>: $ICON $STATUS" \
          "" \
          "⚡️ <b>Environment:</b> $ENVIRONMENT" \
          "🌿 <b>Branch:</b> $DEPLOY_BRANCH" \
          "🏷️ <b>Tag:</b> $DEPLOY_TAG" \
          "👤 <b>Triggered by:</b> $ACTOR" \
          "🕐 <b>Finished at:</b> $FINISH_TIME" \
          "" \
          "📋 <a href=\"$JOB_URL\">View Logs</a>")

        curl -s -X POST "https://api.telegram.org/bot${{ inputs.telegram_bot_token }}/sendMessage" \
          -d chat_id="${{ inputs.telegram_chat_id }}" \
          -d parse_mode="HTML" \
          --data-urlencode text="$MESSAGE"
