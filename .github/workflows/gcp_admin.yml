name: Deploy Admin Dashboard to Cloud Run

on:
  push:
    branches: ["main", "development"]
    paths:
      - 'web/admin/**'
      - 'config/public-build-*.json'
      - '.github/actions/prepare-public-build/**'
      - '.github/actions/public-build-candidate-promotion/**'
      - '.github/scripts/preflight_public_build_config.py'
      - '.github/scripts/smoke_public_build_browser.py'
  workflow_dispatch:

env:
  SERVICE: omi-admin-dashboard
  REGION: us-central1
  TARGET: admin

concurrency:
  group: deploy-cloud-run-omi-admin-dashboard-${{ github.ref == 'refs/heads/development' && 'development' || github.ref == 'refs/heads/main' && 'prod' || format('nondeploy-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
    environment: ${{ github.ref == 'refs/heads/development' && 'development' || 'prod' }}
    permissions:
      actions: read
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reviewed public build inputs
        id: public-build
        uses: ./.github/actions/prepare-public-build
        with:
          target: admin
          environment: ${{ github.ref == 'refs/heads/development' && 'development' || 'prod' }}

      - name: Compute immutable candidate identity
        id: candidate
        run: |
          short_sha="${GITHUB_SHA::7}"
          revision_suffix="${short_sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "short_sha=${short_sha}"
            echo "revision_suffix=${revision_suffix}"
            echo "revision=${{ env.SERVICE }}-${revision_suffix}"
            echo "tag=public-admin-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "$GITHUB_OUTPUT"

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - run: gcloud auth configure-docker

      - name: Build and push immutable Docker image
        uses: docker/build-push-action@v6
        with:
          context: web/admin
          push: true
          platforms: linux/amd64
          tags: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.candidate.outputs.short_sha }}
          build-args: ${{ steps.public-build.outputs.build_args }}

      - name: Deploy no-traffic candidate revision
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.candidate.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.candidate.outputs.revision_suffix }}
            --tag=${{ steps.candidate.outputs.tag }}
            --memory=2Gi --cpu=1 --timeout=3600
          secrets: |
            FIREBASE_PROJECT_ID=WEB_ADMIN_FIREBASE_PROJECT_ID:latest
            FIREBASE_CLIENT_EMAIL=WEB_ADMIN_FIREBASE_CLIENT_EMAIL:latest
            FIREBASE_PRIVATE_KEY=WEB_ADMIN_FIREBASE_PRIVATE_KEY:latest
            OMI_API_SECRET_KEY=WEB_ADMIN_OMI_API_SECRET_KEY:latest
            TYPESENSE_HOST=WEB_ADMIN_TYPESENSE_HOST:latest
            TYPESENSE_API_KEY=WEB_ADMIN_TYPESENSE_API_KEY:latest
            STRIPE_SECRET_KEY=WEB_ADMIN_STRIPE_SECRET_KEY:latest
            STRIPE_UNLIMITED_MONTHLY_PRICE_ID=WEB_ADMIN_STRIPE_UNLIMITED_MONTHLY_PRICE_ID:latest
            STRIPE_UNLIMITED_ANNUAL_PRICE_ID=WEB_ADMIN_STRIPE_UNLIMITED_ANNUAL_PRICE_ID:latest
            REDIS_HOST=WEB_ADMIN_REDIS_HOST:latest
            REDIS_PORT=WEB_ADMIN_REDIS_PORT:latest
            REDIS_PASSWORD=WEB_ADMIN_REDIS_PASSWORD:latest
            SHIPBOB_API_KEY=WEB_ADMIN_SHIPBOB_API_KEY:latest
            SHOPIFY_STORE=WEB_ADMIN_SHOPIFY_STORE:latest
            SHOPIFY_ACCESS_TOKEN=WEB_ADMIN_SHOPIFY_ACCESS_TOKEN:latest
            MIXPANEL_SECRET=WEB_ADMIN_MIXPANEL_SECRET:latest
            OPENAI_API_KEY=WEB_ADMIN_OPENAI_API_KEY:latest
            POSTHOG_PERSONAL_API_KEY=WEB_ADMIN_POSTHOG_PERSONAL_API_KEY:latest
            POSTHOG_PROJECT_ID=WEB_ADMIN_POSTHOG_PROJECT_ID:latest
            POSTHOG_HOST=WEB_ADMIN_POSTHOG_HOST:latest
            GOAFFPRO_ACCESS_TOKEN=GOAFFPRO_ACCESS_TOKEN:latest
            CRON_SECRET=WEB_ADMIN_CRON_SECRET:latest

      - name: Promote browser-accepted candidate
        uses: ./.github/actions/public-build-candidate-promotion
        with:
          target: admin
          service: ${{ env.SERVICE }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ env.REGION }}
          revision: ${{ steps.candidate.outputs.revision }}
          tag: ${{ steps.candidate.outputs.tag }}
