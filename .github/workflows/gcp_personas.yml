name: Deploy Personas to Cloud RUN

on:
  push:
    branches: [ "main", "development" ]
    paths:
      - 'web/personas-open-source/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'prod'
        type: choice
        options:
          - development
          - prod


env:
  SERVICE: omi-web
  REGION: us-central1

# Serialize writes to the same Cloud Run service while allowing dev and prod to proceed independently.
concurrency:
  group: deploy-cloud-run-omi-web-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref == 'refs/heads/development' && 'development' || github.ref == 'refs/heads/main' && 'prod' || format('nondeploy-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  deploy:
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/development' && 'development') || (github.ref == 'refs/heads/main' && 'prod') }}
    permissions:
      actions: 'read'
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight public build configuration
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/preflight_public_build_config.py \
            --target personas \
            --environment "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/development' && 'development') || 'prod' }}"

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - run: gcloud auth configure-docker
      - name: Build and Push Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DEPLOY_ENV="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/development' && 'development') || 'prod' }}"
          IMAGE_TAG="${DEPLOY_ENV}-${SHORT_SHA}"
          docker build \
            --build-arg "NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg "NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}" \
            --build-arg "NEXT_PUBLIC_MIXPANEL_TOKEN=${{ vars.NEXT_PUBLIC_MIXPANEL_TOKEN }}" \
            --build-arg "NEXT_PUBLIC_EXTRA_PROMPT_RULES=${{ vars.NEXT_PUBLIC_EXTRA_PROMPT_RULES }}" \
            -t "gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}" \
            -f web/personas-open-source/Dockerfile .

          docker push "gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}"
          echo "IMAGE=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:$IMAGE_TAG" >> "$GITHUB_ENV"
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          secrets: |
            RAPIDAPI_KEY=NEXT_PUBLIC_RAPIDAPI_KEY:latest
            RAPIDAPI_HOST=NEXT_PUBLIC_RAPIDAPI_HOST:latest
            LINKEDIN_API_KEY=NEXT_PUBLIC_LINKEDIN_API_KEY:latest
            LINKEDIN_API_HOST=NEXT_PUBLIC_LINKEDIN_API_HOST:latest
            OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest

      # If required, use the Cloud Run url output in later steps
      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
