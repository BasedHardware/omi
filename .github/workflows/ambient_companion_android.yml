name: Ambient Companion Android

on:
  pull_request:
    paths:
      - "companion/android/**"
      - ".github/workflows/ambient_companion_android.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build companion APK
        run: ./app/android/gradlew -p companion/android :app:testDebugUnitTest :app:assembleDebug --no-build-cache
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: omi-ambient-companion-debug
          path: companion/android/app/build/outputs/apk/debug/app-debug.apk
