name: Promote Qualified Desktop Beta

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Qualified v*-macos candidate to promote to beta'
        required: true
      automatic:
        description: 'Automatic newest-candidate promotion from the trusted macOS qualification runner'
        required: false
        default: false
        type: boolean
      qualification_run_id:
        description: 'Successful trusted desktop_qualify_beta.yml run ID containing immutable evidence'
        required: true
        type: string

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: desktop-beta-promotion
  cancel-in-progress: false

jobs:
  promote:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout promotion controls
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Validate automatic beta request
        if: ${{ inputs.automatic }}
        env:
          AUTO_BETA_ENABLED: ${{ vars.DESKTOP_AUTO_BETA_ENABLED }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "${AUTO_BETA_ENABLED,,}" == "false" ]]; then
            echo "Automatic desktop beta promotion is paused by DESKTOP_AUTO_BETA_ENABLED=false." >&2
            exit 1
          fi
          LATEST_TAG=$(git for-each-ref --count=1 --sort=-v:refname --format='%(refname:strip=2)' 'refs/tags/v*-macos')
          if [[ -z "$LATEST_TAG" ]]; then
            echo "Automatic beta promotion requires at least one macOS candidate tag." >&2
            exit 1
          fi
          if [[ "$RELEASE_TAG" != "$LATEST_TAG" ]]; then
            echo "Automatic beta promotion refuses stale tag $RELEASE_TAG; newest is $LATEST_TAG." >&2
            exit 1
          fi
          echo "Automatic beta request targets newest candidate $RELEASE_TAG." >> "$GITHUB_STEP_SUMMARY"

      - name: Download immutable qualification evidence
        uses: actions/download-artifact@v7
        with:
          name: desktop-qualification-evidence-${{ inputs.release_tag }}
          run-id: ${{ inputs.qualification_run_id }}
          github-token: ${{ github.token }}
          path: /tmp/desktop-qualification-evidence

      - name: Download and validate qualified candidate
        id: candidate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
          QUALIFICATION_RUN_ID: ${{ inputs.qualification_run_id }}
        run: |
          set -euo pipefail
          if ! printf '%s\n' "$RELEASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?\+[0-9]+-macos$'; then
            echo "Invalid macOS release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          git fetch --force origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          [[ "$QUALIFICATION_RUN_ID" =~ ^[0-9]+$ ]] || { echo 'qualification_run_id must be numeric' >&2; exit 1; }
          run=$(gh api "repos/$REPO/actions/runs/$QUALIFICATION_RUN_ID")
          test "$(jq -r .conclusion <<<"$run")" = success
          test "$(jq -r .repository.full_name <<<"$run")" = "$REPO"
          test "$(jq -r .head_repository.full_name <<<"$run")" = "$REPO"
          test "$(jq -r .event <<<"$run")" = workflow_dispatch
          test "$(jq -r .path <<<"$run")" = .github/workflows/desktop_qualify_beta.yml
          test "$(jq -r .head_branch <<<"$run")" = main
          test "$(jq -r .name <<<"$run")" = 'Qualify Desktop Beta Candidate'
          test "$(jq -r .head_sha <<<"$run")" = "$TARGET_SHA"
          gh release view "$RELEASE_TAG" --repo "$REPO" \
            --json tagName,body,isDraft,isPrerelease,publishedAt,assets \
            > /tmp/desktop-beta-release.json
          mkdir -p /tmp/desktop-beta-assets
          gh release download "$RELEASE_TAG" --repo "$REPO" \
            --pattern 'Omi.zip' --pattern 'Omi.dmg' --pattern 'omi.dmg' --pattern 'Omi.Beta.zip' --pattern 'omi-beta.dmg' --dir /tmp/desktop-beta-assets

          ZIP_PATH=/tmp/desktop-beta-assets/Omi.zip
          DMG_PATH=$(find /tmp/desktop-beta-assets -maxdepth 1 -type f \( -name Omi.dmg -o -name omi.dmg \) -print -quit)
          test -f "$ZIP_PATH"
          test -n "$DMG_PATH"
          ZIP_SHA=$(sha256sum "$ZIP_PATH" | cut -d' ' -f1)
          DMG_SHA=$(sha256sum "$DMG_PATH" | cut -d' ' -f1)
          BETA_ZIP_SHA=$(sha256sum /tmp/desktop-beta-assets/Omi.Beta.zip | cut -d' ' -f1)
          BETA_DMG_SHA=$(sha256sum /tmp/desktop-beta-assets/omi-beta.dmg | cut -d' ' -f1)

          python3 .github/scripts/prepare-desktop-beta-promotion.py \
            --release-json /tmp/desktop-beta-release.json \
            --release-tag "$RELEASE_TAG" \
            --target-sha "$TARGET_SHA" \
            --zip-sha256 "$ZIP_SHA" \
            --dmg-sha256 "$DMG_SHA" \
            --beta-zip-sha256 "$BETA_ZIP_SHA" \
            --beta-dmg-sha256 "$BETA_DMG_SHA" \
            --qualification-evidence /tmp/desktop-qualification-evidence/qualification-evidence.json \
            --output /tmp/desktop-release-manifest.json

          {
            echo "target_sha=$TARGET_SHA"
            echo "dmg_path=$DMG_PATH"
          } >> "$GITHUB_OUTPUT"

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Promote qualified beta with scoped token
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          BETA_PROMOTION_TOKEN=$(gcloud secrets versions access latest --secret=BETA_PROMOTION_TOKEN --project "$PROJECT_ID")
          jq -n --slurpfile manifest /tmp/desktop-release-manifest.json '{manifest: $manifest[0]}' \
            > /tmp/desktop-qualified-beta-request.json
          curl -fsS \
            -X POST \
            -H "Content-Type: application/json" \
            -H "secret-key: $BETA_PROMOTION_TOKEN" \
            --data-binary @/tmp/desktop-qualified-beta-request.json \
            https://api.omi.me/v2/desktop/channels/promote-qualified-beta \
            > /tmp/desktop-qualified-beta-response.json
          python3 -m json.tool /tmp/desktop-qualified-beta-response.json

      - name: Mark GitHub release live beta
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$REPO" --json body -q .body > /tmp/release-body.md
          python3 .github/scripts/mark-desktop-release-beta.py \
            --input /tmp/release-body.md \
            --output /tmp/release-body-beta.md
          gh release edit "$RELEASE_TAG" --repo "$REPO" \
            --title "Omi Desktop ${RELEASE_TAG#v}" \
            --notes-file /tmp/release-body-beta.md

      - name: Bridge beta for legacy desktop clients
        if: ${{ !inputs.automatic }}
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          SERVICE_URL=$(gcloud run services describe desktop-backend \
            --region us-central1 --project "$PROJECT_ID" --format='value(status.url)')
          RELEASE_SECRET=$(gcloud secrets versions access latest --secret=RELEASE_SECRET --project "$PROJECT_ID")
          python3 - <<'PY' > /tmp/legacy-desktop-release.json
          import json
          manifest = json.load(open('/tmp/desktop-release-manifest.json'))
          print(json.dumps({
              "version": manifest["version"],
              "build_number": manifest["build_number"],
              "download_url": manifest["zip_url"],
              "ed_signature": manifest["ed_signature"],
              "changelog": manifest["changelog"],
              "is_live": True,
              "is_critical": manifest["mandatory"],
              "channel": "beta",
          }))
          PY
          RESPONSE=$(curl -sS -w '\n%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            -H "X-Release-Secret: $RELEASE_SECRET" \
            --data-binary @/tmp/legacy-desktop-release.json \
            "${SERVICE_URL%/}/updates/releases")
          CODE=$(printf '%s\n' "$RESPONSE" | tail -n1)
          if [ "$CODE" != 201 ] && [ "$CODE" != 409 ]; then
            printf '%s\n' "$RESPONSE" >&2
            exit 1
          fi

      - name: Update existing beta download redirect
        env:
          GCS_DESKTOP_UPDATES_BUCKET: ${{ vars.GCS_DESKTOP_UPDATES_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "$GCS_DESKTOP_UPDATES_BUCKET" ]; then
            echo "GCS_DESKTOP_UPDATES_BUCKET not configured; existing static redirect unchanged." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python3 - <<'PY' > /tmp/macos-beta-redirect.json
          import json
          manifest = json.load(open('/tmp/desktop-release-manifest.json'))
          print(json.dumps({
              "channel": "beta",
              "version": manifest["version"],
              "build_number": manifest["build_number"],
              "tag": manifest["release_id"],
              "download_url": manifest["beta_dmg_url"],
              "published_at": manifest["published_at"],
          }, indent=2))
          PY
          python3 - <<'PY' > /tmp/macos-beta-index.html
          import html
          import json
          url = json.load(open('/tmp/desktop-release-manifest.json'))['beta_dmg_url']
          escaped = html.escape(url, quote=True)
          print(f'<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url={escaped}"><a href="{escaped}">Download Omi Beta</a>')
          PY
          python3 -c "import json; print(json.load(open('/tmp/desktop-release-manifest.json'))['beta_dmg_url'])" \
            > /tmp/macos-beta-latest-url.txt
          for file in index.html redirect.json latest-url.txt; do
            gcloud storage cp --cache-control='no-store,max-age=0' \
              "/tmp/macos-beta-${file}" "$GCS_DESKTOP_UPDATES_BUCKET/beta/$file"
          done

      - name: Summarize scoped beta promotion
        run: |
          echo "Promoted ${{ inputs.release_tag }} to qualified beta with the dedicated promotion capability." >> "$GITHUB_STEP_SUMMARY"
