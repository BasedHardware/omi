name: Desktop Backend Rust

on:
  pull_request:
    paths:
      - "desktop/macos/Backend-Rust/**"
      - "desktop/agent-runtime-rust/**"
      - "desktop/Cargo.toml"
      - "desktop/Cargo.lock"
      - ".github/workflows/desktop-backend-rust.yml"
  push:
    branches:
      - main
    paths:
      - "desktop/macos/Backend-Rust/**"
      - "desktop/agent-runtime-rust/**"
      - "desktop/Cargo.toml"
      - "desktop/Cargo.lock"
      - ".github/workflows/desktop-backend-rust.yml"

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Clippy
        run: cargo clippy -p omi-desktop-backend -p omi-agent-runtime -- -D warnings

      - name: Test
        run: cargo test --locked -p omi-desktop-backend -p omi-agent-runtime
