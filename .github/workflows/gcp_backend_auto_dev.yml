name: Auto Deploy Backend to Development

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'

env:
  SERVICE: backend
  REGION: us-central1

jobs:
  deploy:
    environment: development
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest-m
    steps:
      # To workaround "no space left on device" issue of GitHub-hosted runner
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to GCR
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: image-tag
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "revision_suffix=${GITHUB_SHA::7}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:latest
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          cache-from: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache
          cache-to: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache,mode=max

      - name: Deploy ${{ env.SERVICE }} to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            --network=omi-dev-vpc-1
            --subnet=omi-us-central1-dev-vpc-1-subnet-1
            --vpc-egress=private-ranges-only
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ vars.RUNTIME_GCP_PROJECT_ID }}
            OMI_LLM_GATEWAY_URL=http://172.16.63.232
            MEMORY_MODE=${{ vars.MEMORY_MODE }}
            MEMORY_ENABLED_USERS=${{ vars.MEMORY_ENABLED_USERS }}
            MEMORY_V3_GET_ENABLED=${{ vars.MEMORY_V3_GET_ENABLED }}
            MEMORY_CANONICAL_PROMOTION_CRON_ENABLED=${{ vars.MEMORY_CANONICAL_PROMOTION_CRON_ENABLED }}
            MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED=${{ vars.MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED }}
          secrets: |
            SERVICE_ACCOUNT_JSON=SERVICE_ACCOUNT_JSON:latest
            ENCRYPTION_SECRET=ENCRYPTION_SECRET:latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN=OMI_LLM_GATEWAY_SERVICE_TOKEN:latest

      - name: Capture ${{ env.SERVICE }} revision
        id: capture-backend-revision
        run: |
          echo "revision=backend-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ env.SERVICE }}-sync to Cloud Run
        id: deploy-backend-sync
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}-sync
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            --network=omi-dev-vpc-1
            --subnet=omi-us-central1-dev-vpc-1-subnet-1
            --vpc-egress=private-ranges-only
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ vars.RUNTIME_GCP_PROJECT_ID }}
            OMI_LLM_GATEWAY_URL=http://172.16.63.232
            MEMORY_MODE=${{ vars.MEMORY_MODE }}
            MEMORY_ENABLED_USERS=${{ vars.MEMORY_ENABLED_USERS }}
            MEMORY_V3_GET_ENABLED=${{ vars.MEMORY_V3_GET_ENABLED }}
            MEMORY_CANONICAL_PROMOTION_CRON_ENABLED=${{ vars.MEMORY_CANONICAL_PROMOTION_CRON_ENABLED }}
            MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED=${{ vars.MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED }}
          secrets: |
            SERVICE_ACCOUNT_JSON=SERVICE_ACCOUNT_JSON:latest
            ENCRYPTION_SECRET=ENCRYPTION_SECRET:latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN=OMI_LLM_GATEWAY_SERVICE_TOKEN:latest

      - name: Capture ${{ env.SERVICE }}-sync revision
        id: capture-backend-sync-revision
        run: |
          echo "revision=backend-sync-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy backend-secrets to GKE
        env:
          BACKEND_SECRETS_GSA: ${{ vars.BACKEND_SECRETS_GSA }}
        run: |
          if [[ -n "${BACKEND_SECRETS_GSA}" ]]; then
            gsa_name="${BACKEND_SECRETS_GSA}"
          else
            gsa_name="${{ vars.ENV }}-omi-backend-eso-gsa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
          fi
          helm -n ${{ vars.ENV }}-omi-backend upgrade --install \
            ${{ vars.ENV }}-omi-backend-secrets \
            ./backend/charts/backend-secrets \
            -f ./backend/charts/backend-secrets/${{ vars.ENV }}_omi_backend_secrets_values.yaml \
            --set gke.projectID=${{ vars.GCP_PROJECT_ID }} \
            --set gke.clusterLocation=${{ env.REGION }} \
            --set gke.clusterName=${{ vars.GKE_CLUSTER }} \
            --set gsa.name="${gsa_name}"
          kubectl -n ${{ vars.ENV }}-omi-backend annotate externalsecret \
            ${{ vars.ENV }}-omi-backend-external-secret \
            force-sync="$(date +%s)" --overwrite
          sleep 10

      - name: Deploy ${{ env.SERVICE }}-listen to GKE
        run: |
          helm -n ${{ vars.ENV }}-omi-backend upgrade --install \
            ${{ vars.ENV }}-omi-backend-listen \
            ./backend/charts/backend-listen \
            -f ./backend/charts/backend-listen/${{ vars.ENV }}_omi_backend_listen_values.yaml \
            --set image.repository=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }} \
            --set gcpProjectId=${{ vars.GCP_PROJECT_ID }} \
            --set runtimeGcpProjectId=${{ vars.RUNTIME_GCP_PROJECT_ID }} \
            --set image.tag=${{ steps.image-tag.outputs.short_sha }}
          kubectl -n ${{ vars.ENV }}-omi-backend rollout status deploy/${{ vars.ENV }}-omi-backend-listen --timeout=300s

      - name: Deploy ${{ env.SERVICE }}-integration to Cloud Run
        id: deploy-backend-integration
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}-integration
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            --network=omi-dev-vpc-1
            --subnet=omi-us-central1-dev-vpc-1-subnet-1
            --vpc-egress=private-ranges-only
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ vars.RUNTIME_GCP_PROJECT_ID }}
            OMI_LLM_GATEWAY_URL=http://172.16.63.232
            MEMORY_MODE=${{ vars.MEMORY_MODE }}
            MEMORY_ENABLED_USERS=${{ vars.MEMORY_ENABLED_USERS }}
            MEMORY_V3_GET_ENABLED=${{ vars.MEMORY_V3_GET_ENABLED }}
            MEMORY_CANONICAL_PROMOTION_CRON_ENABLED=${{ vars.MEMORY_CANONICAL_PROMOTION_CRON_ENABLED }}
            MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED=${{ vars.MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED }}
          secrets: |
            SERVICE_ACCOUNT_JSON=SERVICE_ACCOUNT_JSON:latest
            ENCRYPTION_SECRET=ENCRYPTION_SECRET:latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN=OMI_LLM_GATEWAY_SERVICE_TOKEN:latest

      - name: Capture ${{ env.SERVICE }}-integration revision
        id: capture-backend-integration-revision
        run: |
          echo "revision=backend-integration-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Validate backend runtime env
        run: |
          python3 -m pip install -q pyyaml
          python3 backend/scripts/validate-backend-runtime-env.py --env dev --check-workflows --check-live-cloud-run

      - name: Verify validated revisions are still current
        run: |
          test "$(gcloud run services describe backend --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-revision.outputs.revision }}"
          test "$(gcloud run services describe backend-sync --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-sync-revision.outputs.revision }}"
          test "$(gcloud run services describe backend-integration --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-integration-revision.outputs.revision }}"

      - name: Shift Cloud Run traffic to validated revisions
        run: |
          gcloud run services update-traffic backend --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-revision.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-sync --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-sync-revision.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-integration --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-integration-revision.outputs.revision }}=100 --quiet

      - name: Show Output
        run: echo "Backend deployed to development environment"
