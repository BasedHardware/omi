name: Deploy Backend to Cloud RUN

on:
#  push:
#    branches: [ "main" ]
#    paths:
#      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'
      release_version:
        description: 'Release version (optional)'
        required: false
        default: ''
      mode:
        description: 'Workflow mode'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - repair-traffic-only
      deploy_targets:
        description: 'Deploy all backend surfaces or Cloud Run only'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cloud-run-only

env:
  SERVICE: backend
  REGION: us-central1

jobs:
  repair-traffic:
    if: ${{ github.event.inputs.mode == 'repair-traffic-only' }}
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest-m
    steps:
      - name: Validate Environment Input
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "development" && "${{ github.event.inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ github.event.inputs.environment }}. Must be 'development' or 'prod'."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Restore Cloud Run traffic spec to currently serving revisions
        run: |
          python3 backend/scripts/repair_cloud_run_traffic.py \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --repair

      - name: Cloud Run deploy status report
        if: always()
        run: |
          python3 backend/scripts/deploy_status_report.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --include-cloud-run \
            --cloud-run-service backend \
            --cloud-run-service backend-sync \
            --cloud-run-service backend-integration || true

  deploy:
    if: ${{ github.event.inputs.mode == 'deploy' }}
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest-m
    steps:
      - name: Validate Environment Input
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "development" && "${{ github.event.inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ github.event.inputs.environment }}. Must be 'development' or 'prod'."
            exit 1
          fi
          if [[ "${{ github.event.inputs.deploy_targets }}" != "all" && "${{ github.event.inputs.deploy_targets }}" != "cloud-run-only" ]]; then
            echo "Invalid deploy_targets: ${{ github.event.inputs.deploy_targets }}. Must be 'all' or 'cloud-run-only'."
            exit 1
          fi

      # To workaround "no space left on device" issue of GitHub-hosted runner
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to GCR
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: image-tag
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "revision_suffix=${GITHUB_SHA::7}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Install Python deps for deploy scripts
        run: python3 -m pip install -q pyyaml

      - name: Render backend runtime env
        id: runtime-env
        env:
          CLOUD_RUN_VPC_NETWORK: ${{ vars.CLOUD_RUN_VPC_NETWORK }}
          CLOUD_RUN_VPC_SUBNET: ${{ vars.CLOUD_RUN_VPC_SUBNET }}
          OMI_LLM_GATEWAY_URL: ${{ vars.OMI_LLM_GATEWAY_URL }}
        run: |
          python3 backend/scripts/render_backend_runtime_env.py --env ${{ vars.ENV }} >> "$GITHUB_OUTPUT"

      - name: Preflight Cloud Run deploy
        run: |
          PREFLIGHT_ARGS=(
            --env ${{ vars.ENV }}
            --project ${{ vars.GCP_PROJECT_ID }}
            --region ${{ env.REGION }}
            --check-secrets
            --check-traffic
          )
          if [[ "${{ github.event.inputs.environment }}" == "prod" || "${{ github.event.inputs.environment }}" == "development" ]]; then
            PREFLIGHT_ARGS+=(--repair-traffic)
          fi
          python3 backend/scripts/preflight-cloud-run-deploy.py "${PREFLIGHT_ARGS[@]}"

      - name: Validate backend runtime env before deploy
        run: |
          python3 backend/scripts/validate-backend-runtime-env.py --env ${{ vars.ENV }} --check-workflows --check-rendered-cloud-run

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:latest
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          cache-from: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache
          cache-to: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache,mode=max

      - name: Deploy ${{ env.SERVICE }} to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: ${{ steps.runtime-env.outputs.backend_env_vars }}
          secrets: ${{ steps.runtime-env.outputs.backend_secrets }}

      - name: Capture ${{ env.SERVICE }} revision
        id: capture-backend-revision
        run: |
          echo "revision=backend-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Resolve backfill service URL
        id: backfill-service
        run: |
          PROJECT_NUMBER="$(gcloud projects describe "${{ vars.GCP_PROJECT_ID }}" --format='value(projectNumber)')"
          echo "url=https://${{ env.SERVICE }}-sync-backfill-${PROJECT_NUMBER}.${{ env.REGION }}.run.app" >> "$GITHUB_OUTPUT"

      - name: Clone complete backend-sync runtime contract for backfill worker
        id: backfill-runtime
        env:
          ENV_OVERLAY: |-
            ${{ steps.runtime-env.outputs.backend_sync_backfill_env_vars }}
            SYNC_TASKS_QUEUE=sync-backfill
            SYNC_TASKS_HANDLER_URL=${{ steps.backfill-service.outputs.url }}/v2/sync-jobs/run
            SYNC_TASKS_OIDC_AUDIENCE=${{ steps.backfill-service.outputs.url }}/v2/sync-jobs/run
          SECRET_OVERLAY: ${{ steps.runtime-env.outputs.backend_sync_backfill_secrets }}
        run: |
          gcloud run services describe backend-sync \
            --region=${{ env.REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --format=json > /tmp/backend-sync-live.json
          python3 backend/scripts/render_cloud_run_clone_env.py \
            --source-json /tmp/backend-sync-live.json >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ env.SERVICE }}-sync-backfill to Cloud Run
        id: deploy-backend-sync-backfill
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}-sync-backfill
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            --min-instances=0
            --max-instances=4
            --concurrency=1
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: ${{ steps.backfill-runtime.outputs.env_vars }}
          secrets: ${{ steps.backfill-runtime.outputs.secrets }}

      - name: Capture ${{ env.SERVICE }}-sync-backfill revision
        id: capture-backend-sync-backfill-revision
        run: |
          echo "revision=backend-sync-backfill-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ env.SERVICE }}-sync to Cloud Run
        id: deploy-backend-sync
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}-sync
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: |-
            ${{ steps.runtime-env.outputs.backend_sync_env_vars }}
            SYNC_BACKFILL_TASKS_QUEUE=sync-backfill
            SYNC_BACKFILL_TASKS_HANDLER_URL=${{ steps.backfill-service.outputs.url }}/v2/sync-jobs/run
            SYNC_BACKFILL_TASKS_OIDC_AUDIENCE=${{ steps.backfill-service.outputs.url }}/v2/sync-jobs/run
          secrets: ${{ steps.runtime-env.outputs.backend_sync_secrets }}

      - name: Capture ${{ env.SERVICE }}-sync revision
        id: capture-backend-sync-revision
        run: |
          echo "revision=backend-sync-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Configure bounded sync backfill queue
        run: |
          INVOKER_SA="$(
            gcloud run services describe backend-sync \
              --region=${{ env.REGION }} \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --format=json \
              | jq -r '.spec.template.spec.containers[0].env[] | select(.name == "SYNC_TASKS_INVOKER_SA") | .value'
          )"
          test -n "$INVOKER_SA"
          gcloud run services add-iam-policy-binding backend-sync-backfill \
            --region=${{ env.REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --member="serviceAccount:${INVOKER_SA}" \
            --role=roles/run.invoker \
            --quiet
          if gcloud tasks queues describe sync-backfill --location=${{ env.REGION }} --project=${{ vars.GCP_PROJECT_ID }} >/dev/null 2>&1; then
            gcloud tasks queues update sync-backfill \
              --location=${{ env.REGION }} \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --max-concurrent-dispatches=4
          else
            gcloud tasks queues create sync-backfill \
              --location=${{ env.REGION }} \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --max-concurrent-dispatches=4
          fi

      - name: Provision and verify sync ledger TTL
        run: |
          gcloud firestore fields ttls update expires_at \
            --collection-group=sync_content_ledger \
            --database='(default)' \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --enable-ttl \
            --quiet
          gcloud firestore fields ttls list \
            --collection-group=sync_content_ledger \
            --database='(default)' \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --format='value(name)' | grep '/fields/expires_at$'

      - name: Provision routed backfill budget alerts
        if: ${{ github.event.inputs.environment == 'prod' }}
        env:
          ALERT_CHANNELS: ${{ vars.SYNC_BACKFILL_ALERT_NOTIFICATION_CHANNELS }}
        run: |
          test -n "$ALERT_CHANNELS"
          for THRESHOLD in 70 90; do
            METRIC="sync_backfill_budget_${THRESHOLD}"
            DISPLAY_NAME="Sync backfill daily budget ${THRESHOLD}%"
            LOG_FILTER="resource.type=\"cloud_run_revision\" resource.labels.service_name=\"backend-sync-backfill\" \"sync_backfill_budget_threshold threshold=${THRESHOLD}\""
            if gcloud logging metrics describe "$METRIC" --project=${{ vars.GCP_PROJECT_ID }} >/dev/null 2>&1; then
              gcloud logging metrics update "$METRIC" \
                --project=${{ vars.GCP_PROJECT_ID }} \
                --description="$DISPLAY_NAME threshold crossing" \
                --log-filter="$LOG_FILTER"
            else
              gcloud logging metrics create "$METRIC" \
                --project=${{ vars.GCP_PROJECT_ID }} \
                --description="$DISPLAY_NAME threshold crossing" \
                --log-filter="$LOG_FILTER"
            fi

            POLICY="$(
              gcloud monitoring policies list \
                --project=${{ vars.GCP_PROJECT_ID }} \
                --filter="displayName=\"${DISPLAY_NAME}\"" \
                --format='value(name)' \
                --limit=1
            )"
            if [[ -z "$POLICY" ]]; then
              POLICY="$(
                gcloud monitoring policies create \
                  --project=${{ vars.GCP_PROJECT_ID }} \
                  --display-name="$DISPLAY_NAME" \
                  --condition-display-name="$DISPLAY_NAME" \
                  --condition-filter="metric.type=\"logging.googleapis.com/user/${METRIC}\" AND resource.type=\"cloud_run_revision\"" \
                  --duration=0s \
                  --if='> 0' \
                  --trigger-count=1 \
                  --combiner=OR \
                  --notification-channels="$ALERT_CHANNELS" \
                  --documentation="Backfill has crossed ${THRESHOLD}% of the 555-hour UTC-day allowance." \
                  --format='value(name)'
              )"
            fi
            test -n "$POLICY"
            gcloud monitoring policies describe "$POLICY" \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --format='value(notificationChannels)' | grep -q .
          done

      - name: Get GKE credentials
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Helm
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        uses: azure/setup-helm@v3

      - name: Deploy backend-secrets to GKE using Helm
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        env:
          BACKEND_SECRETS_GSA: ${{ vars.BACKEND_SECRETS_GSA }}
          ENVIRONMENT: ${{ vars.ENV }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          REGION: ${{ env.REGION }}
        run: backend/scripts/deploy-backend-secrets.sh

      - name: Deploy ${{ env.SERVICE }}-listen to GKE using Helm
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        run: |
          helm -n ${{ vars.ENV }}-omi-backend upgrade --install ${{ vars.ENV }}-omi-backend-listen ./backend/charts/backend-listen \
            -f ./backend/charts/backend-listen/${{ vars.ENV }}_omi_backend_listen_values.yaml \
            --set image.repository=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }} \
            --set gcpProjectId=${{ vars.GCP_PROJECT_ID }} \
            --set runtimeGcpProjectId=${{ vars.RUNTIME_GCP_PROJECT_ID }} \
            --set image.tag=${{ steps.image-tag.outputs.short_sha }}
          if ! kubectl -n ${{ vars.ENV }}-omi-backend rollout status deploy/${{ vars.ENV }}-omi-backend-listen --timeout=300s; then
            python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service backend-listen || true
            exit 1
          fi
          python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service backend-listen

      - name: Deploy ${{ env.SERVICE }}-integration to Cloud Run
        id: deploy-backend-integration
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}-integration
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: ${{ steps.runtime-env.outputs.backend_integration_env_vars }}
          secrets: ${{ steps.runtime-env.outputs.backend_integration_secrets }}

      - name: Capture ${{ env.SERVICE }}-integration revision
        id: capture-backend-integration-revision
        run: |
          echo "revision=backend-integration-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Wait for Cloud Run revisions to become ready
        run: |
          python3 backend/scripts/preflight-cloud-run-deploy.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --wait-revision-ready backend=${{ steps.capture-backend-revision.outputs.revision }} \
            --wait-revision-ready backend-sync=${{ steps.capture-backend-sync-revision.outputs.revision }} \
            --wait-revision-ready backend-sync-backfill=${{ steps.capture-backend-sync-backfill-revision.outputs.revision }} \
            --wait-revision-ready backend-integration=${{ steps.capture-backend-integration-revision.outputs.revision }}

      - name: Validate backend runtime env after deploy
        run: |
          python3 backend/scripts/validate-backend-runtime-env.py --env ${{ vars.ENV }} --check-workflows --check-live-cloud-run

      - name: Verify validated revisions are still current
        run: |
          test "$(gcloud run services describe backend --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-revision.outputs.revision }}"
          test "$(gcloud run services describe backend-sync --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-sync-revision.outputs.revision }}"
          test "$(gcloud run services describe backend-sync-backfill --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-sync-backfill-revision.outputs.revision }}"
          test "$(gcloud run services describe backend-integration --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-integration-revision.outputs.revision }}"

      - name: Shift Cloud Run traffic to validated revisions
        run: |
          gcloud run services update-traffic backend --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-revision.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-sync --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-sync-revision.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-sync-backfill --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-sync-backfill-revision.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-integration --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-integration-revision.outputs.revision }}=100 --quiet

      - name: Cloud Run deploy status report
        if: always()
        run: |
          set -o pipefail
          python3 backend/scripts/deploy_status_report.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --include-cloud-run \
            --cloud-run-service backend \
            --cloud-run-service backend-sync \
            --cloud-run-service backend-sync-backfill \
            --cloud-run-service backend-integration \
            --expect-cloud-run-traffic backend=${{ steps.capture-backend-revision.outputs.revision }} \
            --expect-cloud-run-traffic backend-sync=${{ steps.capture-backend-sync-revision.outputs.revision }} \
            --expect-cloud-run-traffic backend-sync-backfill=${{ steps.capture-backend-sync-backfill-revision.outputs.revision }} \
            --expect-cloud-run-traffic backend-integration=${{ steps.capture-backend-integration-revision.outputs.revision }} \
            | tee /tmp/cloud-run-deploy-status.txt
          if [[ "${{ github.event.inputs.environment }}" == "prod" ]]; then
            {
              echo ""
              echo "### Cloud Run rollout status"
              echo ""
              echo '```text'
              cat /tmp/cloud-run-deploy-status.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # If required, use the Cloud Run url output in later steps
      - name: Show Output
        run: echo ${{ steps.deploy-backend.outputs.url }}

      - name: Generate deployment summary
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-summary
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          service: ${{ env.SERVICE }}

      - name: Notify deployment status on Telegram
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-notifier
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
