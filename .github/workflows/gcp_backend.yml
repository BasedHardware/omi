name: Deploy Backend to Cloud RUN

on:
#  push:
#    branches: [ "main" ]
#    paths:
#      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'
      release_version:
        description: 'Release version (optional)'
        required: false
        default: ''
      mode:
        description: 'Workflow mode'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - resume-cloud-run
          - repair-traffic-only
      deploy_targets:
        description: 'Deploy all backend surfaces or Cloud Run only'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cloud-run-only
      source_sha:
        description: 'Approved 40-character source SHA (resume-cloud-run only)'
        required: false
        default: ''
      candidate_suffix:
        description: 'Existing Cloud Run candidate suffix (resume-cloud-run only)'
        required: false
        default: ''
      expected_revision_digest:
        description: 'Immutable Cloud Run platform child digest (resume-cloud-run only)'
        required: false
        default: ''
      confirm:
        description: 'Type resume-cloud-run-prod to authorize the bounded production resume'
        required: false
        default: ''

env:
  SERVICE: backend
  REGION: us-central1

concurrency:
  group: backend-deploy-${{ github.event.inputs.environment || 'development' }}
  cancel-in-progress: false

jobs:
  repair-traffic:
    if: ${{ github.event.inputs.mode == 'repair-traffic-only' }}
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest-m
    steps:
      - name: Validate Environment Input
        env:
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "development" && "${{ github.event.inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ github.event.inputs.environment }}. Must be 'development' or 'prod'."
            exit 1
          fi
          if [[ "$INPUT_BRANCH" != "$GITHUB_REF_NAME" ]]; then
            echo "branch input must match the dispatched ref: input=$INPUT_BRANCH ref=$GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Restore Cloud Run traffic spec to currently serving revisions
        run: |
          python3 backend/scripts/repair_cloud_run_traffic.py \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --repair

      - name: Cloud Run deploy status report
        if: always()
        run: |
          python3 backend/scripts/deploy_status_report.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --include-cloud-run \
            --cloud-run-service backend \
            --cloud-run-service backend-sync \
            --cloud-run-service backend-sync-backfill \
            --cloud-run-service backend-integration || true

  resume-cloud-run:
    if: ${{ github.event.inputs.mode == 'resume-cloud-run' }}
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest-m
    steps:
      - name: Validate bounded resume inputs
        id: resume-inputs
        env:
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
          INPUT_TARGETS: ${{ github.event.inputs.deploy_targets }}
          SOURCE_SHA: ${{ github.event.inputs.source_sha }}
          CANDIDATE_SUFFIX: ${{ github.event.inputs.candidate_suffix }}
          EXPECTED_DIGEST: ${{ github.event.inputs.expected_revision_digest }}
          CONFIRM: ${{ github.event.inputs.confirm }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          ENV: ${{ vars.ENV }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          RUNTIME_GCP_PROJECT_ID: ${{ vars.RUNTIME_GCP_PROJECT_ID }}
          CONTROL_PLANE_URL: ${{ vars.CONTROL_PLANE_URL }}
        run: |
          if [[ "$INPUT_ENVIRONMENT" != "prod" ]]; then
            echo "resume-cloud-run is production-only" >&2
            exit 1
          fi
          if [[ "$INPUT_TARGETS" != "cloud-run-only" ]]; then
            echo "resume-cloud-run requires deploy_targets=cloud-run-only" >&2
            exit 1
          fi
          if [[ "$INPUT_BRANCH" != "$GITHUB_REF_NAME" ]]; then
            echo "branch input must match the dispatched ref: input=$INPUT_BRANCH ref=$GITHUB_REF_NAME" >&2
            exit 1
          fi
          if [[ "$CONFIRM" != "resume-cloud-run-prod" ]]; then
            echo "confirm must be resume-cloud-run-prod" >&2
            exit 1
          fi
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_sha must be exactly 40 lowercase hexadecimal characters" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "expected_revision_digest must be an immutable sha256 child digest" >&2
            exit 1
          fi
          if [[ ! "$CANDIDATE_SUFFIX" =~ ^[a-z0-9-]+$ || "$CANDIDATE_SUFFIX" != "${SOURCE_SHA::7}-"* ]]; then
            echo "candidate_suffix must begin with the approved source short SHA" >&2
            exit 1
          fi
          if [[ "$GCP_PROJECT_ID" != "based-hardware" ]]; then
            echo "GCP_PROJECT_ID must be exactly based-hardware for production resume" >&2
            exit 1
          fi
          if [[ "$ENV" != "prod" ]]; then
            echo "ENV must be exactly prod for production resume" >&2
            exit 1
          fi
          if [[ "$GKE_CLUSTER" != "prod-omi-gke" ]]; then
            echo "GKE_CLUSTER must be exactly prod-omi-gke for production resume" >&2
            exit 1
          fi
          if [[ "$RUNTIME_GCP_PROJECT_ID" != "based-hardware" ]]; then
            echo "RUNTIME_GCP_PROJECT_ID must be exactly based-hardware for production resume" >&2
            exit 1
          fi
          if [[ "$CONTROL_PLANE_URL" != "https://api.omi.me" ]]; then
            echo "CONTROL_PLANE_URL must be exactly https://api.omi.me for production resume" >&2
            exit 1
          fi
          echo "short_sha=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout exact workflow snapshot
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Python deps for deploy scripts
        run: python3 -m pip install -q pyyaml

      - name: Render backend runtime env
        id: runtime-env
        env:
          CLOUD_RUN_VPC_NETWORK: ${{ vars.CLOUD_RUN_VPC_NETWORK }}
          CLOUD_RUN_VPC_SUBNET: ${{ vars.CLOUD_RUN_VPC_SUBNET }}
          OMI_LLM_GATEWAY_URL: ${{ vars.OMI_LLM_GATEWAY_URL }}
        run: |
          python3 backend/scripts/render_backend_runtime_env.py --env ${{ vars.ENV }} >> "$GITHUB_OUTPUT"

      - name: Validate rendered backend runtime contract
        run: |
          python3 backend/scripts/validate-backend-runtime-env.py --env ${{ vars.ENV }} --check-workflows --check-rendered-cloud-run

      - name: Read-only Cloud Run resume preflight
        run: |
          python3 backend/scripts/preflight-cloud-run-deploy.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --check-secrets \
            --check-traffic

      - name: Get GKE credentials for read-only gate
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Require stable backend-listen before Cloud Run resume
        run: |
          python3 backend/scripts/resume_cloud_run_deploy.py gke-gate \
            --namespace=${{ vars.ENV }}-omi-backend \
            --deployment=${{ vars.ENV }}-omi-backend-listen \
            --hpa=${{ vars.ENV }}-omi-backend-listen \
            --expected-image=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.resume-inputs.outputs.short_sha }} \
            --expected-runtime-project=${{ vars.RUNTIME_GCP_PROJECT_ID }} \
            --dwell-seconds=120 \
            --poll-interval-seconds=15 \
            --timeout-seconds=900

      - name: Verify existing Cloud Run candidates before mutation
        run: |
          python3 backend/scripts/resume_cloud_run_deploy.py verify-existing \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --source-sha=${{ github.event.inputs.source_sha }} \
            --expected-digest=${{ github.event.inputs.expected_revision_digest }} \
            --candidate=backend-sync-backfill=backend-sync-backfill-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend-sync=backend-sync-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend=backend-${{ github.event.inputs.candidate_suffix }}

      - name: Plan backend-integration candidate
        id: integration-plan
        env:
          INTEGRATION_REVISION: backend-integration-${{ github.event.inputs.candidate_suffix }}
        run: |
          ACTION="$(python3 backend/scripts/resume_cloud_run_deploy.py integration-plan \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --source-sha=${{ github.event.inputs.source_sha }} \
            --expected-digest=${{ github.event.inputs.expected_revision_digest }} \
            --service=backend-integration \
            --revision="$INTEGRATION_REVISION")"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

      - name: Create missing backend-integration candidate from pinned digest
        if: steps.integration-plan.outputs.action == 'create'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: backend-integration
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}@${{ github.event.inputs.expected_revision_digest }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ github.event.inputs.candidate_suffix }}
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: ${{ steps.runtime-env.outputs.backend_integration_env_vars }}
          secrets: ${{ steps.runtime-env.outputs.backend_integration_secrets }}
          labels: release-source-sha=${{ github.event.inputs.source_sha }}

      - name: Wait for all exact Cloud Run candidates
        run: |
          python3 backend/scripts/preflight-cloud-run-deploy.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --wait-revision-ready backend=backend-${{ github.event.inputs.candidate_suffix }} \
            --wait-revision-ready backend-sync=backend-sync-${{ github.event.inputs.candidate_suffix }} \
            --wait-revision-ready backend-sync-backfill=backend-sync-backfill-${{ github.event.inputs.candidate_suffix }} \
            --wait-revision-ready backend-integration=backend-integration-${{ github.event.inputs.candidate_suffix }}

      - name: Validate live runtime contract after integration candidate
        run: |
          python3 backend/scripts/validate-backend-runtime-env.py --env ${{ vars.ENV }} --check-workflows --check-live-cloud-run

      - name: Verify and smoke tagged candidates before cutover
        run: |
          python3 backend/scripts/resume_cloud_run_deploy.py validate \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --source-sha=${{ github.event.inputs.source_sha }} \
            --expected-digest=${{ github.event.inputs.expected_revision_digest }} \
            --candidate-tag="resume-${GITHUB_RUN_ID}" \
            --candidate=backend-integration=backend-integration-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend-sync-backfill=backend-sync-backfill-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend-sync=backend-sync-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend=backend-${{ github.event.inputs.candidate_suffix }}

      - name: Reconfirm stable backend-listen before traffic cutover
        run: |
          python3 backend/scripts/resume_cloud_run_deploy.py gke-gate \
            --namespace=${{ vars.ENV }}-omi-backend \
            --deployment=${{ vars.ENV }}-omi-backend-listen \
            --hpa=${{ vars.ENV }}-omi-backend-listen \
            --expected-image=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.resume-inputs.outputs.short_sha }} \
            --expected-runtime-project=${{ vars.RUNTIME_GCP_PROJECT_ID }} \
            --dwell-seconds=60 \
            --poll-interval-seconds=15 \
            --timeout-seconds=600

      - name: Promote candidates with verified rollback
        env:
          CONTROL_PLANE_URL: ${{ vars.CONTROL_PLANE_URL }}
        run: |
          python3 backend/scripts/resume_cloud_run_deploy.py promote \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --source-sha=${{ github.event.inputs.source_sha }} \
            --expected-digest=${{ github.event.inputs.expected_revision_digest }} \
            --control-plane-url="$CONTROL_PLANE_URL" \
            --candidate=backend-integration=backend-integration-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend-sync-backfill=backend-sync-backfill-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend-sync=backend-sync-${{ github.event.inputs.candidate_suffix }} \
            --candidate=backend=backend-${{ github.event.inputs.candidate_suffix }}

      - name: Cloud Run resume status report
        if: always()
        run: |
          python3 backend/scripts/deploy_status_report.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --include-cloud-run \
            --cloud-run-service backend \
            --cloud-run-service backend-sync \
            --cloud-run-service backend-sync-backfill \
            --cloud-run-service backend-integration \
            --expect-cloud-run-traffic backend=backend-${{ github.event.inputs.candidate_suffix }} \
            --expect-cloud-run-traffic backend-sync=backend-sync-${{ github.event.inputs.candidate_suffix }} \
            --expect-cloud-run-traffic backend-sync-backfill=backend-sync-backfill-${{ github.event.inputs.candidate_suffix }} \
            --expect-cloud-run-traffic backend-integration=backend-integration-${{ github.event.inputs.candidate_suffix }}

      - name: Generate deployment summary
        if: always()
        uses: ./.github/actions/deployment-summary
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          service: ${{ env.SERVICE }}

      - name: Notify deployment status on Telegram
        if: always()
        uses: ./.github/actions/deployment-notifier
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}

  deploy:
    if: ${{ github.event.inputs.mode == 'deploy' }}
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest-m
    steps:
      - name: Validate Environment Input
        env:
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          ENV: ${{ vars.ENV }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          RUNTIME_GCP_PROJECT_ID: ${{ vars.RUNTIME_GCP_PROJECT_ID }}
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "development" && "${{ github.event.inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ github.event.inputs.environment }}. Must be 'development' or 'prod'."
            exit 1
          fi
          if [[ "$INPUT_BRANCH" != "$GITHUB_REF_NAME" ]]; then
            echo "branch input must match the dispatched ref: input=$INPUT_BRANCH ref=$GITHUB_REF_NAME" >&2
            exit 1
          fi
          if [[ "${{ github.event.inputs.environment }}" == "development" ]]; then
            EXPECTED_GCP_PROJECT_ID="based-hardware-dev"
            EXPECTED_ENV="dev"
            EXPECTED_GKE_CLUSTER="dev-omi-gke"
          else
            EXPECTED_GCP_PROJECT_ID="based-hardware"
            EXPECTED_ENV="prod"
            EXPECTED_GKE_CLUSTER="prod-omi-gke"
          fi
          if [[ "$GCP_PROJECT_ID" != "$EXPECTED_GCP_PROJECT_ID" || "$ENV" != "$EXPECTED_ENV" || "$GKE_CLUSTER" != "$EXPECTED_GKE_CLUSTER" ]]; then
            echo "deployment topology does not match the selected environment" >&2
            exit 1
          fi
          if [[ "$RUNTIME_GCP_PROJECT_ID" != "based-hardware" ]]; then
            echo "RUNTIME_GCP_PROJECT_ID must be exactly based-hardware before backend-listen Helm deployment" >&2
            exit 1
          fi
          if [[ "${{ github.event.inputs.deploy_targets }}" != "all" && "${{ github.event.inputs.deploy_targets }}" != "cloud-run-only" ]]; then
            echo "Invalid deploy_targets: ${{ github.event.inputs.deploy_targets }}. Must be 'all' or 'cloud-run-only'."
            exit 1
          fi

      # To workaround "no space left on device" issue of GitHub-hosted runner
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to GCR
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: image-tag
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "revision_suffix=${GITHUB_SHA::7}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Install Python deps for deploy scripts
        run: python3 -m pip install -q pyyaml

      - name: Render backend runtime env
        id: runtime-env
        env:
          CLOUD_RUN_VPC_NETWORK: ${{ vars.CLOUD_RUN_VPC_NETWORK }}
          CLOUD_RUN_VPC_SUBNET: ${{ vars.CLOUD_RUN_VPC_SUBNET }}
          OMI_LLM_GATEWAY_URL: ${{ vars.OMI_LLM_GATEWAY_URL }}
        run: |
          python3 backend/scripts/render_backend_runtime_env.py --env ${{ vars.ENV }} >> "$GITHUB_OUTPUT"

      - name: Preflight Cloud Run deploy
        run: |
          PREFLIGHT_ARGS=(
            --env ${{ vars.ENV }}
            --project ${{ vars.GCP_PROJECT_ID }}
            --region ${{ env.REGION }}
            --check-secrets
            --check-traffic
          )
          if [[ "${{ github.event.inputs.environment }}" == "prod" || "${{ github.event.inputs.environment }}" == "development" ]]; then
            PREFLIGHT_ARGS+=(--repair-traffic)
          fi
          python3 backend/scripts/preflight-cloud-run-deploy.py "${PREFLIGHT_ARGS[@]}"

      - name: Validate backend runtime env before deploy
        run: |
          python3 backend/scripts/validate-backend-runtime-env.py --env ${{ vars.ENV }} --check-workflows --check-rendered-cloud-run

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:latest
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          cache-from: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache
          cache-to: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache,mode=max

      - name: Deploy ${{ env.SERVICE }} to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: ${{ steps.runtime-env.outputs.backend_env_vars }}
          secrets: ${{ steps.runtime-env.outputs.backend_secrets }}

      - name: Capture ${{ env.SERVICE }} revision
        id: capture-backend-revision
        run: |
          echo "revision=backend-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Deploy sync-backfill worker
        id: sync-backfill
        uses: ./.github/actions/sync-backfill-lifecycle
        with:
          mode: worker
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ env.REGION }}
          service: ${{ env.SERVICE }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          revision_suffix: ${{ steps.image-tag.outputs.revision_suffix }}
          cloud_run_flags: ${{ steps.runtime-env.outputs.cloud_run_flags }}
          backfill_env_vars: ${{ steps.runtime-env.outputs.backend_sync_backfill_env_vars }}
          backfill_secrets: ${{ steps.runtime-env.outputs.backend_sync_backfill_secrets }}

      - name: Deploy ${{ env.SERVICE }}-sync to Cloud Run
        id: deploy-backend-sync
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}-sync
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: |-
            ${{ steps.runtime-env.outputs.backend_sync_env_vars }}
            ${{ steps.sync-backfill.outputs.sync_backfill_env_vars }}
          secrets: ${{ steps.runtime-env.outputs.backend_sync_secrets }}

      - name: Capture ${{ env.SERVICE }}-sync revision
        id: capture-backend-sync-revision
        run: |
          echo "revision=backend-sync-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Provision sync-backfill platform
        uses: ./.github/actions/sync-backfill-lifecycle
        with:
          mode: platform
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ env.REGION }}
          service: ${{ env.SERVICE }}
          provision_sync_ledger_ttl: 'true'
          provision_budget_alerts: ${{ github.event.inputs.environment == 'prod' && 'true' || 'false' }}
          alert_notification_channels: ${{ vars.SYNC_BACKFILL_ALERT_NOTIFICATION_CHANNELS }}

      - name: Get GKE credentials
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install Helm
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        uses: azure/setup-helm@v3

      - name: Deploy backend-secrets to GKE using Helm
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        env:
          BACKEND_SECRETS_GSA: ${{ vars.BACKEND_SECRETS_GSA }}
          ENVIRONMENT: ${{ vars.ENV }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          REGION: ${{ env.REGION }}
        run: backend/scripts/deploy-backend-secrets.sh

      - name: Deploy ${{ env.SERVICE }}-listen to GKE using Helm
        if: ${{ github.event.inputs.deploy_targets == 'all' }}
        run: |
          helm -n ${{ vars.ENV }}-omi-backend upgrade --install ${{ vars.ENV }}-omi-backend-listen ./backend/charts/backend-listen \
            -f ./backend/charts/backend-listen/${{ vars.ENV }}_omi_backend_listen_values.yaml \
            --set image.repository=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }} \
            --set gcpProjectId=${{ vars.GCP_PROJECT_ID }} \
            --set runtimeGcpProjectId=${{ vars.RUNTIME_GCP_PROJECT_ID }} \
            --set image.tag=${{ steps.image-tag.outputs.short_sha }}
          if ! kubectl -n ${{ vars.ENV }}-omi-backend rollout status deploy/${{ vars.ENV }}-omi-backend-listen --timeout=300s; then
            python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service backend-listen || true
            exit 1
          fi
          python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service backend-listen

      - name: Deploy ${{ env.SERVICE }}-integration to Cloud Run
        id: deploy-backend-integration
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}-integration
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.image-tag.outputs.revision_suffix }}
            ${{ steps.runtime-env.outputs.cloud_run_flags }}
          env_vars: ${{ steps.runtime-env.outputs.backend_integration_env_vars }}
          secrets: ${{ steps.runtime-env.outputs.backend_integration_secrets }}

      - name: Capture ${{ env.SERVICE }}-integration revision
        id: capture-backend-integration-revision
        run: |
          echo "revision=backend-integration-${{ steps.image-tag.outputs.revision_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Wait for Cloud Run revisions to become ready
        run: |
          python3 backend/scripts/preflight-cloud-run-deploy.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --wait-revision-ready backend=${{ steps.capture-backend-revision.outputs.revision }} \
            --wait-revision-ready backend-sync=${{ steps.capture-backend-sync-revision.outputs.revision }} \
            --wait-revision-ready backend-sync-backfill=${{ steps.sync-backfill.outputs.revision }} \
            --wait-revision-ready backend-integration=${{ steps.capture-backend-integration-revision.outputs.revision }}

      - name: Validate backend runtime env after deploy
        run: |
          python3 backend/scripts/validate-backend-runtime-env.py --env ${{ vars.ENV }} --check-workflows --check-live-cloud-run

      - name: Verify validated revisions are still current
        run: |
          test "$(gcloud run services describe backend --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-revision.outputs.revision }}"
          test "$(gcloud run services describe backend-sync --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-sync-revision.outputs.revision }}"
          test "$(gcloud run services describe backend-sync-backfill --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.sync-backfill.outputs.revision }}"
          test "$(gcloud run services describe backend-integration --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --format='value(status.latestCreatedRevisionName)')" = "${{ steps.capture-backend-integration-revision.outputs.revision }}"

      - name: Shift Cloud Run traffic to validated revisions
        run: |
          gcloud run services update-traffic backend --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-revision.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-sync --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-sync-revision.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-sync-backfill --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.sync-backfill.outputs.revision }}=100 --quiet
          gcloud run services update-traffic backend-integration --project=${{ vars.GCP_PROJECT_ID }} --region=${{ env.REGION }} --to-revisions=${{ steps.capture-backend-integration-revision.outputs.revision }}=100 --quiet

      - name: Cloud Run deploy status report
        if: always()
        run: |
          set -o pipefail
          python3 backend/scripts/deploy_status_report.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --include-cloud-run \
            --cloud-run-service backend \
            --cloud-run-service backend-sync \
            --cloud-run-service backend-sync-backfill \
            --cloud-run-service backend-integration \
            --expect-cloud-run-traffic backend=${{ steps.capture-backend-revision.outputs.revision }} \
            --expect-cloud-run-traffic backend-sync=${{ steps.capture-backend-sync-revision.outputs.revision }} \
            --expect-cloud-run-traffic backend-sync-backfill=${{ steps.sync-backfill.outputs.revision }} \
            --expect-cloud-run-traffic backend-integration=${{ steps.capture-backend-integration-revision.outputs.revision }} \
            | tee /tmp/cloud-run-deploy-status.txt
          if [[ "${{ github.event.inputs.environment }}" == "prod" ]]; then
            {
              echo ""
              echo "### Cloud Run rollout status"
              echo ""
              echo '```text'
              cat /tmp/cloud-run-deploy-status.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # If required, use the Cloud Run url output in later steps
      - name: Show Output
        run: echo ${{ steps.deploy-backend.outputs.url }}

      - name: Generate deployment summary
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-summary
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          service: ${{ env.SERVICE }}

      - name: Notify deployment status on Telegram
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-notifier
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
