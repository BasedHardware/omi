name: Public Build Configuration Preflight

on:
  pull_request:
    branches: ["main"]
    paths:
      - '.github/workflows/gcp_admin.yml'
      - '.github/workflows/gcp_app.yml'
      - '.github/workflows/gcp_frontend.yml'
      - '.github/workflows/gcp_personas.yml'
      - '.github/workflows/public-build-config-preflight.yml'
      - '.github/actions/deploy-public-build/**'
      - '.github/actions/prepare-public-build/**'
      - '.github/actions/public-build-candidate-promotion/**'
      - '.github/scripts/check_public_build_contract.py'
      - '.github/scripts/preflight_public_build_config.py'
      - '.github/scripts/preflight_public_build_runtime.py'
      - '.github/scripts/smoke_public_build_browser.py'
      - '.github/scripts/test_check_public_build_contract.py'
      - 'config/public-build-contract.json'
      - 'config/public-build-values.json'
      - 'config/deployment-setting-classification.json'
      - 'web/admin/Dockerfile'
      - 'web/app/Dockerfile'
      - 'web/frontend/Dockerfile'
      - 'web/personas-open-source/Dockerfile'
      - 'web/admin/components/public-build-canary.tsx'
      - 'web/app/src/components/public-build-canary.tsx'
      - 'web/frontend/src/components/public-build-canary.tsx'
      - 'web/personas-open-source/src/components/public-build-canary.tsx'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  preflight:
    name: ${{ matrix.environment }} configuration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [development, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify reviewed public build configuration
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/preflight_public_build_config.py \
            --all \
            --environment "${{ matrix.environment }}"
