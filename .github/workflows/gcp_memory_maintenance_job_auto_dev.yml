name: Auto Deploy Memory Maintenance Job to Development

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/gcp_memory_maintenance_job.yml'
      - '.github/workflows/gcp_memory_maintenance_job_auto_dev.yml'

env:
  SERVICE: memory-maintenance-job
  REGION: us-central1

# Share the lock with manual development deploys of this Cloud Run job.
concurrency:
  group: deploy-cloud-run-memory-maintenance-job-development
  cancel-in-progress: false

jobs:
  deploy:
    environment: development
    permissions:
      contents: 'read'

    runs-on: ubuntu-latest
    steps:
      # To workaround "no space left on device" issue of GitHub-hosted runner
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Login to GCR
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: image-tag
        run: |
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Python deps for deploy scripts
        run: python3 -m pip install -q pyyaml

      - name: Render backend runtime env
        id: runtime-env
        env:
          CLOUD_RUN_VPC_NETWORK: ${{ vars.CLOUD_RUN_VPC_NETWORK }}
          CLOUD_RUN_VPC_SUBNET: ${{ vars.CLOUD_RUN_VPC_SUBNET }}
        run: |
          python3 backend/scripts/render_backend_runtime_env.py --env dev >> "$GITHUB_OUTPUT"

      - name: Validate backend runtime env before deploy
        run: |
          python3 backend/scripts/validate-backend-runtime-env.py --env dev --check-workflows

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/modal/Dockerfile.memory_maintenance_job
          push: true
          tags: |
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:latest
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          cache-from: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache
          cache-to: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          job: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.image-tag.outputs.short_sha }}
          flags: ${{ steps.runtime-env.outputs.cloud_run_flags }} ${{ steps.runtime-env.outputs.memory_maintenance_job_flags }}
          env_vars: ${{ steps.runtime-env.outputs.memory_maintenance_job_env_vars }}
          secrets: ${{ steps.runtime-env.outputs.memory_maintenance_job_secrets }}

      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
