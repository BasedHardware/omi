name: Deploy App to Cloud Run

on:
  push:
    branches: ["main", "development"]
    paths:
      - 'web/app/**'
      - 'config/public-build-*.json'
      - '.github/actions/prepare-public-build/**'
      - '.github/actions/public-build-candidate-promotion/**'
      - '.github/scripts/preflight_public_build_config.py'
      - '.github/scripts/smoke_public_build_browser.py'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'

env:
  SERVICE: omi-web-app
  REGION: us-central1
  TARGET: app

concurrency:
  group: deploy-cloud-run-omi-web-app-${{ github.ref == 'refs/heads/development' && 'development' || github.ref == 'refs/heads/main' && 'prod' || format('nondeploy-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  deploy:
    environment: ${{ github.ref == 'refs/heads/development' && 'development' || 'prod' }}
    permissions:
      actions: read
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare reviewed public build inputs
        id: public-build
        uses: ./.github/actions/prepare-public-build
        with:
          target: app
          environment: ${{ github.ref == 'refs/heads/development' && 'development' || 'prod' }}

      - name: Compute immutable candidate identity
        id: candidate
        run: |
          short_sha="${GITHUB_SHA::7}"
          revision_suffix="${short_sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "short_sha=${short_sha}"
            echo "revision_suffix=${revision_suffix}"
            echo "revision=${{ env.SERVICE }}-${revision_suffix}"
            echo "tag=public-app-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "$GITHUB_OUTPUT"

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - run: gcloud auth configure-docker

      - name: Build and push immutable Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/app/Dockerfile
          push: true
          tags: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.candidate.outputs.short_sha }}
          build-args: ${{ steps.public-build.outputs.build_args }}

      - name: Deploy no-traffic candidate revision
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ steps.candidate.outputs.short_sha }}
          no_traffic: true
          flags: >-
            --revision-suffix=${{ steps.candidate.outputs.revision_suffix }}
            --tag=${{ steps.candidate.outputs.tag }}

      - name: Promote browser-accepted candidate
        uses: ./.github/actions/public-build-candidate-promotion
        with:
          target: app
          service: ${{ env.SERVICE }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ env.REGION }}
          revision: ${{ steps.candidate.outputs.revision }}
          tag: ${{ steps.candidate.outputs.tag }}
