name: Promote Qualified Desktop Stable

# Stable is a protected distribution pointer, not a backend deployment. It
# promotes the exact signed artifact already qualified on beta; the existing
# backend deployment workflows remain independent.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Qualified current beta v*-macos release tag'
        required: true
        type: string
      confirm:
        description: 'Type promote-stable to advance the stable pointer'
        required: true
        type: string
      operation:
        description: 'promote advances Stable; repoint selects a retained qualified manifest'
        required: true
        default: promote
        type: choice
        options: [promote, repoint]
      expected_current_release_id:
        description: 'Current stable release ID (empty only for the first promotion)'
        required: false
        default: ''
        type: string
      expected_generation:
        description: 'Current stable pointer generation (0 when Stable is unset)'
        required: true
        type: string
      qualification_run_id:
        description: 'Successful trusted qualification run containing immutable artifact evidence'
        required: true
        type: string

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: desktop-stable-promotion
  cancel-in-progress: false

env:
  GCS_DESKTOP_UPDATES_BUCKET: ${{ vars.GCS_DESKTOP_UPDATES_BUCKET || 'gs://omi_macos_updates' }}

jobs:
  promote:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout promotion controls
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Download immutable qualification evidence
        uses: actions/download-artifact@v4
        with:
          name: desktop-qualification-evidence-${{ inputs.release_tag }}
          run-id: ${{ inputs.qualification_run_id }}
          github-token: ${{ github.token }}
          path: /tmp/desktop-qualification-evidence

      - name: Validate and download the exact qualified beta artifact
        id: candidate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRM: ${{ inputs.confirm }}
          QUALIFICATION_RUN_ID: ${{ inputs.qualification_run_id }}
        run: |
          set -euo pipefail
          test "$CONFIRM" = promote-stable || { echo 'confirm must be exactly: promote-stable' >&2; exit 1; }
          printf '%s\n' "$RELEASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?\+[0-9]+-macos$' || {
            echo "Invalid macOS release tag: $RELEASE_TAG" >&2; exit 1;
          }
          git fetch --force origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          [[ "$QUALIFICATION_RUN_ID" =~ ^[0-9]+$ ]] || { echo 'qualification_run_id must be numeric' >&2; exit 1; }
          run=$(gh api "repos/$REPO/actions/runs/$QUALIFICATION_RUN_ID")
          test "$(jq -r .conclusion <<<"$run")" = success
          test "$(jq -r .head_branch <<<"$run")" = main
          test "$(jq -r .name <<<"$run")" = 'Qualify Desktop Beta Candidate'
          test "$(jq -r .head_sha <<<"$run")" = "$TARGET_SHA"
          mkdir -p /tmp/desktop-stable-assets
          gh release view "$RELEASE_TAG" --repo "$REPO" --json tagName,body,isDraft,isPrerelease,publishedAt,assets \
            > /tmp/desktop-stable-release.json
          gh release download "$RELEASE_TAG" --repo "$REPO" --pattern 'Omi.zip' --pattern 'Omi.dmg' --pattern 'omi.dmg' \
            --dir /tmp/desktop-stable-assets
          ZIP_PATH=/tmp/desktop-stable-assets/Omi.zip
          DMG_COUNT=$(find /tmp/desktop-stable-assets -maxdepth 1 -type f \( -name Omi.dmg -o -name omi.dmg \) | wc -l | tr -d ' ')
          test -f "$ZIP_PATH"
          test "$DMG_COUNT" = 1 || { echo 'Expected exactly one qualified Omi.dmg or omi.dmg release asset.' >&2; exit 1; }
          DMG_PATH=$(find /tmp/desktop-stable-assets -maxdepth 1 -type f \( -name Omi.dmg -o -name omi.dmg \) -print -quit)
          ZIP_SHA=$(sha256sum "$ZIP_PATH" | cut -d' ' -f1)
          DMG_SHA=$(sha256sum "$DMG_PATH" | cut -d' ' -f1)
          BETA_ZIP_PATH=/tmp/desktop-stable-assets/Omi.Beta.zip
          BETA_DMG_PATH=/tmp/desktop-stable-assets/omi-beta.dmg
          gh release download "$RELEASE_TAG" --repo "$REPO" --pattern 'Omi.Beta.zip' --pattern 'omi-beta.dmg' --dir /tmp/desktop-stable-assets
          BETA_ZIP_SHA=$(sha256sum "$BETA_ZIP_PATH" | cut -d' ' -f1)
          BETA_DMG_SHA=$(sha256sum "$BETA_DMG_PATH" | cut -d' ' -f1)
          python3 .github/scripts/prepare-desktop-beta-promotion.py \
            --release-json /tmp/desktop-stable-release.json --release-tag "$RELEASE_TAG" --target-sha "$TARGET_SHA" \
            --zip-sha256 "$ZIP_SHA" --dmg-sha256 "$DMG_SHA" \
            --beta-zip-sha256 "$BETA_ZIP_SHA" --beta-dmg-sha256 "$BETA_DMG_SHA" \
            --qualification-evidence /tmp/desktop-qualification-evidence/qualification-evidence.json \
            --allow-stable-channel --output /tmp/desktop-release-manifest.json
          {
            echo "target_sha=$TARGET_SHA"
            echo "dmg_path=$DMG_PATH"
            echo "version=$(python3 -c 'import json; print(json.load(open("/tmp/desktop-release-manifest.json"))["version"])')"
          } >> "$GITHUB_OUTPUT"

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Register immutable release manifest
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          ADMIN_KEY=$(gcloud secrets versions access latest --secret=ADMIN_KEY --project "$PROJECT_ID")
          curl -fsS -X POST -H 'Content-Type: application/json' -H "secret-key: $ADMIN_KEY" \
            --data-binary @/tmp/desktop-release-manifest.json https://api.omi.me/v2/desktop/releases \
            > /tmp/desktop-manifest-response.json
          python3 -m json.tool /tmp/desktop-manifest-response.json

      - name: Verify current beta and stable pointer compare-and-swap inputs
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          EXPECTED_RELEASE_ID: ${{ inputs.expected_current_release_id }}
          EXPECTED_GENERATION: ${{ inputs.expected_generation }}
          OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          BASE="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/desktop_update_channels"
          curl -fsS -H "Authorization: Bearer $ACCESS_TOKEN" "$BASE/macos-beta" > /tmp/macos-beta-pointer.json
          curl -sS -H "Authorization: Bearer $ACCESS_TOKEN" "$BASE/macos-stable" > /tmp/macos-stable-pointer.json
          python3 - <<'PY'
          import json, os, sys
          def fields(path):
              data = json.load(open(path))
              return data.get('fields', {}) if isinstance(data, dict) else {}
          def text(fields, name): return fields.get(name, {}).get('stringValue', '')
          def generation(fields): return int(fields.get('generation', {}).get('integerValue', '0'))
          beta = fields('/tmp/macos-beta-pointer.json')
          stable = fields('/tmp/macos-stable-pointer.json')
          if os.environ['OPERATION'] == 'promote' and text(beta, 'release_id') != os.environ['RELEASE_TAG']:
              sys.exit('Stable promotion requires the exact current qualified beta release ID.')
          current_id = text(stable, 'release_id')
          current_generation = generation(stable)
          if current_id != os.environ['EXPECTED_RELEASE_ID'] or current_generation != int(os.environ['EXPECTED_GENERATION']):
              sys.exit(f'Stable pointer CAS mismatch: expected {os.environ["EXPECTED_RELEASE_ID"]!r}/'
                       f'{os.environ["EXPECTED_GENERATION"]}, current {current_id!r}/{current_generation}')
          if os.environ['OPERATION'] == 'repoint' and not current_id:
              sys.exit('repoint requires an existing stable pointer')
          PY

      - name: Publish immutable stable repair installer
        env:
          GCS_DESKTOP_UPDATES_BUCKET: ${{ env.GCS_DESKTOP_UPDATES_BUCKET }}
          DMG_PATH: ${{ steps.candidate.outputs.dmg_path }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          python3 .github/scripts/desktop_repair_installer.py --manifest /tmp/desktop-release-manifest.json \
            --bucket "$GCS_DESKTOP_UPDATES_BUCKET" --output-dir /tmp/desktop-stable-repair
          DMG_SHA=$(sha256sum "$DMG_PATH" | cut -d' ' -f1)
          REPAIR_SHA=$(sha256sum /tmp/desktop-stable-repair/repair.json | cut -d' ' -f1)
          for source in "$DMG_PATH" /tmp/desktop-stable-repair/repair.json; do
            if [ "$source" = "$DMG_PATH" ]; then target="$GCS_DESKTOP_UPDATES_BUCKET/stable/${RELEASE_TAG}/Omi.dmg"; sha="$DMG_SHA"; else target="$GCS_DESKTOP_UPDATES_BUCKET/stable/${RELEASE_TAG}/repair.json"; sha="$REPAIR_SHA"; fi
            if gcloud storage objects describe "$target" --format='value(metadata.sha256)' > /tmp/remote-sha.txt 2>/dev/null; then
              test "$(cat /tmp/remote-sha.txt)" = "$sha" || { echo "Immutable stable artifact hash differs: $target" >&2; exit 1; }
            else
              gcloud storage cp --if-generation-match=0 --custom-metadata="sha256=$sha" "$source" "$target"
            fi
          done

      - name: Advance explicit stable pointer
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          EXPECTED_RELEASE_ID: ${{ inputs.expected_current_release_id }}
          EXPECTED_GENERATION: ${{ inputs.expected_generation }}
          OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail
          ADMIN_KEY=$(gcloud secrets versions access latest --secret=ADMIN_KEY --project "$PROJECT_ID")
          python3 - <<'PY' > /tmp/desktop-stable-pointer.json
          import json, os
          payload = {"platform": "macos", "channel": "stable", "release_id": os.environ["RELEASE_TAG"],
                     "expected_generation": int(os.environ["EXPECTED_GENERATION"]), "operation": os.environ["OPERATION"]}
          if os.environ["EXPECTED_RELEASE_ID"]:
              payload["expected_current_release_id"] = os.environ["EXPECTED_RELEASE_ID"]
          print(json.dumps(payload))
          PY
          curl -fsS -X POST -H 'Content-Type: application/json' -H "secret-key: $ADMIN_KEY" \
            --data-binary @/tmp/desktop-stable-pointer.json https://api.omi.me/v2/desktop/channels/promote \
            > /tmp/desktop-stable-pointer-response.json
          python3 -m json.tool /tmp/desktop-stable-pointer-response.json

      - name: Bridge stable for legacy desktop clients
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          SERVICE_URL=$(gcloud run services describe desktop-backend --region us-central1 --project "$PROJECT_ID" --format='value(status.url)')
          RELEASE_SECRET=$(gcloud secrets versions access latest --secret=RELEASE_SECRET --project "$PROJECT_ID")
          python3 - <<'PY' > /tmp/legacy-desktop-release.json
          import json
          manifest = json.load(open('/tmp/desktop-release-manifest.json'))
          print(json.dumps({"version": manifest["version"], "build_number": manifest["build_number"],
              "download_url": manifest["zip_url"], "ed_signature": manifest["ed_signature"], "changelog": manifest["changelog"],
              "is_live": True, "is_critical": manifest["mandatory"], "channel": "stable"}))
          PY
          RESPONSE=$(curl -sS -w '\n%{http_code}' -X POST -H 'Content-Type: application/json' \
            -H "X-Release-Secret: $RELEASE_SECRET" --data-binary @/tmp/legacy-desktop-release.json "${SERVICE_URL%/}/updates/releases")
          CODE=$(printf '%s\n' "$RESPONSE" | tail -n1)
          test "$CODE" = 201 -o "$CODE" = 409 || { printf '%s\n' "$RESPONSE" >&2; exit 1; }

      - name: Publish latest stable repair route
        env:
          GCS_DESKTOP_UPDATES_BUCKET: ${{ env.GCS_DESKTOP_UPDATES_BUCKET }}
        run: |
          set -euo pipefail
          for file in latest.json index.html; do
            gcloud storage cp --cache-control='no-store,max-age=0' "/tmp/desktop-stable-repair/$file" "$GCS_DESKTOP_UPDATES_BUCKET/stable/$file"
          done

      - name: Mark GitHub release live stable
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$REPO" --json body -q .body > /tmp/release-body.md
          python3 .github/scripts/mark-desktop-release-stable.py --input /tmp/release-body.md --output /tmp/release-body-stable.md
          gh release edit "$RELEASE_TAG" --repo "$REPO" --title "Omi Desktop ${RELEASE_TAG#v}" --notes-file /tmp/release-body-stable.md

      - name: Verify exact pointer, hashes, and stable feed
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          VERSION: ${{ steps.candidate.outputs.version }}
        run: |
          set -euo pipefail
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          BASE="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents"
          curl -fsS -H "Authorization: Bearer $ACCESS_TOKEN" "$BASE/desktop_update_channels/macos-stable" > /tmp/final-stable-pointer.json
          curl -fsS -H "Authorization: Bearer $ACCESS_TOKEN" "$BASE/desktop_release_manifests/$RELEASE_TAG" > /tmp/final-stable-manifest.json
          python3 - <<'PY'
          import json, os, sys
          pointer = json.load(open('/tmp/final-stable-pointer.json')).get('fields', {})
          manifest = json.load(open('/tmp/final-stable-manifest.json')).get('fields', {})
          release_id = pointer.get('release_id', {}).get('stringValue')
          if release_id != os.environ['RELEASE_TAG']: sys.exit('stable pointer does not resolve to the requested release')
          expected = json.load(open('/tmp/desktop-release-manifest.json'))
          for key in ('zip_sha256', 'dmg_sha256'):
              if manifest.get(key, {}).get('stringValue') != expected[key]: sys.exit(f'manifest {key} mismatch')
          PY
          curl -fsS https://api.omi.me/v2/desktop/appcast.xml > /tmp/stable-appcast.xml
          python3 - "$VERSION" /tmp/stable-appcast.xml <<'PY'
          import sys
          from xml.etree import ElementTree as ET
          version, path = sys.argv[1:]
          root = ET.parse(path).getroot()
          ns = {'sparkle': 'http://www.andymatuschak.org/xml-namespaces/sparkle'}
          items = [item for item in root.findall('.//item') if item.findtext('sparkle:version', namespaces=ns) == version and item.findtext('sparkle:channel', namespaces=ns) == 'stable']
          if len(items) != 1:
              raise SystemExit('stable appcast must contain exactly one requested stable item')
          PY
          echo "Stable pointer, exact manifest hashes, and appcast verified for $RELEASE_TAG." >> "$GITHUB_STEP_SUMMARY"
