name: Promote Desktop Backend to Prod

# Prod promotion is intentionally manual and ordered:
#   1. choose an existing v*-macos GitHub Release,
#   2. deploy the Rust desktop backend from that exact tag,
#   3. verify /health reports that release identity,
#   4. mark the GitHub Release metadata channel stable,
#   5. promote the Firestore bridge release for old Rust appcast clients,
#   6. move desktop-backend-prod-deployed.
#
# Do not add schedule, push, or release triggers here. Release-edited events
# have missed promotions before, and automatic triggers can expose stable users
# to a backend that was not promoted deliberately.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing v*-macos release tag to promote to stable'
        required: true
      confirm:
        description: 'Type promote-stable to deploy prod and mark the release stable'
        required: true
      force:
        description: 'Allow rollback to an older release tag'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: desktop-backend-promote-prod
  cancel-in-progress: false

env:
  SERVICE: desktop-backend
  REGION: us-central1
  TRACK_TAG: desktop-backend-prod-deployed

jobs:
  promote:
    environment: prod
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest-m
    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout promotion controls
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Validate release promotion request
        id: plan
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRM: ${{ inputs.confirm }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          if [ "$CONFIRM" != "promote-stable" ]; then
            echo "confirm must be exactly: promote-stable" >&2
            exit 1
          fi

          if ! printf '%s\n' "$RELEASE_TAG" | grep -qE '^v.+-macos$'; then
            echo "Release tag '$RELEASE_TAG' is not a macOS desktop release tag." >&2
            exit 1
          fi

          git fetch --force --tags origin \
            "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" \
            "+refs/tags/${TRACK_TAG}:refs/tags/${TRACK_TAG}" || true

          gh release view "$RELEASE_TAG" --repo "$REPO" \
            --json tagName,body,isDraft,isPrerelease,assets \
            > /tmp/desktop-release.json

          python3 .github/scripts/check-desktop-release-promotion.py \
            --release-json /tmp/desktop-release.json \
            --release-tag "$RELEASE_TAG" \
            --github-output "$GITHUB_OUTPUT"

          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          CURRENT_SHA=$(git rev-list -n1 "$TRACK_TAG" 2>/dev/null || true)

          if [ -n "$CURRENT_SHA" ] && [ "$TARGET_SHA" != "$CURRENT_SHA" ] \
            && git merge-base --is-ancestor "$TARGET_SHA" "$CURRENT_SHA" \
            && [ "$FORCE" != "true" ]; then
            echo "$RELEASE_TAG ($TARGET_SHA) is older than tracked prod ($CURRENT_SHA)." >&2
            echo "Re-run with force=true only for an intentional rollback." >&2
            exit 1
          fi

          {
            echo "target_sha=$TARGET_SHA"
            echo "target_image=gcr.io/${{ vars.GCP_PROJECT_ID }}/${SERVICE}:$TARGET_SHA"
          } >> "$GITHUB_OUTPUT"

          echo "Promotion target: $RELEASE_TAG ($TARGET_SHA)" >> "$GITHUB_STEP_SUMMARY"

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Login to GCR
        run: gcloud auth configure-docker

      - name: Check current prod backend
        id: current
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TARGET_IMAGE: ${{ steps.plan.outputs.target_image }}
          TARGET_TAG: ${{ inputs.release_tag }}
          TARGET_SHA: ${{ steps.plan.outputs.target_sha }}
        run: |
          set -euo pipefail

          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')
          CURRENT_IMAGE=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(spec.template.spec.containers[0].image)')

          HEALTH_JSON=$(curl -fsS --max-time 15 "${SERVICE_URL%/}/health" || true)
          HEALTH_MATCH=false
          if [ -n "$HEALTH_JSON" ]; then
            HEALTH_MATCH=$(HEALTH_JSON="$HEALTH_JSON" python3 - <<'PY'
          import json
          import os
          import sys

          try:
              health = json.loads(os.environ["HEALTH_JSON"])
          except Exception:
              print("false")
              sys.exit(0)

          ok = (
              health.get("release_tag") == os.environ["TARGET_TAG"]
              and health.get("release_sha") == os.environ["TARGET_SHA"]
              and health.get("release_channel") == "stable"
          )
          print("true" if ok else "false")
          PY
            )
          fi

          DEPLOY_NEEDED=true
          if [ "$CURRENT_IMAGE" = "$TARGET_IMAGE" ] && [ "$HEALTH_MATCH" = "true" ]; then
            DEPLOY_NEEDED=false
          fi

          {
            echo "service_url=$SERVICE_URL"
            echo "current_image=$CURRENT_IMAGE"
            echo "deploy_needed=$DEPLOY_NEEDED"
          } >> "$GITHUB_OUTPUT"

          {
            echo "Current prod image: $CURRENT_IMAGE"
            echo "Target prod image: $TARGET_IMAGE"
            echo "Health identity already matches target: $HEALTH_MATCH"
            echo "Deploy needed: $DEPLOY_NEEDED"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout release source
        if: steps.current.outputs.deploy_needed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.plan.outputs.target_sha }}
          fetch-depth: 0
          path: release-source

      - name: Set up Docker Buildx
        if: steps.current.outputs.deploy_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Google Service Account
        if: steps.current.outputs.deploy_needed == 'true'
        run: echo "${{ secrets.GCP_SERVICE_ACCOUNT }}" | base64 -d > ./release-source/desktop/macos/Backend-Rust/google-credentials.json

      - name: Build and Push Desktop Backend Image
        if: steps.current.outputs.deploy_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./release-source/desktop/macos/Backend-Rust
          file: ./release-source/desktop/macos/Backend-Rust/Dockerfile
          push: true
          tags: |
            ${{ steps.plan.outputs.target_image }}
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:prod
          cache-from: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache
          cache-to: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache,mode=max

      - name: Deploy Desktop Backend to Production
        if: steps.current.outputs.deploy_needed == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ steps.plan.outputs.target_image }}
          flags: '--allow-unauthenticated'
          wait: true
          env_vars: |
            FIREBASE_PROJECT_ID=based-hardware
            GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
            AGENT_GCS_BUCKET=based-hardware-agent
            OMI_DESKTOP_RELEASE_TAG=${{ inputs.release_tag }}
            OMI_DESKTOP_RELEASE_SHA=${{ steps.plan.outputs.target_sha }}
            OMI_DESKTOP_RELEASE_CHANNEL=stable
          secrets: |
            ENCRYPTION_SECRET=ENCRYPTION_SECRET:latest
            GEMINI_API_KEY=DESKTOP_GEMINI_API_KEY:latest
            OPENAI_API_KEY=OPENAI_API_KEY:latest
            REDIS_DB_PASSWORD=DESKTOP_REDIS_DB_PASSWORD:latest
            FIREBASE_API_KEY=DESKTOP_FIREBASE_API_KEY:latest
            REDIS_DB_HOST=DESKTOP_REDIS_DB_HOST:latest
            REDIS_DB_PORT=DESKTOP_REDIS_DB_PORT:latest
            DEEPGRAM_API_KEY=DESKTOP_DEEPGRAM_API_KEY:latest
            ANTHROPIC_API_KEY=DESKTOP_ANTHROPIC_API_KEY:latest
            DESKTOP_LEGACY_ANTHROPIC_KEY=DESKTOP_LEGACY_ANTHROPIC_KEY:latest
            GOOGLE_CALENDAR_API_KEY=DESKTOP_GOOGLE_CALENDAR_API_KEY:latest
            RELEASE_SECRET=RELEASE_SECRET:latest

      - name: Verify prod backend release identity
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TARGET_TAG: ${{ inputs.release_tag }}
          TARGET_SHA: ${{ steps.plan.outputs.target_sha }}
        run: |
          set -euo pipefail

          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')

          for attempt in $(seq 1 30); do
            HEALTH_JSON=$(curl -fsS --max-time 15 "${SERVICE_URL%/}/health" || true)
            if [ -n "$HEALTH_JSON" ]; then
              if HEALTH_JSON="$HEALTH_JSON" python3 - <<'PY'
          import json
          import os
          import sys

          health = json.loads(os.environ["HEALTH_JSON"])
          expected = {
              "release_tag": os.environ["TARGET_TAG"],
              "release_sha": os.environ["TARGET_SHA"],
              "release_channel": "stable",
          }
          mismatches = {
              key: {"expected": value, "actual": health.get(key)}
              for key, value in expected.items()
              if health.get(key) != value
          }
          if mismatches:
              print(json.dumps({"health": health, "mismatches": mismatches}, indent=2))
              sys.exit(1)
          print(json.dumps(health, indent=2))
          PY
              then
                echo "Verified prod backend identity at $SERVICE_URL/health" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi
            echo "Waiting for prod backend identity ($attempt/30)..."
            sleep 10
          done

          echo "Prod backend did not report the promoted release identity." >&2
          exit 1

      - name: Mark GitHub Release stable
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$REPO" --json body -q .body > /tmp/release-body.md
          python3 .github/scripts/mark-desktop-release-stable.py \
            --input /tmp/release-body.md \
            --output /tmp/release-body-stable.md
          gh release edit "$RELEASE_TAG" --repo "$REPO" --notes-file /tmp/release-body-stable.md

      - name: Promote Firestore release stable
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          FIRESTORE_DOC_ID: ${{ steps.plan.outputs.firestore_doc_id }}
        run: |
          set -euo pipefail

          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')
          RELEASE_SECRET=$(gcloud secrets versions access latest \
            --secret=RELEASE_SECRET \
            --project "$PROJECT_ID")

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X PATCH \
            -H "Content-Type: application/json" \
            -H "X-Release-Secret: $RELEASE_SECRET" \
            -d "{\"doc_id\":\"${FIRESTORE_DOC_ID}\"}" \
            "${SERVICE_URL%/}/updates/releases/promote")

          HTTP_CODE=$(printf '%s\n' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s\n' "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" = "200" ]; then
            NEW_CHANNEL=$(BODY="$BODY" python3 - <<'PY'
          import json
          import os

          print(json.loads(os.environ["BODY"]).get("new_channel", ""))
          PY
            )
            if [ "$NEW_CHANNEL" != "stable" ]; then
              echo "$BODY" >&2
              echo "Firestore release $FIRESTORE_DOC_ID promoted to $NEW_CHANNEL, not stable." >&2
              exit 1
            fi
            echo "Promoted Firestore release $FIRESTORE_DOC_ID to stable" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$HTTP_CODE" = "400" ] && printf '%s\n' "$BODY" | grep -qi "already on stable"; then
            echo "Firestore release $FIRESTORE_DOC_ID is already stable" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$BODY" >&2
            echo "Failed to promote Firestore release $FIRESTORE_DOC_ID (HTTP $HTTP_CODE)" >&2
            exit 1
          fi

      - name: Clear desktop update cache
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          ADMIN_KEY=$(gcloud secrets versions access latest \
            --secret=ADMIN_KEY \
            --project "$PROJECT_ID" 2>/dev/null || true)
          if [ -z "$ADMIN_KEY" ]; then
            echo "ADMIN_KEY unavailable; skipping desktop update cache clear." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          curl -fsS \
            -X POST \
            -H "secret-key: $ADMIN_KEY" \
            "https://api.omi.me/v2/desktop/clear-cache" >/dev/null
          echo "Cleared desktop update cache" >> "$GITHUB_STEP_SUMMARY"

      - name: Advance prod-tracking tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_SHA: ${{ steps.plan.outputs.target_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/update-desktop-backend-prod-ref.json
          import json
          import os

          print(json.dumps({"sha": os.environ["TARGET_SHA"], "force": True}))
          PY
          if ! gh api --method PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TRACK_TAG}" --input /tmp/update-desktop-backend-prod-ref.json >/dev/null; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${TRACK_TAG}" -f sha="${TARGET_SHA}" >/dev/null
          fi
          echo "Promoted desktop-backend to PROD - ${{ inputs.release_tag }} (${{ steps.plan.outputs.target_sha }})" >> "$GITHUB_STEP_SUMMARY"
