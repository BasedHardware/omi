name: Promote Desktop Backend to Prod

# Prod promotion is intentionally manual and ordered:
#   1. choose an explicitly nominated stable candidate,
#   2. deploy the Rust desktop backend from that exact tag,
#   3. verify /health reports that release identity,
#   4. promote the Firestore bridge release for old Rust appcast clients,
#   5. mark the GitHub Release metadata channel stable,
#   6. move desktop-backend-prod-deployed.
#
# Do not add schedule, push, or release triggers here. Release-edited events
# have missed promotions before, and automatic triggers can expose stable users
# to a backend that was not promoted deliberately.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Nominated stable-candidate v*-macos release tag'
        required: true
      confirm:
        description: 'Type promote-stable to deploy prod and mark the release stable'
        required: true
      python_backend_sha:
        description: 'Compatible python-backend SHA attested for this desktop release'
        required: false
        default: ''
      break_glass:
        description: 'DANGER: bypass qualification and stable-candidate gates'
        required: false
        default: false
        type: boolean
      break_glass_confirm:
        description: 'Type I-ACCEPT-STABLE-PROMOTION-RISK with break_glass'
        required: false
        default: ''
      break_glass_reason:
        description: 'Required audited rationale when break_glass is enabled'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: desktop-backend-promote-prod
  cancel-in-progress: false

env:
  SERVICE: desktop-backend
  REGION: us-central1
  TRACK_TAG: desktop-backend-prod-deployed

jobs:
  promote:
    environment: prod
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest-m
    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout promotion controls
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release promotion request
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRM: ${{ inputs.confirm }}
          PYTHON_BACKEND_SHA: ${{ inputs.python_backend_sha }}
          BREAK_GLASS: ${{ inputs.break_glass }}
          BREAK_GLASS_CONFIRM: ${{ inputs.break_glass_confirm }}
          BREAK_GLASS_REASON: ${{ inputs.break_glass_reason }}
        run: |
          set -euo pipefail

          if [ "$CONFIRM" != "promote-stable" ]; then
            echo "confirm must be exactly: promote-stable" >&2
            exit 1
          fi

          if ! printf '%s\n' "$RELEASE_TAG" | grep -qE '^v.+-macos$'; then
            echo "Release tag '$RELEASE_TAG' is not a macOS desktop release tag." >&2
            exit 1
          fi

          git fetch --force --tags origin \
            "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" \
            "+refs/tags/${TRACK_TAG}:refs/tags/${TRACK_TAG}" || true

          gh release view "$RELEASE_TAG" --repo "$REPO" \
            --json tagName,body,isDraft,isPrerelease,assets \
            > /tmp/desktop-release.json

          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          PROMOTION_CHECK_ARGS=(
            --release-json /tmp/desktop-release.json
            --release-tag "$RELEASE_TAG"
            --target-sha "$TARGET_SHA"
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "$BREAK_GLASS" = "true" ]; then
            PROMOTION_CHECK_ARGS+=(
              --break-glass
              --break-glass-confirm "$BREAK_GLASS_CONFIRM"
              --break-glass-reason "$BREAK_GLASS_REASON"
            )
            echo "::warning::Audited stable-promotion break glass enabled for $RELEASE_TAG: $BREAK_GLASS_REASON"
            echo "Audited break glass by ${{ github.actor }} for $RELEASE_TAG: $BREAK_GLASS_REASON" >> "$GITHUB_STEP_SUMMARY"
          fi

          python3 .github/scripts/check-desktop-release-promotion.py \
            "${PROMOTION_CHECK_ARGS[@]}"

          if [ -z "$PYTHON_BACKEND_SHA" ]; then
            if [ "$BREAK_GLASS" = "true" ]; then
              echo "::warning::python_backend_sha is missing; allowed by audited break glass"
              echo "python_backend_sha is missing; allowed by audited break glass" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "python_backend_sha is required for desktop stable promotion." >&2
              echo "Provide a SHA attested by backend/scripts/bless-python-backend.sh (python-backend surface; not desktop legacy qualification), or enable audited break glass." >&2
              exit 1
            fi
          else
            if ! git cat-file -e "${PYTHON_BACKEND_SHA}^{commit}" 2>/dev/null; then
              git fetch --depth=1 origin "$PYTHON_BACKEND_SHA"
            fi
            # Tag prefix is python-backend surface naming (not desktop legacy qualification).
            PYTHON_BACKEND_ATTEST_TAG="python-backend-bless-${PYTHON_BACKEND_SHA}"  # not desktop legacy qualification
            git fetch --force --tags origin "+refs/tags/${PYTHON_BACKEND_ATTEST_TAG}:refs/tags/${PYTHON_BACKEND_ATTEST_TAG}" || true
            if ! gh release view "$PYTHON_BACKEND_ATTEST_TAG" --repo "$REPO" \
              --json tagName,body,isDraft,isPrerelease,assets \
              > /tmp/python-backend-attestation.json; then
              if [ "$BREAK_GLASS" = "true" ]; then
                echo "::warning::No python-backend attestation release found for ${PYTHON_BACKEND_SHA}; allowed by audited break glass"
                echo "No python-backend attestation release found for ${PYTHON_BACKEND_SHA}; allowed by audited break glass" >> "$GITHUB_STEP_SUMMARY"
                printf '{"tagName":"missing-%s","body":""}\n' "$PYTHON_BACKEND_ATTEST_TAG" > /tmp/python-backend-attestation.json
              else
                echo "Missing python-backend attestation release: ${PYTHON_BACKEND_ATTEST_TAG}" >&2
                echo "Create it with backend/scripts/bless-python-backend.sh (python-backend surface; not desktop legacy qualification)." >&2
                exit 1
              fi
            fi

            # Keep args populated under set -u; override only when break glass is enabled.
            PYTHON_BACKEND_CHECK_ARGS=(
              --release-json /tmp/python-backend-attestation.json
              --target-sha "$PYTHON_BACKEND_SHA"
              --tag-sha "$(git rev-list -n1 "$PYTHON_BACKEND_ATTEST_TAG" 2>/dev/null || true)"
            )
            if [ "$BREAK_GLASS" = "true" ]; then
              PYTHON_BACKEND_CHECK_ARGS+=(
                --override-unblessed
                --override-confirm "I-ACCEPT-UNBLESSED-PROD-RISK"
              )
            fi
            PYTHON_BACKEND_CHECKER='.github/scripts/check-python-backend-blessing.py'  # not desktop legacy qualification
            python3 "$PYTHON_BACKEND_CHECKER" \
              "${PYTHON_BACKEND_CHECK_ARGS[@]}"

            if ! git merge-base --is-ancestor "$PYTHON_BACKEND_SHA" "$TARGET_SHA"; then
              if [ "$BREAK_GLASS" = "true" ]; then
                echo "::warning::python_backend_sha ($PYTHON_BACKEND_SHA) is not an ancestor of desktop target ($TARGET_SHA); allowed by audited break glass"
                echo "python_backend_sha ($PYTHON_BACKEND_SHA) is not an ancestor of desktop target ($TARGET_SHA); allowed by audited break glass" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "python_backend_sha ($PYTHON_BACKEND_SHA) is not an ancestor of desktop target ($TARGET_SHA)" >&2
                exit 1
              fi
            fi
          fi

          CURRENT_SHA=$(git rev-list -n1 "$TRACK_TAG" 2>/dev/null || true)

          if ! git grep -q "OMI_DESKTOP_RELEASE_TAG" "$TARGET_SHA" -- desktop/macos/Backend-Rust/src \
            || ! git grep -q "release_tag" "$TARGET_SHA" -- desktop/macos/Backend-Rust/src; then
            echo "$RELEASE_TAG does not include /health release identity support." >&2
            echo "Choose a release built after the stable-promotion workflow landed; older tags cannot be promoted or rolled back safely." >&2
            exit 1
          fi

          if [ -n "$CURRENT_SHA" ] && [ "$TARGET_SHA" != "$CURRENT_SHA" ] \
            && git merge-base --is-ancestor "$TARGET_SHA" "$CURRENT_SHA"; then
            echo "$RELEASE_TAG ($TARGET_SHA) is older than tracked prod ($CURRENT_SHA)." >&2
            echo "This promotion workflow is roll-forward only because both desktop update feeds choose the newest stable release." >&2
            echo "Ship a newer fixed release for prod, or handle infrastructure rollback outside this stable-promotion path." >&2
            exit 1
          fi

          {
            echo "target_sha=$TARGET_SHA"
            echo "target_image=gcr.io/${{ vars.GCP_PROJECT_ID }}/${SERVICE}:$TARGET_SHA"
          } >> "$GITHUB_OUTPUT"

          echo "Promotion target: $RELEASE_TAG ($TARGET_SHA)" >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight Omi Bot token configuration
        id: app-token-preflight
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Preflight Omi Bot repository access
        env:
          GH_TOKEN: ${{ steps.app-token-preflight.outputs.token }}
          REPO: ${{ github.repository }}
        run: gh api "repos/${REPO}" --jq .full_name >/dev/null

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Login to GCR
        run: gcloud auth configure-docker

      - name: Preflight Firestore bridge release
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          FIRESTORE_DOC_ID: ${{ steps.plan.outputs.firestore_doc_id }}
          EXPECTED_VERSION: ${{ steps.plan.outputs.release_version }}
          EXPECTED_BUILD_NUMBER: ${{ steps.plan.outputs.release_build_number }}
        run: |
          set -euo pipefail
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          DOC_URL="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/desktop_releases/${FIRESTORE_DOC_ID}"
          FIRESTORE_DOC=$(curl -fsS \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "$DOC_URL")

          FIRESTORE_DOC="$FIRESTORE_DOC" python3 - <<'PY'
          import json
          import os
          import sys

          doc = json.loads(os.environ["FIRESTORE_DOC"])
          fields = doc.get("fields", {})

          def string_field(name):
              return fields.get(name, {}).get("stringValue", "")

          def bool_field(name):
              return fields.get(name, {}).get("booleanValue")

          def int_field(name):
              return fields.get(name, {}).get("integerValue")

          channel = string_field("channel")
          version = string_field("version")
          is_live = bool_field("is_live")
          missing = [
              name
              for name in ("version", "download_url", "ed_signature")
              if not string_field(name)
          ]
          if channel not in {"beta", "stable"}:
              print(f"Firestore bridge release must be beta or stable before prod promotion, got {channel!r}", file=sys.stderr)
              sys.exit(1)
          if version != os.environ["EXPECTED_VERSION"]:
              print(
                  f"Firestore bridge release version mismatch: expected {os.environ['EXPECTED_VERSION']!r}, got {version!r}",
                  file=sys.stderr,
              )
              sys.exit(1)
          build_number = int_field("build_number")
          if build_number is None or int(build_number) != int(os.environ["EXPECTED_BUILD_NUMBER"]):
              print(
                  f"Firestore bridge release build_number mismatch: expected {os.environ['EXPECTED_BUILD_NUMBER']!r}, got {build_number!r}",
                  file=sys.stderr,
              )
              sys.exit(1)
          if is_live is not True:
              print(f"Firestore bridge release must have is_live=true before prod promotion, got {is_live!r}", file=sys.stderr)
              sys.exit(1)
          if missing:
              print(f"Firestore bridge release is missing required field(s): {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)
          print(f"Firestore bridge release preflight OK: channel={channel}")
          PY

      - name: Check current prod backend
        id: current
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TARGET_IMAGE: ${{ steps.plan.outputs.target_image }}
          TARGET_TAG: ${{ inputs.release_tag }}
          TARGET_SHA: ${{ steps.plan.outputs.target_sha }}
        run: |
          set -euo pipefail

          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')
          CURRENT_IMAGE=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(spec.template.spec.containers[0].image)')

          HEALTH_JSON=$(curl -fsS --max-time 15 "${SERVICE_URL%/}/health" || true)
          HEALTH_MATCH=false
          if [ -n "$HEALTH_JSON" ]; then
            HEALTH_MATCH=$(HEALTH_JSON="$HEALTH_JSON" python3 - <<'PY'
          import json
          import os
          import sys

          try:
              health = json.loads(os.environ["HEALTH_JSON"])
          except Exception:
              print("false")
              sys.exit(0)

          ok = (
              health.get("release_tag") == os.environ["TARGET_TAG"]
              and health.get("release_sha") == os.environ["TARGET_SHA"]
              and health.get("release_channel") == "stable"
          )
          print("true" if ok else "false")
          PY
            )
          fi

          DEPLOY_NEEDED=true
          if [ "$CURRENT_IMAGE" = "$TARGET_IMAGE" ] && [ "$HEALTH_MATCH" = "true" ]; then
            DEPLOY_NEEDED=false
          fi

          {
            echo "service_url=$SERVICE_URL"
            echo "current_image=$CURRENT_IMAGE"
            echo "deploy_needed=$DEPLOY_NEEDED"
          } >> "$GITHUB_OUTPUT"

          {
            echo "Current prod image: $CURRENT_IMAGE"
            echo "Target prod image: $TARGET_IMAGE"
            echo "Health identity already matches target: $HEALTH_MATCH"
            echo "Deploy needed: $DEPLOY_NEEDED"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout release source
        if: steps.current.outputs.deploy_needed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.plan.outputs.target_sha }}
          fetch-depth: 0
          path: release-source

      - name: Set up Docker Buildx
        if: steps.current.outputs.deploy_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Google Service Account
        if: steps.current.outputs.deploy_needed == 'true'
        run: echo "${{ secrets.GCP_SERVICE_ACCOUNT }}" | base64 -d > ./release-source/desktop/macos/Backend-Rust/google-credentials.json

      - name: Validate desktop OAuth base API URL
        if: steps.current.outputs.deploy_needed == 'true'
        env:
          DESKTOP_BACKEND_BASE_API_URL: ${{ vars.DESKTOP_BACKEND_BASE_API_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DESKTOP_BACKEND_BASE_API_URL//[[:space:]]/}" ]; then
            echo "DESKTOP_BACKEND_BASE_API_URL must be configured for desktop OAuth callbacks" >&2
            exit 1
          fi

      - name: Validate desktop Calendar API key secret
        if: steps.current.outputs.deploy_needed == 'true'
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          gcloud secrets versions access latest \
            --project="$PROJECT_ID" \
            --secret=DESKTOP_GOOGLE_CALENDAR_API_KEY > /tmp/desktop-google-calendar-api-key
          python3 - <<'PY'
          from pathlib import Path

          value = Path("/tmp/desktop-google-calendar-api-key").read_bytes()
          if value.endswith(b"\n"):
              raise SystemExit("DESKTOP_GOOGLE_CALENDAR_API_KEY must not include a trailing newline")
          if len(value) != 39 or not value.startswith(b"AIza"):
              raise SystemExit("DESKTOP_GOOGLE_CALENDAR_API_KEY does not look like a Google API key")
          PY

      - name: Build and Push Desktop Backend Image
        if: steps.current.outputs.deploy_needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./release-source/desktop/macos/Backend-Rust
          file: ./release-source/desktop/macos/Backend-Rust/Dockerfile
          push: true
          tags: |
            ${{ steps.plan.outputs.target_image }}
            gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:prod
          cache-from: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache
          cache-to: type=registry,ref=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:buildcache,mode=max

      - name: Deploy Desktop Backend to Production
        if: steps.current.outputs.deploy_needed == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ steps.plan.outputs.target_image }}
          flags: '--allow-unauthenticated'
          wait: true
          env_vars: |
            FIREBASE_PROJECT_ID=based-hardware
            GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
            AGENT_GCS_BUCKET=based-hardware-agent
            BASE_API_URL=${{ vars.DESKTOP_BACKEND_BASE_API_URL }}
            OMI_DESKTOP_RELEASE_TAG=${{ inputs.release_tag }}
            OMI_DESKTOP_RELEASE_SHA=${{ steps.plan.outputs.target_sha }}
            OMI_DESKTOP_RELEASE_CHANNEL=stable
          secrets: |
            ENCRYPTION_SECRET=ENCRYPTION_SECRET:latest
            GEMINI_API_KEY=DESKTOP_GEMINI_API_KEY:latest
            OPENAI_API_KEY=OPENAI_API_KEY:latest
            REDIS_DB_PASSWORD=DESKTOP_REDIS_DB_PASSWORD:latest
            FIREBASE_API_KEY=DESKTOP_FIREBASE_API_KEY:latest
            REDIS_DB_HOST=DESKTOP_REDIS_DB_HOST:latest
            REDIS_DB_PORT=DESKTOP_REDIS_DB_PORT:latest
            DEEPGRAM_API_KEY=DESKTOP_DEEPGRAM_API_KEY:latest
            ANTHROPIC_API_KEY=DESKTOP_ANTHROPIC_API_KEY:latest
            DESKTOP_LEGACY_ANTHROPIC_KEY=DESKTOP_LEGACY_ANTHROPIC_KEY:latest
            GOOGLE_CALENDAR_API_KEY=DESKTOP_GOOGLE_CALENDAR_API_KEY:latest
            RELEASE_SECRET=RELEASE_SECRET:latest

      - name: Route traffic to deployed desktop-backend revision
        if: steps.current.outputs.deploy_needed == 'true'
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          REVISION="$(gcloud run services describe "$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --format='value(status.latestCreatedRevisionName)')"
          if [ -z "$REVISION" ]; then
            echo "Could not determine latest desktop-backend revision" >&2
            exit 1
          fi
          gcloud run services update-traffic "$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --to-revisions="$REVISION=100" \
            --quiet

      - name: Verify prod backend release identity
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          TARGET_TAG: ${{ inputs.release_tag }}
          TARGET_SHA: ${{ steps.plan.outputs.target_sha }}
        run: |
          set -euo pipefail

          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')

          for attempt in $(seq 1 30); do
            HEALTH_JSON=$(curl -fsS --max-time 15 "${SERVICE_URL%/}/health" || true)
            if [ -n "$HEALTH_JSON" ]; then
              if HEALTH_JSON="$HEALTH_JSON" python3 - <<'PY'
          import json
          import os
          import sys

          health = json.loads(os.environ["HEALTH_JSON"])
          expected = {
              "release_tag": os.environ["TARGET_TAG"],
              "release_sha": os.environ["TARGET_SHA"],
              "release_channel": "stable",
          }
          mismatches = {
              key: {"expected": value, "actual": health.get(key)}
              for key, value in expected.items()
              if health.get(key) != value
          }
          if mismatches:
              print(json.dumps({"health": health, "mismatches": mismatches}, indent=2))
              sys.exit(1)
          print(json.dumps(health, indent=2))
          PY
              then
                echo "Verified prod backend identity at $SERVICE_URL/health" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi
            echo "Waiting for prod backend identity ($attempt/30)..."
            sleep 10
          done

          echo "Prod backend did not report the promoted release identity." >&2
          exit 1

      - name: Promote Firestore release stable
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          FIRESTORE_DOC_ID: ${{ steps.plan.outputs.firestore_doc_id }}
        run: |
          set -euo pipefail

          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')
          RELEASE_SECRET=$(gcloud secrets versions access latest \
            --secret=RELEASE_SECRET \
            --project "$PROJECT_ID")

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X PATCH \
            -H "Content-Type: application/json" \
            -H "X-Release-Secret: $RELEASE_SECRET" \
            -d "{\"doc_id\":\"${FIRESTORE_DOC_ID}\"}" \
            "${SERVICE_URL%/}/updates/releases/promote")

          HTTP_CODE=$(printf '%s\n' "$RESPONSE" | tail -n1)
          BODY=$(printf '%s\n' "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" = "200" ]; then
            NEW_CHANNEL=$(BODY="$BODY" python3 - <<'PY'
          import json
          import os

          print(json.loads(os.environ["BODY"]).get("new_channel", ""))
          PY
            )
            if [ "$NEW_CHANNEL" != "stable" ]; then
              echo "$BODY" >&2
              echo "Firestore release $FIRESTORE_DOC_ID promoted to $NEW_CHANNEL, not stable." >&2
              exit 1
            fi
            echo "Promoted Firestore release $FIRESTORE_DOC_ID to stable" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$HTTP_CODE" = "400" ] && printf '%s\n' "$BODY" | grep -qi "already on stable"; then
            echo "Firestore release $FIRESTORE_DOC_ID is already stable" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$BODY" >&2
            echo "Failed to promote Firestore release $FIRESTORE_DOC_ID (HTTP $HTTP_CODE)" >&2
            exit 1
          fi

      - name: Advance explicit stable pointer
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          ADMIN_KEY=$(gcloud secrets versions access latest \
            --secret=ADMIN_KEY \
            --project "$PROJECT_ID")
          python3 - "$RELEASE_TAG" <<'PY' > /tmp/desktop-stable-pointer.json
          import json
          import sys
          print(json.dumps({"platform": "macos", "channel": "stable", "release_id": sys.argv[1]}))
          PY
          curl -fsS \
            -X POST \
            -H "Content-Type: application/json" \
            -H "secret-key: $ADMIN_KEY" \
            --data-binary @/tmp/desktop-stable-pointer.json \
            https://api.omi.me/v2/desktop/channels/promote \
            > /tmp/desktop-stable-pointer-response.json
          python3 -m json.tool /tmp/desktop-stable-pointer-response.json
          echo "Advanced explicit stable pointer to $RELEASE_TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Omi Bot token for release mutations
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Mark GitHub Release stable
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" --repo "$REPO" --json body -q .body > /tmp/release-body.md
          python3 .github/scripts/mark-desktop-release-stable.py \
            --input /tmp/release-body.md \
            --output /tmp/release-body-stable.md
          gh release edit "$RELEASE_TAG" --repo "$REPO" --notes-file /tmp/release-body-stable.md

      - name: Clear desktop update cache
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          ADMIN_KEY=$(gcloud secrets versions access latest \
            --secret=ADMIN_KEY \
            --project "$PROJECT_ID" 2>/dev/null || true)
          if [ -z "$ADMIN_KEY" ]; then
            echo "ADMIN_KEY unavailable; skipping desktop update cache clear." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          curl -fsS \
            -X POST \
            -H "secret-key: $ADMIN_KEY" \
            "https://api.omi.me/v2/desktop/clear-cache" >/dev/null
          echo "Cleared desktop update cache" >> "$GITHUB_STEP_SUMMARY"

      - name: Advance prod-tracking tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_SHA: ${{ steps.plan.outputs.target_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/update-desktop-backend-prod-ref.json
          import json
          import os

          print(json.dumps({"sha": os.environ["TARGET_SHA"], "force": True}))
          PY
          if ! gh api --method PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TRACK_TAG}" --input /tmp/update-desktop-backend-prod-ref.json >/dev/null; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${TRACK_TAG}" -f sha="${TARGET_SHA}" >/dev/null
          fi
          echo "Promoted desktop-backend to PROD - ${{ inputs.release_tag }} (${{ steps.plan.outputs.target_sha }})" >> "$GITHUB_STEP_SUMMARY"
