name: Build Desktop Release Candidate

on:
  workflow_dispatch:
  # Fire on every macOS-affecting merge to main so a candidate is planned within
  # minutes of the merge instead of waiting for the hourly retry. The push filter
  # is intentionally coarse (the planner does the precise releasable-change check,
  # excluding CHANGELOG/AGENTS/changelog/Backend-Rust); the same quiet-window,
  # exact-SHA, and one-active-release fences below still admit at most one
  # eligible candidate at a time, so bursts collapse to the newest SHA.
  # Keep these in lockstep with DESKTOP_RELEASE_PATHS in plan-desktop-release.py
  # (a directory X there maps to 'X/**' here); test_push_paths_cover_releasable_
  # desktop_paths enforces the alignment so a releasable input can't silently
  # lose its immediate trigger.
  push:
    branches: [main]
    paths:
      - 'desktop/macos/**'
      - 'codemagic.yaml'
      - '.github/scripts/plan-desktop-release.py'
      - '.github/workflows/desktop_auto_release.yml'
      - '.github/workflows/desktop-swift-ci.yml'
  schedule:
    # Backstop retry so a merge that lands inside the quiet window (or while a
    # release is active) is still picked up after those fences clear.
    - cron: '17 * * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  plan-release:
    runs-on: ubuntu-latest
    concurrency:
      group: desktop-release-planner-main
      cancel-in-progress: false
    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
      reason: ${{ steps.plan.outputs.reason }}
      source_sha: ${{ steps.plan.outputs.source_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Plan desktop release
        id: plan
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python3 .github/scripts/plan-desktop-release.py \
            --repository "${{ github.repository }}"

      - name: Show release plan
        run: echo "${{ steps.plan.outputs.reason }}"

  pre-tag-readiness:
    needs: [plan-release]
    if: needs.plan-release.outputs.should_release == 'true'
    # Trusted self-hosted M1 — the same runner qualification uses. The runner's
    # single-job capacity plus the dev-harness ownership sentinel serialize use
    # with in-flight qualification; no prod environment or pointer secrets here.
    runs-on: [self-hosted, macos, omi-desktop-qualification]
    timeout-minutes: 60
    permissions:
      contents: read
    concurrency:
      group: desktop-pre-tag-readiness
      cancel-in-progress: false
    steps:
      - name: Fail-closed dispatch boundary
        run: |
          set -euo pipefail
          # Readiness only: contents:read, no prod environment, no release or
          # Beta/Stable pointer authority, no new secrets/environments/IAM. The
          # gate validates source + an OFFLINE stack and must never mutate prod.
          test -n "${{ needs.plan-release.outputs.source_sha }}"

      - name: Checkout exact source (persisted actions/checkout lifecycle)
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.plan-release.outputs.source_sha }}
          fetch-depth: 0

      - name: Run trusted-M1 pre-tag readiness gate
        env:
          SOURCE_SHA: ${{ needs.plan-release.outputs.source_sha }}
          OMI_READINESS_LANE: ci
        run: |
          set -euo pipefail
          desktop/macos/scripts/pre-tag-readiness.sh \
            --evidence /tmp/pre-tag-readiness-evidence.json \
            "$SOURCE_SHA"

      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-pre-tag-readiness-evidence
          path: /tmp/pre-tag-readiness-evidence.json
          if-no-files-found: error

  tag-release:
    needs: [plan-release, pre-tag-readiness]
    if: needs.plan-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: desktop-auto-release-tag-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Recheck desktop release queue before tagging
        id: recheck
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Omi Bot token not available; cannot inspect previous release build status."
            exit 1
          fi

          python3 .github/scripts/plan-desktop-release.py \
            --repository "${{ github.repository }}"

      - name: Download pre-tag readiness evidence
        if: steps.recheck.outputs.should_release == 'true'
        uses: actions/download-artifact@v7
        with:
          name: desktop-pre-tag-readiness-evidence
          path: /tmp/pre-tag-readiness

      - name: Verify readiness evidence covers the exact source
        if: steps.recheck.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          # Never trust caller claims: prove the trusted-M1 evidence covers the
          # EXACT source SHA about to be tagged, ran offline, and carries no
          # production authority. Mismatch aborts before the immutable tag.
          EVIDENCE="$(find /tmp/pre-tag-readiness -name 'pre-tag-readiness-evidence.json' | head -1)"
          test -n "$EVIDENCE" || { echo "no readiness evidence artifact found" >&2; exit 1; }
          python3 .github/scripts/verify-pre-tag-readiness.py verify \
            --evidence "$EVIDENCE" \
            --source-sha "${{ steps.recheck.outputs.source_sha }}"

      - name: Checkout exact releasable desktop source
        if: steps.recheck.outputs.should_release == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.recheck.outputs.source_sha }}
          fetch-depth: 0

      - name: Compute next version and consolidate changelog
        if: steps.recheck.outputs.should_release == 'true'
        id: version
        run: |
          # Get latest desktop release tag
          LATEST=$(git tag -l 'v*-macos' | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            VERSION="0.0.1"
          else
            # Strip v prefix and +build-macos suffix  e.g. v0.11.11+11011-macos -> 0.11.11
            VER=$(echo "$LATEST" | sed -E 's/^v([0-9.]+)\+[0-9]+-macos$/\1/')
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            PATCH=$((${PATCH:-0} + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          # Build number: 0.11.12 -> 11012  (each component * 1000, summed)
          BUILD_NUMBER=$(echo "$VERSION" | tr '.' '\n' | awk '{s=s*1000+$1}END{print s}')
          RELEASE_TAG="v${VERSION}+${BUILD_NUMBER}-macos"

          echo "Latest tag : ${LATEST:-none}"
          echo "New version: $VERSION"
          echo "New tag    : $RELEASE_TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          # Consolidate unreleased changelog fragments into a versioned release
          TODAY=$(date -u +%Y-%m-%d)
          python3 .github/scripts/desktop-changelog.py consolidate \
            --version "$VERSION" \
            --date "$TODAY" \
            --write

      - name: Commit changelog and create tag
        if: steps.recheck.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add desktop/macos/CHANGELOG.json desktop/macos/changelog
          git commit -m "chore: consolidate changelog for v${VERSION}" || echo "No changelog changes to commit"

          # The planner checked and this job checked out the newest queued
          # releasable desktop source SHA.
          # Tag this commit so Codemagic receives the consolidated release notes too.
          # NOTE: commit message must NOT contain [skip ci].
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Create and auto-merge PR to sync changelog back to main
        if: steps.recheck.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Omi Bot token not available; cannot auto-merge changelog PR."
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="changelog/v${VERSION}"

          git checkout -B "$BRANCH"
          git push --force-with-lease origin "$BRANCH"

          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            PR_URL=$(gh pr create \
              --title "Update desktop changelog for v${VERSION} [skip ci]" \
              --body "Auto-generated: consolidates unreleased changelog fragments into v${VERSION} and regenerates CHANGELOG.json." \
              --base main \
              --head "$BRANCH")
            PR_NUMBER=$(echo "$PR_URL" | awk -F/ '{print $NF}')
          fi

          # Merge changelog PR in protected branches:
          # 1) admin merge if allowed, 2) auto-merge if repo supports it, 3) regular merge if already mergeable.
          gh pr merge "$PR_NUMBER" --merge --admin || \
          gh pr merge "$PR_NUMBER" --merge --auto || \
          gh pr merge "$PR_NUMBER" --merge || \
          echo "Changelog PR #$PR_NUMBER requires manual merge."
