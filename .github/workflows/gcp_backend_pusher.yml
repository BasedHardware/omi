name: Deploy Backend Pusher to GKE

on:
#  push:
#    branches: [ "main" ]
#    paths:
#      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'
      release_version:
        description: 'Release version (optional)'
        required: false
        default: ''
      service:
        description: 'Service to deploy'
        required: false
        default: 'pusher'
      deployment_mode:
        description: 'build-and-push (normal) or chart-only (Pusher recovery only)'
        required: false
        default: 'build-and-push'
      image_repository:
        description: 'Exact approved Pusher repository for chart-only recovery'
        required: false
        default: ''
      image_digest:
        description: 'Exact sha256 digest for chart-only recovery'
        required: false
        default: ''
      ready_baseline:
        description: 'Minimum already-Ready Pusher replicas to preserve during chart-only recovery'
        required: false
        default: ''

# The LLM Gateway path reapplies shared backend-secrets; standalone pusher only
# mutates its own GKE release and therefore keeps a separate environment lock.
concurrency:
  group: ${{ (github.event.inputs.service || 'pusher') == 'llm-gateway' && format('deploy-backend-stack-{0}', github.event.inputs.environment) || format('deploy-gke-pusher-{0}', github.event.inputs.environment) }}
  cancel-in-progress: false

env:
  SERVICE: ${{ github.event.inputs.service || 'pusher' }}
  DEPLOYMENT_MODE: ${{ github.event.inputs.deployment_mode || 'build-and-push' }}
  CHART_ONLY: ${{ github.event.inputs.deployment_mode == 'chart-only' }}
  REGION: us-central1

jobs:
  deploy:
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Validate Environment Input
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "development" && "${{ github.event.inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ github.event.inputs.environment }}. Must be 'development' or 'prod'."
            exit 1
          fi
          if [[ "${{ env.SERVICE }}" != "pusher" && "${{ env.SERVICE }}" != "llm-gateway" ]]; then
            echo "Invalid service: ${{ env.SERVICE }}. Must be 'pusher' or 'llm-gateway'."
            exit 1
          fi
          if [[ "${{ env.SERVICE }}" == "llm-gateway" && "${{ github.event.inputs.environment }}" != "development" ]]; then
            echo "LLM Gateway deploys are dev-only until the prod launch checklist is explicitly completed."
            exit 1
          fi
          if [[ "${{ env.DEPLOYMENT_MODE }}" != "build-and-push" && "${{ env.DEPLOYMENT_MODE }}" != "chart-only" ]]; then
            echo "deployment_mode must be build-and-push or chart-only."
            exit 1
          fi
          if [[ "${{ env.DEPLOYMENT_MODE }}" == "chart-only" ]]; then
            if [[ "${{ env.SERVICE }}" != "pusher" ]]; then
              echo "chart-only recovery is Pusher-only."
              exit 1
            fi
            if [[ "${{ github.event.inputs.image_repository }}" != "gcr.io/${{ vars.GCP_PROJECT_ID }}/pusher" ]]; then
              echo "chart-only recovery repository is not the selected environment's approved Pusher repository."
              exit 1
            fi
            if [[ ! "${{ github.event.inputs.image_digest }}" =~ ^sha256:[a-f0-9]{64}$ ]]; then
              echo "chart-only recovery requires an exact sha256 digest."
              exit 1
            fi
            if [[ ! "${{ github.event.inputs.ready_baseline }}" =~ ^[1-9][0-9]*$ ]]; then
              echo "chart-only recovery requires a positive Ready containment baseline."
              exit 1
            fi
          fi

      # To workaround "no space left on device" issue of GitHub-hosted runner
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.environment == 'prod' && 'main' || github.event.inputs.branch }}
          fetch-depth: 0

      - name: Admit checked-out production source and image identity
        run: |
          set -euo pipefail
          python3 -m pip install -q pyyaml
          CHECKED_OUT_SHA=$(git rev-parse HEAD)
          if [[ "${{ github.event.inputs.environment }}" == prod ]]; then
            git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
            if ! git merge-base --is-ancestor "$CHECKED_OUT_SHA" origin/main; then
              echo "ERROR: checked-out HEAD $CHECKED_OUT_SHA is not an ancestor of fresh origin/main $(git rev-parse origin/main)." >&2
              exit 1
            fi
          fi
          IMAGE_TAG=$(git rev-parse --short=7 "$CHECKED_OUT_SHA")
          echo "Admitted deployment source: $CHECKED_OUT_SHA"
          echo "CHECKED_OUT_SHA=$CHECKED_OUT_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Bootstrap LLM Gateway dev service token
        if: env.SERVICE == 'llm-gateway' && github.event.inputs.environment == 'development'
        run: |
          SECRET_NAME="OMI_LLM_GATEWAY_SERVICE_TOKEN"
          if gcloud secrets describe "$SECRET_NAME" --project="${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            if [[ "${{ github.event.inputs.release_version }}" == "rotate-dev-token" ]]; then
              echo "Rotating $SECRET_NAME in ${{ vars.GCP_PROJECT_ID }}."
              openssl rand -base64 48 | tr -d '\n' | gcloud secrets versions add "$SECRET_NAME" \
                --project="${{ vars.GCP_PROJECT_ID }}" \
                --data-file=- >/dev/null
              exit 0
            fi
            echo "$SECRET_NAME already exists in ${{ vars.GCP_PROJECT_ID }}."
            exit 0
          fi

          echo "Creating $SECRET_NAME in ${{ vars.GCP_PROJECT_ID }}."
          # Tolerate a concurrent create from another workflow run losing the
          # check-then-create race (ALREADY_EXISTS); the secret existing is the
          # desired end state regardless of which run created it.
          openssl rand -base64 48 | tr -d '\n' | gcloud secrets create "$SECRET_NAME" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --replication-policy="automatic" \
            --data-file=- >/dev/null || {
              if gcloud secrets describe "$SECRET_NAME" --project="${{ vars.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
                echo "$SECRET_NAME now exists (created concurrently by another run)."
                exit 0
              fi
              echo "Failed to create or find $SECRET_NAME." >&2
              exit 1
            }

      - name: Login to GCR
        if: env.CHART_ONLY != 'true'
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        if: env.CHART_ONLY != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker image
        if: env.CHART_ONLY != 'true'
        run: |
          if [[ "${{ env.SERVICE }}" == "llm-gateway" ]]; then
            docker build -t gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG} -f backend/Dockerfile .
            python3 backend/scripts/runtime_image_contracts.py smoke \
              --dockerfile backend/Dockerfile \
              --image gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}
          else
            docker build -t gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG} -f backend/pusher/Dockerfile .
            python3 backend/scripts/runtime_image_contracts.py smoke \
              --dockerfile backend/pusher/Dockerfile \
              --image gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}
          fi
          docker push gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Resolve production pusher runtime targets
        if: env.SERVICE == 'pusher' && vars.ENV == 'prod' && env.CHART_ONLY != 'true'
        id: pusher-runtime-targets
        run: |
          set -euo pipefail
          SYNC_SERVICE_URL="$(
            gcloud run services describe backend-sync \
              --region="${{ env.REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status.url)'
          )"
          SYNC_TASKS_INVOKER_SA="$(
            gcloud run services describe backend-sync \
              --region="${{ env.REGION }}" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --format=json \
              | jq -r '.spec.template.spec.containers[0].env[]? | select(.name == "SYNC_TASKS_INVOKER_SA") | .value'
          )"
          test -n "$SYNC_SERVICE_URL"
          test -n "$SYNC_TASKS_INVOKER_SA"
          {
            echo "account_deletion_handler_url=${SYNC_SERVICE_URL}/v1/users/account-deletion-wipes/run"
            echo "sync_tasks_handler_url=${SYNC_SERVICE_URL}/v2/sync-jobs/run"
            echo "sync_tasks_invoker_sa=${SYNC_TASKS_INVOKER_SA}"
          } >> "$GITHUB_OUTPUT"

      - name: Apply non-secret pusher runtime config
        if: env.SERVICE == 'pusher' && env.CHART_ONLY != 'true'
        env:
          ACCOUNT_DELETION_HANDLER_URL: ${{ steps.pusher-runtime-targets.outputs.account_deletion_handler_url }}
          CONVERSATION_SUMMARIZED_APP_IDS: ${{ vars.CONVERSATION_SUMMARIZED_APP_IDS }}
          ENVIRONMENT: ${{ vars.ENV }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          MCP_AUTHORIZATION_SERVER_URL: ${{ vars.MCP_AUTHORIZATION_SERVER_URL }}
          MCP_OAUTH_CHATGPT_CLIENT_ID: ${{ vars.MCP_OAUTH_CHATGPT_CLIENT_ID }}
          MCP_OAUTH_CHATGPT_REDIRECT_URIS: ${{ vars.MCP_OAUTH_CHATGPT_REDIRECT_URIS }}
          MCP_OAUTH_CLAUDE_CLIENT_ID: ${{ vars.MCP_OAUTH_CLAUDE_CLIENT_ID }}
          MCP_OAUTH_CLAUDE_CLIENT_NAME: ${{ vars.MCP_OAUTH_CLAUDE_CLIENT_NAME }}
          MCP_OAUTH_CLAUDE_REDIRECT_URIS: ${{ vars.MCP_OAUTH_CLAUDE_REDIRECT_URIS }}
          MCP_OAUTH_PUBLIC_CLIENT_ID: ${{ vars.MCP_OAUTH_PUBLIC_CLIENT_ID }}
          MCP_OAUTH_PUBLIC_REDIRECT_URIS: ${{ vars.MCP_OAUTH_PUBLIC_REDIRECT_URIS }}
          MCP_RESOURCE_URL: ${{ vars.MCP_RESOURCE_URL }}
          RAPID_API_HOST: ${{ vars.RAPID_API_HOST }}
          REDIS_DB_HOST: ${{ vars.REDIS_DB_HOST }}
          STT_PRERECORDED_MODEL: modulate-velma-2,parakeet
          STT_SERVICE_MODELS: modulate-velma-2,parakeet
          SYNC_TASKS_HANDLER_URL: ${{ steps.pusher-runtime-targets.outputs.sync_tasks_handler_url }}
          SYNC_TASKS_INVOKER_SA: ${{ steps.pusher-runtime-targets.outputs.sync_tasks_invoker_sa }}
          TYPESENSE_HOST: ${{ vars.TYPESENSE_HOST }}
          TWILIO_ACCOUNT_SID: ${{ vars.TWILIO_ACCOUNT_SID }}
          TWILIO_API_KEY_SID: ${{ vars.TWILIO_API_KEY_SID }}
          TWILIO_TWIML_APP_SID: ${{ vars.TWILIO_TWIML_APP_SID }}
          X_OAUTH_CLIENT_ID: ${{ vars.X_OAUTH_CLIENT_ID }}
          X_OAUTH_REDIRECT_URI: ${{ vars.X_OAUTH_REDIRECT_URI }}
        run: backend/scripts/deploy-backend-config.sh

      - name: Preflight pusher ConfigMap and Secret references
        if: env.SERVICE == 'pusher' && env.CHART_ONLY != 'true'
        run: |
          python3 -m pip install -q pyyaml
          python3 backend/scripts/verify_pusher_config_references.py \
            --environment ${{ vars.ENV }} --namespace ${{ vars.ENV }}-omi-backend

      - name: Capture and validate chart-only Pusher recovery
        if: env.SERVICE == 'pusher' && env.CHART_ONLY == 'true'
        run: |
          set -euo pipefail
          NAMESPACE="${{ vars.ENV }}-omi-backend"
          RELEASE="${{ vars.ENV }}-omi-pusher"
          DEPLOYMENT="$RELEASE"
          CONFIGMAP="${{ vars.ENV }}-omi-backend-config"
          mkdir -p .pusher-recovery-snapshot
          # Capture identity and readiness evidence only. ConfigMap contents are
          # never printed or uploaded; the verifier reads its key names locally.
          helm history "$RELEASE" -n "$NAMESPACE" -o json > .pusher-recovery-snapshot/helm-history.json
          kubectl -n "$NAMESPACE" get deployment "$DEPLOYMENT" -o json > .pusher-recovery-snapshot/deployment.json
          kubectl -n "$NAMESPACE" get configmap "$CONFIGMAP" -o json > .pusher-recovery-snapshot/configmap.json
          kubectl -n "$NAMESPACE" get service "$RELEASE" -o json > .pusher-recovery-snapshot/service.json
          kubectl -n "$NAMESPACE" get hpa "$RELEASE" -o json > .pusher-recovery-snapshot/hpa.json
          kubectl -n "$NAMESPACE" get pdb "$RELEASE" -o json > .pusher-recovery-snapshot/pdb.json
          kubectl -n "$NAMESPACE" get ingress "$RELEASE" -o json > .pusher-recovery-snapshot/ingress.json
          kubectl -n "$NAMESPACE" get serviceaccount "$RELEASE" -o json > .pusher-recovery-snapshot/serviceaccount.json
          kubectl -n "$NAMESPACE" get backendconfig "${{ vars.ENV }}-pusher-backend-config" -o json > .pusher-recovery-snapshot/backendconfig.json
          kubectl -n "$NAMESPACE" get rs -l app.kubernetes.io/instance="$RELEASE" -o json > .pusher-recovery-snapshot/replicasets.json
          kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/instance="$RELEASE" -o json > .pusher-recovery-snapshot/pods.json
          helm template "$RELEASE" ./backend/charts/pusher \
            -f "./backend/charts/pusher/${{ vars.ENV }}_omi_pusher_values.yaml" \
            --set-string "image.repository=${{ github.event.inputs.image_repository }}" \
            --set-string 'image.tag=' \
            --set-string "image.digest=${{ github.event.inputs.image_digest }}" \
            > .pusher-recovery-snapshot/rendered.yaml
          python3 -m pip install -q pyyaml
          python3 backend/scripts/verify_pusher_config_references.py \
            --environment "${{ vars.ENV }}" --namespace "$NAMESPACE" \
            --rendered .pusher-recovery-snapshot/rendered.yaml
          python3 backend/scripts/verify_pusher_chart_only_recovery.py preflight \
            --environment "${{ vars.ENV }}" --namespace "$NAMESPACE" --release "$RELEASE" --deployment "$DEPLOYMENT" \
            --repository "${{ github.event.inputs.image_repository }}" --expected-repository "gcr.io/${{ vars.GCP_PROJECT_ID }}/pusher" \
            --digest "${{ github.event.inputs.image_digest }}" --ready-baseline "${{ github.event.inputs.ready_baseline }}" \
            --live-deployment .pusher-recovery-snapshot/deployment.json \
            --live-configmap .pusher-recovery-snapshot/configmap.json \
            --live-service .pusher-recovery-snapshot/service.json \
            --live-hpa .pusher-recovery-snapshot/hpa.json \
            --live-pdb .pusher-recovery-snapshot/pdb.json \
            --live-ingress .pusher-recovery-snapshot/ingress.json \
            --live-serviceaccount .pusher-recovery-snapshot/serviceaccount.json \
            --live-backendconfig .pusher-recovery-snapshot/backendconfig.json \
            --live-pods .pusher-recovery-snapshot/pods.json \
            --rendered .pusher-recovery-snapshot/rendered.yaml \
            --evidence pusher-recovery-evidence.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          snapshot = Path(".pusher-recovery-snapshot")

          def load_json(name):
              return json.loads((snapshot / name).read_text(encoding="utf-8"))

          def object_identity(obj):
              metadata = obj.get("metadata", {})
              return {
                  "kind": obj.get("kind"),
                  "name": metadata.get("name"),
                  "namespace": metadata.get("namespace"),
                  "resourceVersion": metadata.get("resourceVersion"),
                  "uid": metadata.get("uid"),
                  "generation": metadata.get("generation"),
              }

          pods = load_json("pods.json")
          replicasets = load_json("replicasets.json")
          helm_history = load_json("helm-history.json")
          rollback = {
              "helm_history": [
                  {key: item.get(key) for key in ("revision", "updated", "status", "chart", "app_version", "description")}
                  for item in helm_history
              ],
              "deployment": object_identity(load_json("deployment.json")),
              "replicasets": [object_identity(item) for item in replicasets.get("items", [])],
              "ready_pods": [
                  object_identity(item)
                  for item in pods.get("items", [])
                  if any(status.get("name") == "pusher" and status.get("ready") for status in item.get("status", {}).get("containerStatuses", []))
              ],
          }
          Path("pusher-recovery-rollback-identity.json").write_text(json.dumps(rollback, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload redacted chart-only recovery evidence
        if: always() && env.SERVICE == 'pusher' && env.CHART_ONLY == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: pusher-chart-only-recovery-evidence-${{ github.run_id }}
          path: |
            pusher-recovery-evidence.json
            pusher-recovery-rollback-identity.json
          if-no-files-found: ignore

      - name: Deploy Pusher to GKE cluster using Helm
        env:
          LLM_GATEWAY_GSA: ${{ vars.LLM_GATEWAY_GSA }}
          ENVIRONMENT: ${{ vars.ENV }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          REGION: ${{ env.REGION }}
        run: |
          if [[ "${{ env.SERVICE }}" == "llm-gateway" ]]; then
            test -n "$LLM_GATEWAY_GSA"
            python3 -m pip install -q pyyaml
            python3 backend/scripts/validate-llm-gateway-env.py \
              backend/charts/backend-listen/${{ vars.ENV }}_omi_backend_listen_values.yaml \
              backend/charts/llm-gateway/${{ vars.ENV }}_omi_llm_gateway_values.yaml
            if ! IMAGE_TAG="${IMAGE_TAG}" backend/scripts/deploy-llm-gateway.sh; then
              python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service llm-gateway || true
              echo "=== llm-gateway deployment ==="
              kubectl -n ${{ vars.ENV }}-omi-backend describe deploy/${{ vars.ENV }}-omi-llm-gateway || true
              echo "=== llm-gateway pods ==="
              kubectl -n ${{ vars.ENV }}-omi-backend get pods -l app.kubernetes.io/instance=${{ vars.ENV }}-omi-llm-gateway -o wide || true
              kubectl -n ${{ vars.ENV }}-omi-backend describe pods -l app.kubernetes.io/instance=${{ vars.ENV }}-omi-llm-gateway || true
              # NOTE: raw `kubectl logs` is intentionally omitted here because the gateway is an
              # OpenAI-compatible service that processes chat content and service tokens — its
              # runtime logs may leak sensitive payloads into CI output. Use `gcloud compute ssh`,
              # `kubectl logs` interactively from an authenticated operator shell, or structured
              # error reporting instead of dumping raw logs in CI.
              echo "=== backend ExternalSecret status ==="
              kubectl -n ${{ vars.ENV }}-omi-backend describe externalsecret/${{ vars.ENV }}-omi-backend-external-secret || true
              echo "=== backend secret key presence ==="
              kubectl -n ${{ vars.ENV }}-omi-backend get secret ${{ vars.ENV }}-omi-backend-secrets -o jsonpath='{.data}' | python -c 'import json,sys; print("\\n".join(sorted(json.load(sys.stdin).keys())))' || true
              exit 1
            fi
            python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service llm-gateway
          else
            if [[ "${{ env.CHART_ONLY }}" == "true" ]]; then
              # Re-read the live objects immediately before mutation. The
              # verifier fails closed if the digest, ConfigMap key reference,
              # ready baseline, or target identity can no longer be proven.
              NAMESPACE="${{ vars.ENV }}-omi-backend"
              RELEASE="${{ vars.ENV }}-omi-pusher"
              kubectl -n "$NAMESPACE" get deployment "$RELEASE" -o json > .pusher-recovery-snapshot/preapply-deployment.json
              kubectl -n "$NAMESPACE" get configmap "${{ vars.ENV }}-omi-backend-config" -o json > .pusher-recovery-snapshot/preapply-configmap.json
              kubectl -n "$NAMESPACE" get service "$RELEASE" -o json > .pusher-recovery-snapshot/preapply-service.json
              kubectl -n "$NAMESPACE" get hpa "$RELEASE" -o json > .pusher-recovery-snapshot/preapply-hpa.json
              kubectl -n "$NAMESPACE" get pdb "$RELEASE" -o json > .pusher-recovery-snapshot/preapply-pdb.json
              kubectl -n "$NAMESPACE" get pods -l app.kubernetes.io/instance="$RELEASE" -o json > .pusher-recovery-snapshot/preapply-pods.json
              kubectl -n "$NAMESPACE" get ingress "$RELEASE" -o json > .pusher-recovery-snapshot/preapply-ingress.json
              kubectl -n "$NAMESPACE" get serviceaccount "$RELEASE" -o json > .pusher-recovery-snapshot/preapply-serviceaccount.json
              kubectl -n "$NAMESPACE" get backendconfig "${{ vars.ENV }}-pusher-backend-config" -o json > .pusher-recovery-snapshot/preapply-backendconfig.json
              python3 backend/scripts/verify_pusher_config_references.py \
                --environment "${{ vars.ENV }}" --namespace "$NAMESPACE" \
                --rendered .pusher-recovery-snapshot/rendered.yaml
              python3 backend/scripts/verify_pusher_chart_only_recovery.py preflight \
                --environment "${{ vars.ENV }}" --namespace "$NAMESPACE" --release "$RELEASE" --deployment "$RELEASE" \
                --repository "${{ github.event.inputs.image_repository }}" --expected-repository "gcr.io/${{ vars.GCP_PROJECT_ID }}/pusher" \
                --digest "${{ github.event.inputs.image_digest }}" --ready-baseline "${{ github.event.inputs.ready_baseline }}" \
                --live-deployment .pusher-recovery-snapshot/preapply-deployment.json \
                --live-configmap .pusher-recovery-snapshot/preapply-configmap.json \
                --live-service .pusher-recovery-snapshot/preapply-service.json \
                --live-hpa .pusher-recovery-snapshot/preapply-hpa.json \
                --live-pdb .pusher-recovery-snapshot/preapply-pdb.json \
                --live-ingress .pusher-recovery-snapshot/preapply-ingress.json \
                --live-serviceaccount .pusher-recovery-snapshot/preapply-serviceaccount.json \
                --live-backendconfig .pusher-recovery-snapshot/preapply-backendconfig.json \
                --live-pods .pusher-recovery-snapshot/preapply-pods.json \
                --rendered .pusher-recovery-snapshot/rendered.yaml \
                --expected-evidence pusher-recovery-evidence.json
              helm -n "$NAMESPACE" upgrade "$RELEASE" ./backend/charts/pusher \
                -f "./backend/charts/pusher/${{ vars.ENV }}_omi_pusher_values.yaml" \
                --set-string "image.repository=${{ github.event.inputs.image_repository }}" \
                --set-string 'image.tag=' \
                --set-string "image.digest=${{ github.event.inputs.image_digest }}"
            else
              helm -n ${{ vars.ENV }}-omi-backend upgrade --install ${{ vars.ENV }}-omi-pusher ./backend/charts/pusher -f ./backend/charts/pusher/${{ vars.ENV }}_omi_pusher_values.yaml --set-string "image.tag=${IMAGE_TAG}"
            fi
            # Must cover the chart-derived Pusher rollout budget (fourteen
            # availability waves at the current production HPA ceiling).
            if ! kubectl -n ${{ vars.ENV }}-omi-backend rollout status deploy/${{ vars.ENV }}-omi-pusher --timeout=9600s; then
              python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service pusher || true
              exit 1
            fi
            if [[ "${{ env.CHART_ONLY }}" == "true" ]]; then
              kubectl -n ${{ vars.ENV }}-omi-backend get deployment ${{ vars.ENV }}-omi-pusher -o json > .pusher-recovery-snapshot/postrollout-deployment.json
              python3 backend/scripts/verify_pusher_chart_only_recovery.py postverify \
                --environment "${{ vars.ENV }}" --namespace "${{ vars.ENV }}-omi-backend" --deployment "${{ vars.ENV }}-omi-pusher" \
                --repository "${{ github.event.inputs.image_repository }}" --expected-repository "gcr.io/${{ vars.GCP_PROJECT_ID }}/pusher" \
                --digest "${{ github.event.inputs.image_digest }}" --ready-baseline "${{ github.event.inputs.ready_baseline }}" \
                --live-deployment .pusher-recovery-snapshot/postrollout-deployment.json
            fi
            python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service pusher
          fi

      - name: Verify LLM Gateway serving data plane
        if: env.SERVICE == 'llm-gateway'
        id: gateway-serving
        run: |
          python3 backend/scripts/verify-llm-gateway-serving.py \
            --environment="${{ vars.ENV }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Probe LLM Gateway from the Cloud Run VPC
        if: env.SERVICE == 'llm-gateway'
        run: |
          bash backend/scripts/probe-llm-gateway-from-cloud-run.sh \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ env.REGION }}" \
            --image "gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}" \
            --gateway-url "${{ steps.gateway-serving.outputs.gateway_url }}" \
            --network "${{ vars.CLOUD_RUN_VPC_NETWORK }}" \
            --subnet "${{ vars.CLOUD_RUN_VPC_SUBNET }}" \
            --vpc-egress private-ranges-only \
            --name-suffix "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

      - name: Smoke LLM Gateway
        if: env.SERVICE == 'llm-gateway'
        run: |
          SMOKE_POD="llm-gateway-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT:-1}"
          cleanup() {
            kubectl -n ${{ vars.ENV }}-omi-backend delete pod "$SMOKE_POD" --ignore-not-found=true
          }
          trap cleanup EXIT

          cat <<EOF | kubectl -n ${{ vars.ENV }}-omi-backend apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: $SMOKE_POD
          spec:
            restartPolicy: Never
            containers:
              - name: smoke
                image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}
                command: ["sh", "-c", "python scripts/smoke-llm-gateway.py --url \"\$SMOKE_URL\" --token \"\$SMOKE_TOKEN\" --check-metrics --metrics-token \"\$METRICS_SECRET\""]
                env:
                  - name: SMOKE_URL
                    value: http://${{ vars.ENV }}-omi-llm-gateway.${{ vars.ENV }}-omi-backend.svc.cluster.local:8080
                  - name: SMOKE_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: ${{ vars.ENV }}-omi-backend-secrets
                        key: OMI_LLM_GATEWAY_SERVICE_TOKEN
                  - name: METRICS_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: ${{ vars.ENV }}-omi-backend-secrets
                        key: METRICS_SECRET
          EOF

          for _ in {1..120}; do
            PHASE="$(kubectl -n ${{ vars.ENV }}-omi-backend get pod "$SMOKE_POD" -o jsonpath='{.status.phase}' 2>/dev/null || true)"
            if [[ "$PHASE" == "Succeeded" ]]; then
              echo "=== llm-gateway smoke pod ==="
              kubectl -n ${{ vars.ENV }}-omi-backend get pod "$SMOKE_POD" -o wide || true
              kubectl -n ${{ vars.ENV }}-omi-backend get pod "$SMOKE_POD" -o jsonpath='{.status.phase}{"\n"}{range .status.containerStatuses[*]}{.name}{" ready="}{.ready}{" state="}{.state.terminated.reason}{" exit="}{.state.terminated.exitCode}{"\n"}{end}' || true
              echo "=== llm-gateway smoke logs ==="
              kubectl -n ${{ vars.ENV }}-omi-backend logs "$SMOKE_POD" || true
              exit 0
            fi
            if [[ "$PHASE" == "Failed" ]]; then
              break
            fi
            sleep 1
          done

          echo "=== llm-gateway smoke pod ==="
          kubectl -n ${{ vars.ENV }}-omi-backend get pod "$SMOKE_POD" -o wide || true
          kubectl -n ${{ vars.ENV }}-omi-backend get pod "$SMOKE_POD" -o jsonpath='{.status.phase}{"\n"}{range .status.containerStatuses[*]}{.name}{" ready="}{.ready}{" state="}{.state.terminated.reason}{" exit="}{.state.terminated.exitCode}{"\n"}{end}' || true
          echo "=== llm-gateway smoke logs ==="
          kubectl -n ${{ vars.ENV }}-omi-backend logs "$SMOKE_POD" || true
          exit 1

      # If required, use the Cloud Run url output in later steps
      - name: Show Output
        run: echo "${{ env.SERVICE }} deployed to ${{ github.event.inputs.environment }}"

      - name: Generate deployment summary
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-summary
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          service: ${{ env.SERVICE }}

      - name: Notify deployment status on Telegram
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-notifier
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
