name: Qualify Desktop Beta Candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Newest v*-macos candidate tag to qualify'
        required: true
        type: string

run-name: Qualify desktop beta ${{ inputs.release_tag }}

permissions:
  contents: read

concurrency:
  group: desktop-beta-qualification-${{ inputs.release_tag }}
  cancel-in-progress: false

# Sole final authority: the administrator-managed M1 downloads and exercises
# the exact canonical signed/notarized release bytes. Full source T2 belongs to
# the nightly-rigorous Codemagic release workflow before signing. This job must
# never build Swift, Rust, or application source and must never run on the M4.
jobs:
  exact-artifact-blackbox:
    runs-on: [self-hosted, macos, omi-qual-m1-studio]
    permissions:
      contents: write
    steps:
      - name: Remove stale uninitialized PlatformIO gitlink
        shell: bash
        run: |
          set -euo pipefail
          stale_gitlink="$GITHUB_WORKSPACE/omiGlass/firmware/.pio/libdeps/seeed_xiao_esp32s3/libopus"
          if [ -d "$stale_gitlink" ] && [ ! -e "$stale_gitlink/.git" ]; then
            rmdir "$stale_gitlink" || {
              echo "Refusing to remove nonempty uninitialized gitlink: $stale_gitlink" >&2
              exit 1
            }
          fi

      - name: Checkout minimal trusted artifact controls
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github/scripts
            desktop/macos/scripts/smoke-signed-desktop-artifact.sh
            desktop/macos/scripts/audit-desktop-bundle-deps.sh

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Download and validate exact canonical candidate bytes
        id: candidate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          printf '%s\n' "$RELEASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+-macos$' || {
            echo "Invalid macOS release tag: $RELEASE_TAG" >&2
            exit 1
          }
          git fetch --force origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          LATEST_TAG=$(git for-each-ref --count=1 --sort=-v:refname --format='%(refname:strip=2)' 'refs/tags/v*-macos')
          TARGET_SHA=$(git rev-parse "$RELEASE_TAG^{commit}")
          CHECKOUT_SHA=$(git rev-parse "HEAD^{commit}")
          rm -rf /tmp/desktop-beta-qualification
          mkdir -p /tmp/desktop-beta-qualification/assets
          gh release view "$RELEASE_TAG" --repo "$REPO" \
            --json tagName,body,isDraft,isPrerelease,publishedAt,assets \
            > /tmp/desktop-beta-qualification/release.json
          for asset in desktop-smoke-result.json desktop-smoke-result-beta.json release-profile-evidence.json \
            Omi.zip omi.dmg Omi.Beta.zip omi-beta.dmg; do
            gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "$asset" \
              --dir /tmp/desktop-beta-qualification/assets
          done
          python3 .github/scripts/check-desktop-auto-beta-candidate.py \
            --release-json /tmp/desktop-beta-qualification/release.json \
            --smoke-result /tmp/desktop-beta-qualification/assets/desktop-smoke-result.json \
            --beta-smoke-result /tmp/desktop-beta-qualification/assets/desktop-smoke-result-beta.json \
            --release-tag "$RELEASE_TAG" --latest-tag "$LATEST_TAG" \
            --tag-sha "$TARGET_SHA" --checkout-sha "$CHECKOUT_SHA" \
            --output /tmp/desktop-beta-qualification/candidate-gate.json
          python3 - "$TARGET_SHA" /tmp/desktop-beta-qualification/assets/release-profile-evidence.json <<'PY'
          import json, sys
          evidence = json.load(open(sys.argv[2], encoding="utf-8"))
          profile = evidence.get("release_profile")
          rigorous = evidence.get("rigorous_pre_sign_passed")
          if evidence.get("schema_version") != 1 or evidence.get("source_sha") != sys.argv[1]:
              raise SystemExit("release profile evidence does not bind the exact candidate source")
          if (profile, rigorous) not in (("nightly-rigorous", True), ("manual-fast", False)):
              raise SystemExit("release profile evidence is unknown or untruthful")
          PY
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Exercise exact signed artifacts as black boxes
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          TARGET_SHA: ${{ steps.candidate.outputs.target_sha }}
        run: |
          set -euo pipefail
          assets=/tmp/desktop-beta-qualification/assets
          OMI_SIGNED_ARTIFACT_SMOKE_ALLOW_PRODUCTION_LAUNCH=1 \
          desktop/macos/scripts/smoke-signed-desktop-artifact.sh \
            --zip "$assets/Omi.zip" --dmg "$assets/omi.dmg" \
            --tag "$RELEASE_TAG" --source-sha "$TARGET_SHA" \
            --expected-channel beta --launch --auth-storage-canary \
            --notification-callback-canary \
            --result-json /tmp/desktop-beta-qualification/exact-artifact-blackbox.json
          OMI_SIGNED_ARTIFACT_SMOKE_ALLOW_PRODUCTION_LAUNCH=1 \
          desktop/macos/scripts/smoke-signed-desktop-artifact.sh \
            --zip "$assets/Omi.Beta.zip" --dmg "$assets/omi-beta.dmg" \
            --tag "$RELEASE_TAG" --source-sha "$TARGET_SHA" \
            --expected-channel beta --expected-bundle-id com.omi.computer-macos.beta \
            --expected-feed-url 'https://api.omi.me/v2/desktop/appcast.xml?identity=beta' \
            --launch --auth-storage-canary --notification-callback-canary \
            --result-json /tmp/desktop-beta-qualification/exact-artifact-blackbox-beta.json

      - name: Create immutable qualification evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          TARGET_SHA: ${{ steps.candidate.outputs.target_sha }}
        run: |
          set -euo pipefail
          assets=/tmp/desktop-beta-qualification/assets
          python3 .github/scripts/desktop_qualification_evidence.py build \
            --release-json /tmp/desktop-beta-qualification/release.json \
            --release-tag "$RELEASE_TAG" --source-sha "$TARGET_SHA" \
            --candidate-gate /tmp/desktop-beta-qualification/candidate-gate.json \
            --release-profile-evidence "$assets/release-profile-evidence.json" \
            --blackbox-result /tmp/desktop-beta-qualification/exact-artifact-blackbox.json \
            --beta-blackbox-result /tmp/desktop-beta-qualification/exact-artifact-blackbox-beta.json \
            --qualification-run-id "$GITHUB_RUN_ID" \
            --asset "Omi.zip=$assets/Omi.zip" --asset "omi.dmg=$assets/omi.dmg" \
            --asset "Omi.Beta.zip=$assets/Omi.Beta.zip" --asset "omi-beta.dmg=$assets/omi-beta.dmg" \
            --evidence /tmp/desktop-beta-qualification/qualification-evidence.json

      - name: Upload immutable qualification evidence
        uses: actions/upload-artifact@v7
        with:
          name: desktop-qualification-evidence-${{ inputs.release_tag }}
          path: /tmp/desktop-beta-qualification/qualification-evidence.json
          if-no-files-found: error

      - name: Attach immutable qualification evidence to the candidate release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" --repo "$REPO" \
            /tmp/desktop-beta-qualification/qualification-evidence.json#"qualification-evidence-${RELEASE_TAG}.json"

      - name: Remove regenerated uninitialized PlatformIO gitlink before checkout post-action
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          stale_gitlink="$GITHUB_WORKSPACE/omiGlass/firmware/.pio/libdeps/seeed_xiao_esp32s3/libopus"
          if [ -d "$stale_gitlink" ] && [ ! -e "$stale_gitlink/.git" ]; then
            rmdir "$stale_gitlink" || {
              echo "Refusing to remove nonempty uninitialized gitlink: $stale_gitlink" >&2
              exit 1
            }
          fi
