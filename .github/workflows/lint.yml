name: Lint Check

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_BASE="origin/${{ github.base_ref }}"
          else
            DIFF_BASE="HEAD~1"
          fi
          FILES=$(git diff --name-only --diff-filter=ACM "$DIFF_BASE"...HEAD)
          echo "$FILES"
          echo "$FILES" > /tmp/changed-files.txt
          echo "diff_base=$DIFF_BASE" >> $GITHUB_OUTPUT
          echo "has_dart=$(echo "$FILES" | grep -q '\.dart$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_python=$(echo "$FILES" | grep -q 'backend/.*\.py$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_arb=$(echo "$FILES" | grep -q '\.arb$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_firmware=$(echo "$FILES" | grep -qE '^(omi|omiGlass)/.*\.(c|cpp|cc|cxx|h|hpp)$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_frontend=$(echo "$FILES" | grep -q '^web/frontend/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_web_app=$(echo "$FILES" | grep -q '^web/app/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_admin=$(echo "$FILES" | grep -q '^web/admin/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_personas=$(echo "$FILES" | grep -q '^web/personas-open-source/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_workflows=$(echo "$FILES" | grep -qE '^\.github/workflows/.*\.ya?ml$|^\.github/actionlint\.ya?ml$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_backend_runtime_env=$(echo "$FILES" | grep -qE '^backend/deploy/runtime_env\.yaml$|^backend/charts/backend-listen/.*_values\.yaml$|^backend/scripts/(render_backend_runtime_env|validate-backend-runtime-env|preflight-cloud-run-deploy|repair_cloud_run_traffic|deploy_status_report|pre-deploy-check)\.(py|sh)$|^backend/tests/unit/test_(backend_runtime_env_validator|preflight_cloud_run_deploy|repair_cloud_run_traffic|deploy_status_report)\.py$|^backend/tests/fixtures/deploy_status/|^docs/doc/developer/backend/prod_hotfix_runbook\.mdx$|^docs/docs\.json$|^\.github/workflows/gcp_backend.*\.ya?ml$|^\.github/workflows/lint\.yml$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_backend_async_gate=$(echo "$FILES" | grep -qE '^backend/.*\.py$|^\.github/workflows/lint\.yml$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_desktop_agent_runtime=$(echo "$FILES" | grep -qE '^desktop/macos/agent/|^desktop/macos/pi-mono-extension/|^desktop/macos/run\.sh$|^desktop/macos/scripts/(audit-desktop-bundle-deps|prepare-agent-runtime|prepare-desktop-bundle-native-deps|test-tool-surfaces)\.sh$|^codemagic\.yaml$|^scripts/pre-push$|^\.github/workflows/lint\.yml$' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_app_codegen=$(echo "$FILES" | grep -qE '^app/lib/|^app/pubspec\.yaml$|^app/pubspec\.lock$|^app/build\.yaml$|^app/assets/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_app_l10n=$(echo "$FILES" | grep -qE '^app/lib/l10n/.*\.arb$|^app/l10n\.yaml$' && echo true || echo false)" >> $GITHUB_OUTPUT
          # Also run the Rust check when this workflow changes so CI PRs dogfood
          # the new guard instead of only validating YAML syntax.
          echo "has_desktop_rust=$(echo "$FILES" | grep -qE '^desktop/macos/Backend-Rust/|^\.github/workflows/lint\.yml$' && echo true || echo false)" >> $GITHUB_OUTPUT
          # UserDefaults key ratchet: run when desktop Swift sources, the ratchet
          # script, or this workflow change (so the gate dogfoods itself).
          echo "has_desktop_defaults_ratchet=$(echo "$FILES" | grep -qE '^desktop/macos/Desktop/Sources/.*\.swift$|^desktop/macos/scripts/check-userdefaults-key-ratchet\.py$|^\.github/workflows/lint\.yml$' && echo true || echo false)" >> $GITHUB_OUTPUT
          # asyncAfter ratchet: run when floating-bar / PTT sources, the ratchet
          # script, or this workflow change (so the gate dogfoods itself).
          echo "has_desktop_async_after_ratchet=$(echo "$FILES" | grep -qE '^desktop/macos/Desktop/Sources/FloatingControlBar/.*\.swift$|^desktop/macos/scripts/check-async-after-ratchet\.py$|^\.github/workflows/lint\.yml$' && echo true || echo false)" >> $GITHUB_OUTPUT

      # -- Universal source hygiene --
      - name: Check merge conflict markers
        run: |
          failed=0
          while IFS= read -r file; do
            if [ -f "$file" ] && grep -I -nE '^(<<<<<<<|>>>>>>>)' "$file"; then
              failed=1
            fi
          done < /tmp/changed-files.txt

          if [ "$failed" -eq 1 ]; then
            echo "FAIL: unresolved merge conflict markers found in changed files"
            exit 1
          fi

      - name: Architecture guardrail warnings
        run: python3 .github/scripts/check_arch_guardrails.py --changed-files /tmp/changed-files.txt

      - name: Check desktop changelog data
        run: python3 .github/scripts/desktop-changelog.py validate

      - name: Check desktop changelog entry
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changelog/v')
        run: |
          SKIP_FLAG=""
          if [ "${{ contains(github.event.pull_request.labels.*.name, 'no-changelog-needed') }}" = "true" ]; then
            SKIP_FLAG="--skip"
          fi

          python3 .github/scripts/check-desktop-changelog.py \
            --base "origin/${{ github.base_ref }}" \
            --head HEAD \
            $SKIP_FLAG

      - name: Check desktop prod promotion policy
        run: python3 .github/scripts/check-desktop-prod-promotion-policy.py

      - name: Test desktop release promotion gate
        run: python3 .github/scripts/test_check_desktop_release_promotion.py

      - name: Check release process guards
        run: python3 .github/scripts/check-release-process-guards.py

      - name: Check backend runtime env manifest
        if: steps.changed.outputs.has_backend_runtime_env == 'true'
        run: |
          python3 -m pip install -q pyyaml pytest
          CLOUD_RUN_VPC_NETWORK=offline-check-network \
          CLOUD_RUN_VPC_SUBNET=offline-check-subnet \
            backend/scripts/pre-deploy-check.sh

      - name: Summarize deferred-work markers
        continue-on-error: true
        run: python3 .github/scripts/deferred-work-marker-count.py --format github-summary >> "$GITHUB_STEP_SUMMARY"

      - name: Check desktop UserDefaults key ratchet
        if: steps.changed.outputs.has_desktop_defaults_ratchet == 'true'
        run: python3 desktop/macos/scripts/check-userdefaults-key-ratchet.py

      - name: Check desktop asyncAfter ratchet
        if: steps.changed.outputs.has_desktop_async_after_ratchet == 'true'
        run: python3 desktop/macos/scripts/check-async-after-ratchet.py

      - name: Check GitHub Actions workflows
        if: steps.changed.outputs.has_workflows == 'true'
        run: |
          GOBIN=/tmp/actionlint-bin go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          FILES=$(grep -E '^\.github/workflows/.*\.ya?ml$' /tmp/changed-files.txt || true)
          if [ -n "$FILES" ]; then
            /tmp/actionlint-bin/actionlint -shellcheck "" $FILES
          fi

      # -- Dart --
      - name: Setup Flutter
        if: steps.changed.outputs.has_dart == 'true' || steps.changed.outputs.has_app_codegen == 'true' || steps.changed.outputs.has_app_l10n == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve Flutter dependencies
        if: steps.changed.outputs.has_dart == 'true' || steps.changed.outputs.has_app_codegen == 'true' || steps.changed.outputs.has_app_l10n == 'true'
        working-directory: app
        run: flutter pub get

      - name: Check Flutter generated code
        if: steps.changed.outputs.has_app_codegen == 'true'
        working-directory: app
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code -- lib || {
            echo "Generated Dart files are stale. Run: cd app && dart run build_runner build --delete-conflicting-outputs"
            exit 1
          }
          if [ -n "$(git ls-files --others --exclude-standard -- lib)" ]; then
            echo "Generated Dart files are stale; untracked generated files were produced:"
            git ls-files --others --exclude-standard -- lib
            exit 1
          fi

      - name: Check Flutter l10n
        if: steps.changed.outputs.has_app_l10n == 'true'
        working-directory: app
        run: |
          flutter gen-l10n
          git diff --exit-code -- lib/l10n || {
            echo "Generated localization files are stale. Run: cd app && flutter gen-l10n"
            exit 1
          }
          if [ -n "$(git ls-files --others --exclude-standard -- lib/l10n)" ]; then
            echo "Generated localization files are stale; untracked generated files were produced:"
            git ls-files --others --exclude-standard -- lib/l10n
            exit 1
          fi

      - name: Check Dart formatting
        if: steps.changed.outputs.has_dart == 'true'
        run: |
          FILES=$(grep '\.dart$' /tmp/changed-files.txt | grep -v -e '\.gen\.dart$' -e '\.g\.dart$' || true)
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs dart format --line-length 120 --set-exit-if-changed --output=none
          fi

      # -- Python --
      - name: Check Python formatting
        if: steps.changed.outputs.has_python == 'true'
        run: |
          pip install -q black
          FILES=$(grep 'backend/.*\.py$' /tmp/changed-files.txt || true)
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs black --check --line-length 120 --skip-string-normalization
          fi

      - name: Check backend async blockers
        if: steps.changed.outputs.has_backend_async_gate == 'true'
        run: |
          python3 backend/scripts/scan_async_blockers.py \
            --dirs backend/routers backend/utils \
            --diff-base "${{ steps.changed.outputs.diff_base }}" \
            --fail-on high_network_io,async_helpers_with_blocking,time_sleep,mixed_await_sync_db,no_await_should_be_def

      # -- ARB --
      - name: Check ARB formatting
        if: steps.changed.outputs.has_arb == 'true'
        run: |
          FILES=$(grep '\.arb$' /tmp/changed-files.txt || true)
          failed=0
          for f in $FILES; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "FAIL: $f is not valid JSON"
              failed=1
              continue
            fi
            if ! python3 -c "
          import json, sys
          f = sys.argv[1]
          with open(f) as fh:
              original = fh.read()
          formatted = json.dumps(json.loads(original), indent=4, ensure_ascii=False) + '\n'
          if original != formatted:
              sys.exit(1)
          " "$f" 2>/dev/null; then
              echo "FAIL: $f not formatted with 4-space indent"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "Fix: jq --indent 4 '.' <file> > tmp && mv tmp <file>"
            exit 1
          fi

      # -- C/C++ --
      - name: Check C/C++ formatting
        if: steps.changed.outputs.has_firmware == 'true'
        run: |
          FILES=$(grep -E '^(omi|omiGlass)/.*\.(c|cpp|cc|cxx|h|hpp)$' /tmp/changed-files.txt || true)
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-format --dry-run --Werror
          fi

      # -- Desktop Rust backend --
      - name: Set up desktop Rust toolchain
        if: steps.changed.outputs.has_desktop_rust == 'true'
        run: |
          cd desktop/macos/Backend-Rust
          rustup show

      - name: Cache desktop Rust backend build
        if: steps.changed.outputs.has_desktop_rust == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/macos/Backend-Rust/target
          key: ${{ runner.os }}-desktop-rust-${{ hashFiles('desktop/macos/Backend-Rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-desktop-rust-

      - name: Check desktop Rust backend
        if: steps.changed.outputs.has_desktop_rust == 'true'
        run: |
          FILES=$(grep -E '^desktop/macos/Backend-Rust/.*\.rs$' /tmp/changed-files.txt | sed 's#^desktop/macos/Backend-Rust/##' || true)
          if [ -n "$FILES" ]; then
            (
              cd desktop/macos/Backend-Rust
              printf '%s\n' "$FILES" | xargs -d '\n' rustfmt --edition 2021 --check
            )
          fi
          cd desktop/macos/Backend-Rust
          cargo check --locked

      # -- Desktop agent runtime --
      - name: Setup Node.js for desktop agent runtime
        if: steps.changed.outputs.has_desktop_agent_runtime == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            desktop/macos/agent/package-lock.json
            desktop/macos/pi-mono-extension/package-lock.json

      - name: Check desktop agent runtime
        if: steps.changed.outputs.has_desktop_agent_runtime == 'true'
        run: desktop/macos/scripts/test-tool-surfaces.sh

      # -- Frontend --
      - name: Setup Node.js
        if: steps.changed.outputs.has_frontend == 'true' || steps.changed.outputs.has_personas == 'true' || steps.changed.outputs.has_web_app == 'true' || steps.changed.outputs.has_admin == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/frontend/package-lock.json
            web/app/package-lock.json
            web/admin/package-lock.json
            web/personas-open-source/package-lock.json

      - name: Lint Frontend
        if: steps.changed.outputs.has_frontend == 'true'
        working-directory: ./web/frontend
        run: |
          npm ci
          npm run lint
          npm run lint:format -- --check

      - name: Lint Personas
        if: steps.changed.outputs.has_personas == 'true'
        working-directory: ./web/personas-open-source
        run: |
          npm ci --legacy-peer-deps
          npm run lint

      - name: Build Web App
        if: steps.changed.outputs.has_web_app == 'true'
        working-directory: ./web/app
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:dummy"
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: dummy
        run: |
          npm ci
          npm run build

      - name: Build Admin Dashboard
        if: steps.changed.outputs.has_admin == 'true'
        working-directory: ./web/admin
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789:web:dummy"
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: dummy
          NEXT_PUBLIC_PLUGINS_APP_ID: dummy
          NEXT_PUBLIC_OMI_API_URL: https://api.omiapi.com
        run: |
          npm ci
          npm run build

  desktop-swift:
    name: Desktop Swift Build & Tests
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_BASE="origin/${{ github.base_ref }}"
          else
            DIFF_BASE="HEAD~1"
          fi
          FILES=$(git diff --name-only --diff-filter=ACMRD "$DIFF_BASE"...HEAD)
          echo "$FILES"
          if echo "$FILES" | grep -qE '^desktop/macos/Desktop/|^desktop/macos/test\.sh$|^desktop/macos/scripts/swift-test-suites\.sh$|^\.github/workflows/lint\.yml$'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache SwiftPM build products
        if: steps.changed.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            desktop/macos/Desktop/.build
          key: ${{ runner.os }}-desktop-swift-${{ hashFiles('desktop/macos/Desktop/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-desktop-swift-

      - name: Install Swift system dependencies
        if: steps.changed.outputs.should_run == 'true'
        run: brew install pkg-config webp

      - name: Build desktop Swift app
        if: steps.changed.outputs.should_run == 'true'
        working-directory: desktop/macos
        run: xcrun swift build -c release --package-path Desktop --triple arm64-apple-macosx

      - name: Test desktop Swift app
        if: steps.changed.outputs.should_run == 'true'
        working-directory: desktop/macos
        run: ./scripts/swift-test-suites.sh
