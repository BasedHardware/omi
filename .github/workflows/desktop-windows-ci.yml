name: Desktop Windows CI

on:
  push:
    branches: [main]
    paths:
      - 'desktop/windows/**'
      - '.github/workflows/desktop-windows-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/windows/**'
      - '.github/workflows/desktop-windows-ci.yml'

defaults:
  run:
    working-directory: desktop/windows

jobs:
  checks:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test

  build-windows:
    name: Windows build smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Provision .env (ships public Firebase/PostHog config)
        shell: pwsh
        run: Copy-Item .env.example .env
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Tauri installers
        run: bun run build:win
      - name: Upload Tauri installers
        uses: actions/upload-artifact@v7
        with:
          name: omi-windows-installers
          path: |
            desktop/target/release/bundle/nsis/**
            desktop/target/release/bundle/msi/**
          if-no-files-found: warn
          retention-days: 7
