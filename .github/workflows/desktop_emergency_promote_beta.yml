name: Emergency Promote macOS Beta Candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Exact signed v*-macos candidate tag'
        required: true
        type: string
      source_sha:
        description: 'Immutable 40-character source SHA for the tag'
        required: true
        type: string
      expected_current_release_id:
        description: 'Current macOS beta pointer release ID observed during authorization'
        required: true
        type: string
      expected_generation:
        description: 'Current macOS beta pointer generation observed during authorization'
        required: true
        type: string
      incident_id:
        description: 'Open GitHub incident issue number with two bound MEMBER/OWNER approval comments'
        required: true
        type: string
      reason:
        description: 'Named emergency rationale'
        required: true
        type: string
      expires_at:
        description: 'UTC ISO-8601 authorization expiry, no more than four hours away'
        required: true
        type: string
      behavioral_evidence_url:
        description: 'HTTPS URL to incident-specific behavioral evidence for this signed candidate'
        required: true
        type: string
      confirm:
        description: 'Type emergency-promote-beta'
        required: true
        type: string

permissions:
  actions: read
  contents: write
  issues: write
  id-token: write

concurrency:
  group: desktop-emergency-beta-promotion
  cancel-in-progress: false

jobs:
  promote:
    # The protected prod environment is the first authorization boundary; the
    # verifier additionally requires two distinct repository-member approvals.
    environment: prod
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.candidate.outputs.release_tag }}
      incident_id: ${{ inputs.incident_id }}
      approvers: ${{ steps.evidence.outputs.approvers }}
    steps:
      - name: Checkout protected promotion controls
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Download and bind emergency candidate evidence
        id: candidate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          INCIDENT_ID: ${{ inputs.incident_id }}
          REPO: ${{ github.repository }}
          BEHAVIORAL_EVIDENCE_URL: ${{ inputs.behavioral_evidence_url }}
        run: |
          set -euo pipefail
          git fetch --force origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          TAG_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          test "$TAG_SHA" = "$SOURCE_SHA"
          mkdir -p /tmp/desktop-emergency-beta/assets
          gh release view "$RELEASE_TAG" --repo "$REPO" --json tagName,body,isDraft,isPrerelease,publishedAt,assets \
            > /tmp/desktop-emergency-beta/release.json
          gh release download "$RELEASE_TAG" --repo "$REPO" --pattern Omi.zip --pattern '*.dmg' \
            --pattern desktop-smoke-result.json --dir /tmp/desktop-emergency-beta/assets
          gh api "repos/${REPO}/commits/${SOURCE_SHA}/check-runs?filter=latest" \
            > /tmp/desktop-emergency-beta/source-check.json
          gh issue view "$INCIDENT_ID" --repo "$REPO" --json number,state,url \
            > /tmp/desktop-emergency-beta/incident.json
          gh api --paginate --slurp "repos/${REPO}/issues/${INCIDENT_ID}/comments?per_page=100" \
            | python3 -c 'import json, sys; json.dump([comment for page in json.load(sys.stdin) for comment in page], sys.stdout)' \
            > /tmp/desktop-emergency-beta/incident-comments.json
          curl --fail --location --retry 2 --output /tmp/desktop-emergency-beta/behavioral-evidence \
            "$BEHAVIORAL_EVIDENCE_URL"
          DMG_PATH=$(find /tmp/desktop-emergency-beta/assets -maxdepth 1 -name '*.dmg' -type f -print -quit)
          test -n "$DMG_PATH"
          {
            echo "target_sha=$TAG_SHA"
            echo "dmg_path=$DMG_PATH"
            echo "release_tag=$RELEASE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Verify break-glass controls and artifact binding
        id: evidence
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_SHA: ${{ steps.candidate.outputs.target_sha }}
          INCIDENT_ID: ${{ inputs.incident_id }}
          REASON: ${{ inputs.reason }}
          OPERATOR: ${{ github.triggering_actor }}
          EXPIRES_AT: ${{ inputs.expires_at }}
          BEHAVIORAL_EVIDENCE_URL: ${{ inputs.behavioral_evidence_url }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          python3 .github/scripts/check-desktop-emergency-beta-promotion.py \
            --release-json /tmp/desktop-emergency-beta/release.json \
            --smoke-json /tmp/desktop-emergency-beta/assets/desktop-smoke-result.json \
            --source-check-json /tmp/desktop-emergency-beta/source-check.json \
            --incident-json /tmp/desktop-emergency-beta/incident.json \
            --incident-comments-json /tmp/desktop-emergency-beta/incident-comments.json \
            --zip-file /tmp/desktop-emergency-beta/assets/Omi.zip \
            --dmg-file "${{ steps.candidate.outputs.dmg_path }}" \
            --behavioral-evidence-file /tmp/desktop-emergency-beta/behavioral-evidence \
            --behavioral-evidence-url "$BEHAVIORAL_EVIDENCE_URL" \
            --release-tag "$RELEASE_TAG" --source-sha "$SOURCE_SHA" --incident-id "$INCIDENT_ID" \
            --reason "$REASON" --operator "$OPERATOR" --expires-at "$EXPIRES_AT" --confirm "$CONFIRM" \
            --output /tmp/desktop-emergency-beta/evidence.json
          python3 -c 'import json; print(",".join(json.load(open("/tmp/desktop-emergency-beta/evidence.json"))["approvers"]))' \
            | sed 's/^/approvers=/' >> "$GITHUB_OUTPUT"

      - name: Prepare immutable emergency manifest
        run: |
          set -euo pipefail
          python3 .github/scripts/prepare-desktop-beta-promotion.py \
            --release-json /tmp/desktop-emergency-beta/release.json \
            --release-tag "${{ inputs.release_tag }}" --target-sha "${{ steps.candidate.outputs.target_sha }}" \
            --zip-sha256 "$(sha256sum /tmp/desktop-emergency-beta/assets/Omi.zip | cut -d' ' -f1)" \
            --dmg-sha256 "$(sha256sum '${{ steps.candidate.outputs.dmg_path }}' | cut -d' ' -f1)" \
            --emergency-evidence-json /tmp/desktop-emergency-beta/evidence.json \
            --output /tmp/desktop-emergency-beta/manifest.json

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Snapshot Stable controls before beta-only mutation
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          FIRESTORE_TOKEN=$(gcloud auth print-access-token)
          FIRESTORE_URL="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/desktop_update_channels/macos-stable"
          curl -fsS -H "Authorization: Bearer $FIRESTORE_TOKEN" "$FIRESTORE_URL" \
            > /tmp/desktop-emergency-beta/stable-pointer-before.json
          STABLE_RELEASE=$(python3 -c 'import json; print(json.load(open("/tmp/desktop-emergency-beta/stable-pointer-before.json"))["fields"]["release_id"]["stringValue"])')
          gh release view "$STABLE_RELEASE" --repo "$REPO" --json body > /tmp/desktop-emergency-beta/stable-release-before.json
          curl -fsS 'https://api.omi.me/v2/desktop/appcast.xml?platform=macos' > /tmp/desktop-emergency-beta/appcast-before.xml
          python3 - /tmp/desktop-emergency-beta/appcast-before.xml > /tmp/desktop-emergency-beta/stable-appcast-before.xml <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          ns = {'sparkle': 'http://www.andymatuschak.org/xml-namespaces/sparkle'}
          items = [ET.tostring(item, encoding='unicode') for item in root.findall('.//item')
                   if item.find('sparkle:channel', ns) is None]
          print('\n'.join(items))
          PY

      - name: Register manifest and compare-and-swap only macOS beta
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_SHA: ${{ steps.candidate.outputs.target_sha }}
          EXPECTED_CURRENT_RELEASE_ID: ${{ inputs.expected_current_release_id }}
          EXPECTED_GENERATION: ${{ inputs.expected_generation }}
          INCIDENT_ID: ${{ inputs.incident_id }}
          REASON: ${{ inputs.reason }}
          OPERATOR: ${{ github.triggering_actor }}
        run: |
          set -euo pipefail
          ADMIN_KEY=$(gcloud secrets versions access latest --secret=ADMIN_KEY --project "$PROJECT_ID")
          curl -fsS -X POST -H 'Content-Type: application/json' -H "secret-key: $ADMIN_KEY" \
            --data-binary @/tmp/desktop-emergency-beta/manifest.json https://api.omi.me/v2/desktop/releases \
            > /tmp/desktop-emergency-beta/manifest-response.json
          python3 - <<'PY' > /tmp/desktop-emergency-beta/promote.json
          import json, os
          evidence = json.load(open('/tmp/desktop-emergency-beta/evidence.json'))
          print(json.dumps({
              'platform': 'macos', 'channel': 'beta', 'release_id': os.environ['RELEASE_TAG'],
              'source_sha': os.environ['SOURCE_SHA'], 'expected_current_release_id': os.environ['EXPECTED_CURRENT_RELEASE_ID'],
              'expected_generation': int(os.environ['EXPECTED_GENERATION']), 'incident_id': os.environ['INCIDENT_ID'],
              'reason': os.environ['REASON'], 'operator': os.environ['OPERATOR'], 'expires_at': evidence['expires_at'],
              'approvers': evidence['approvers'], **evidence['evidence'],
          }))
          PY
          curl -fsS -X POST -H 'Content-Type: application/json' -H "secret-key: $ADMIN_KEY" \
            --data-binary @/tmp/desktop-emergency-beta/promote.json \
            https://api.omi.me/v2/desktop/channels/emergency-promote-beta \
            > /tmp/desktop-emergency-beta/promotion-response.json
          RELEASE_TAG="$RELEASE_TAG" EXPECTED_GENERATION="$EXPECTED_GENERATION" python3 - <<'PY'
          import json
          import os

          response = json.load(open('/tmp/desktop-emergency-beta/promotion-response.json'))
          pointer = response.get('pointer')
          expected_generation = int(os.environ['EXPECTED_GENERATION']) + 1
          if (
              response.get('success') is not True
              or not isinstance(pointer, dict)
              or pointer.get('platform') != 'macos'
              or pointer.get('channel') != 'beta'
              or pointer.get('release_id') != os.environ['RELEASE_TAG']
              or pointer.get('generation') != expected_generation
          ):
              raise SystemExit('authoritative macOS beta pointer compare-and-swap did not succeed')
          print(json.dumps(response, indent=2))
          PY

      - name: Prove Stable pointer, release metadata, and appcast are unchanged
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          FIRESTORE_TOKEN=$(gcloud auth print-access-token)
          FIRESTORE_URL="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/desktop_update_channels/macos-stable"
          curl -fsS -H "Authorization: Bearer $FIRESTORE_TOKEN" "$FIRESTORE_URL" \
            > /tmp/desktop-emergency-beta/stable-pointer-after.json
          cmp /tmp/desktop-emergency-beta/stable-pointer-before.json /tmp/desktop-emergency-beta/stable-pointer-after.json
          STABLE_RELEASE=$(python3 -c 'import json; print(json.load(open("/tmp/desktop-emergency-beta/stable-pointer-before.json"))["fields"]["release_id"]["stringValue"])')
          gh release view "$STABLE_RELEASE" --repo "$REPO" --json body > /tmp/desktop-emergency-beta/stable-release-after.json
          cmp /tmp/desktop-emergency-beta/stable-release-before.json /tmp/desktop-emergency-beta/stable-release-after.json
          curl -fsS 'https://api.omi.me/v2/desktop/appcast.xml?platform=macos' > /tmp/desktop-emergency-beta/appcast-after.xml
          python3 - /tmp/desktop-emergency-beta/appcast-after.xml > /tmp/desktop-emergency-beta/stable-appcast-after.xml <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          ns = {'sparkle': 'http://www.andymatuschak.org/xml-namespaces/sparkle'}
          items = [ET.tostring(item, encoding='unicode') for item in root.findall('.//item')
                   if item.find('sparkle:channel', ns) is None]
          print('\n'.join(items))
          PY
          cmp /tmp/desktop-emergency-beta/stable-appcast-before.xml /tmp/desktop-emergency-beta/stable-appcast-after.xml

      - name: Record explicit emergency release metadata after beta pointer CAS
        # This must reconcile metadata even when the CAS response parser or a
        # later Stable-proof step fails after the backend transaction commits.
        # Firestore is authoritative: a failed or superseded CAS never makes a
        # GitHub release live.
        if: always()
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          EXPECTED_GENERATION: ${{ inputs.expected_generation }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          FIRESTORE_TOKEN=$(gcloud auth print-access-token)
          FIRESTORE_URL="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/desktop_update_channels/macos-beta"
          curl -fsS -H "Authorization: Bearer $FIRESTORE_TOKEN" "$FIRESTORE_URL" \
            > /tmp/desktop-emergency-beta/beta-pointer-after.json
          RELEASE_TAG="$RELEASE_TAG" EXPECTED_GENERATION="$EXPECTED_GENERATION" python3 - <<'PY'
          import json
          import os

          document = json.load(open('/tmp/desktop-emergency-beta/beta-pointer-after.json'))
          fields = document.get('fields')
          if not isinstance(fields, dict):
              raise SystemExit('authoritative macOS beta pointer is missing fields')

          def string_field(name):
              field = fields.get(name)
              return field.get('stringValue') if isinstance(field, dict) else None

          def integer_field(name):
              field = fields.get(name)
              try:
                  return int(field.get('integerValue')) if isinstance(field, dict) else None
              except (TypeError, ValueError):
                  return None

          expected_generation = int(os.environ['EXPECTED_GENERATION']) + 1
          if (
              string_field('platform') != 'macos'
              or string_field('channel') != 'beta'
              or string_field('release_id') != os.environ['RELEASE_TAG']
              or integer_field('generation') != expected_generation
          ):
              raise SystemExit('authoritative macOS beta pointer does not match the committed emergency CAS')
          PY
          gh release view "$RELEASE_TAG" --repo "$REPO" --json body -q .body > /tmp/desktop-emergency-beta/release-body.md
          python3 .github/scripts/mark-desktop-release-emergency-beta.py \
            --input /tmp/desktop-emergency-beta/release-body.md \
            --evidence /tmp/desktop-emergency-beta/evidence.json \
            --output /tmp/desktop-emergency-beta/release-body-emergency.md
          gh release edit "$RELEASE_TAG" --repo "$REPO" --notes-file /tmp/desktop-emergency-beta/release-body-emergency.md

      - name: Notify incident responders immediately
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          gh issue comment "${{ inputs.incident_id }}" --repo "$REPO" --body \
            "Emergency macOS beta promotion completed for ${{ inputs.release_tag }} from ${{ steps.candidate.outputs.target_sha }}. Approvers: ${{ steps.evidence.outputs.approvers }}. The mandatory one-hour beta monitor is now running: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  monitor:
    needs: promote
    runs-on: ubuntu-latest
    steps:
      - name: Monitor beta-only feed for one hour
        id: health
        run: |
          set -euo pipefail
          for sample in $(seq 1 12); do
            feed=$(curl -fsS --max-time 20 'https://api.omi.me/v2/desktop/appcast.xml?platform=macos')
            if ! printf '%s' "$feed" | grep -Fq '${{ needs.promote.outputs.release_tag }}'; then
              echo "beta feed no longer resolves the emergency release at sample $sample" >&2
              exit 1
            fi
            sleep 300
          done

      - name: Record monitor success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment '${{ needs.promote.outputs.incident_id }}' --repo '${{ github.repository }}' --body \
            "The mandatory one-hour macOS beta health monitor completed without beta feed regression for ${{ needs.promote.outputs.release_tag }}."

      - name: Alert with rollback recommendation on regression
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment '${{ needs.promote.outputs.incident_id }}' --repo '${{ github.repository }}' --body \
            "ALERT: the mandatory beta-only health monitor regressed after emergency promotion of ${{ needs.promote.outputs.release_tag }}. Recommend executing the audited macOS beta rollback endpoint to the prior verified beta immediately."
