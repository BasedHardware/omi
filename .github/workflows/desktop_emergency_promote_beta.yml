name: Emergency Promote macOS Beta Candidate

# Break-glass path for shipping a signed candidate to beta when the
# qualification gate itself is broken. Beta only: this workflow cannot touch
# stable, and the backend rejects any non-beta target.
#
# The default path (desktop_qualify_beta -> desktop_promote_beta) stays
# fail-closed. This is the escape hatch, deliberately small: the only guards
# are the ones a machine can check -- tag/SHA binding, artifact digests, and a
# pointer compare-and-swap. There is no approval ceremony, because paperwork
# is not a control an automated actor can be stopped by.
#
# Every run opens a `qualification-gate-failure` issue. If those pile up, the
# qualification gate is the bug and this hatch is masking it.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Exact signed v*-macos candidate tag'
        required: true
        type: string
      reason:
        description: 'Why the qualification gate could not be used'
        required: true
        type: string
      confirm:
        description: 'Type emergency-promote-beta'
        required: true
        type: string

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: desktop-beta-pointer
  cancel-in-progress: false

jobs:
  promote:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: Confirm intent
        run: test "${{ inputs.confirm }}" = "emergency-promote-beta"

      - name: Checkout promotion controls
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Bind tag to signed artifacts
        id: candidate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch --force origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          TAG_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          WORK=/tmp/desktop-emergency-beta
          mkdir -p "$WORK/assets"
          gh release view "$RELEASE_TAG" --repo "$REPO" \
            --json tagName,body,isDraft,isPrerelease,publishedAt,assets > "$WORK/release.json"
          gh release download "$RELEASE_TAG" --repo "$REPO" \
            --pattern Omi.zip --pattern '*.dmg' --dir "$WORK/assets"
          DMG_PATH=$(find "$WORK/assets" -maxdepth 1 -name '*.dmg' -type f -print -quit)
          test -n "$DMG_PATH"
          {
            echo "target_sha=$TAG_SHA"
            echo "dmg_path=$DMG_PATH"
            echo "zip_sha256=$(sha256sum "$WORK/assets/Omi.zip" | cut -d' ' -f1)"
            echo "dmg_sha256=$(sha256sum "$DMG_PATH" | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare immutable manifest
        run: |
          set -euo pipefail
          python3 .github/scripts/prepare-desktop-beta-promotion.py \
            --release-json /tmp/desktop-emergency-beta/release.json \
            --release-tag "${{ inputs.release_tag }}" \
            --target-sha "${{ steps.candidate.outputs.target_sha }}" \
            --zip-sha256 "${{ steps.candidate.outputs.zip_sha256 }}" \
            --dmg-sha256 "${{ steps.candidate.outputs.dmg_sha256 }}" \
            --allow-unqualified \
            --output /tmp/desktop-emergency-beta/manifest.json

      - name: Google Auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Register manifest and compare-and-swap macOS beta
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          ADMIN_KEY=$(gcloud secrets versions access latest --secret=ADMIN_KEY --project "$PROJECT_ID")
          curl -fsS -X POST -H 'Content-Type: application/json' -H "secret-key: $ADMIN_KEY" \
            --data-binary @/tmp/desktop-emergency-beta/manifest.json \
            https://api.omi.me/v2/desktop/releases > /dev/null

          # Read the live pointer here rather than making an operator paste it
          # mid-incident. The generation CAS below still rejects any concurrent
          # mutation between this read and the write.
          WORK=/tmp/desktop-emergency-beta
          curl -fsS -H "secret-key: $ADMIN_KEY" \
            'https://api.omi.me/v2/desktop/channels/live?platform=macos&channel=beta' \
            > "$WORK/current.json"
          python3 - "$WORK/current.json" "$WORK/promote.json" <<'PY'
          import json, os, sys

          current = json.load(open(sys.argv[1]))["pointer"]
          json.dump(
              {
                  "platform": "macos",
                  "channel": "beta",
                  "release_id": os.environ["RELEASE_TAG"],
                  "expected_current_release_id": current["release_id"],
                  "expected_generation": int(current["generation"]),
                  "emergency": True,
              },
              open(sys.argv[2], "w"),
          )
          PY

          curl -fsS -X POST -H 'Content-Type: application/json' -H "secret-key: $ADMIN_KEY" \
            --data-binary @"$WORK/promote.json" \
            https://api.omi.me/v2/desktop/channels/promote > "$WORK/response.json"

          python3 - "$WORK/current.json" "$WORK/response.json" <<'PY'
          import json, os, sys

          expected_generation = int(json.load(open(sys.argv[1]))["pointer"]["generation"]) + 1
          response = json.load(open(sys.argv[2]))
          pointer = response.get("pointer") or {}
          if (
              response.get("success") is not True
              or pointer.get("channel") != "beta"
              or pointer.get("release_id") != os.environ["RELEASE_TAG"]
              or pointer.get("generation") != expected_generation
          ):
              raise SystemExit(f"beta pointer compare-and-swap did not succeed: {response}")
          print(json.dumps(response, indent=2))
          PY

      - name: Record that the qualification gate was bypassed
        if: ${{ always() && job.status != 'cancelled' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh issue create --repo "$REPO" \
            --title "Qualification gate bypassed for ${{ inputs.release_tag }}" \
            --label qualification-gate-failure \
            --body "$(printf '%s\n' \
              "Beta was promoted by \`desktop_emergency_promote_beta\`, bypassing qualification." \
              "" \
              "- Tag: \`${{ inputs.release_tag }}\`" \
              "- SHA: \`${{ steps.candidate.outputs.target_sha }}\`" \
              "- Operator: @${{ github.triggering_actor }}" \
              "- Reason: ${{ inputs.reason }}" \
              "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "- Result: ${{ job.status }}" \
              "" \
              "The gate failing is the defect. Fix the gate, then close this.")"
