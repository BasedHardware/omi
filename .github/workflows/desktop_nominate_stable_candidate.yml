name: Nominate Desktop Stable Candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Qualified beta v*-macos tag to nominate'
        required: true
      rationale:
        description: 'Why this beta is ready for stable consideration'
        required: true
      soak_review:
        description: 'Soak duration and outcome reviewed'
        required: true
      telemetry_review:
        description: 'Crash, update, and health telemetry reviewed'
        required: true
      release_notes_review:
        description: 'Stable release-note rollup reviewed'
        required: true

permissions:
  contents: read

concurrency:
  group: desktop-stable-candidate-nomination
  cancel-in-progress: false

jobs:
  nominate:
    environment: prod
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nomination controls
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Omi Bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.OMI_BOT_APP_ID }}
          private-key: ${{ secrets.OMI_BOT_PRIVATE_KEY }}

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Validate qualified beta and prepare nomination
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REPO: ${{ github.repository }}
          NOMINATOR: ${{ github.actor }}
          RATIONALE: ${{ inputs.rationale }}
          SOAK_REVIEW: ${{ inputs.soak_review }}
          TELEMETRY_REVIEW: ${{ inputs.telemetry_review }}
          RELEASE_NOTES_REVIEW: ${{ inputs.release_notes_review }}
        run: |
          set -euo pipefail
          if ! printf '%s\n' "$RELEASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?\+[0-9]+-macos$'; then
            echo "Invalid macOS release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          git fetch --force origin "+refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          gh release view "$RELEASE_TAG" --repo "$REPO" \
            --json tagName,body,isDraft,isPrerelease,assets \
            > /tmp/desktop-stable-candidate-release.json

          ACCESS_TOKEN=$(gcloud auth print-access-token)
          POINTER_URL="https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/desktop_update_channels/macos-beta"
          curl -fsS -H "Authorization: Bearer ${ACCESS_TOKEN}" "$POINTER_URL" \
            > /tmp/desktop-beta-pointer.json
          BETA_RELEASE_ID=$(python3 - <<'PY'
          import json

          pointer = json.load(open("/tmp/desktop-beta-pointer.json", encoding="utf-8"))
          print(pointer.get("fields", {}).get("release_id", {}).get("stringValue", ""))
          PY
          )
          if [ -z "$BETA_RELEASE_ID" ]; then
            echo "The macOS beta pointer is missing release_id" >&2
            exit 1
          fi

          python3 .github/scripts/nominate-desktop-stable-candidate.py \
            --release-json /tmp/desktop-stable-candidate-release.json \
            --release-tag "$RELEASE_TAG" \
            --target-sha "$TARGET_SHA" \
            --beta-release-id "$BETA_RELEASE_ID" \
            --nominator "$NOMINATOR" \
            --rationale "$RATIONALE" \
            --soak-review "$SOAK_REVIEW" \
            --telemetry-review "$TELEMETRY_REVIEW" \
            --release-notes-review "$RELEASE_NOTES_REVIEW" \
            --output /tmp/desktop-stable-candidate-body.md

          gh release edit "$RELEASE_TAG" --repo "$REPO" \
            --notes-file /tmp/desktop-stable-candidate-body.md
          {
            echo "Nominated stable candidate: $RELEASE_TAG ($TARGET_SHA)"
            echo "Nominator: $NOMINATOR"
            echo "Beta pointer remained unchanged at: $BETA_RELEASE_ID"
            echo "Stable visibility was not changed. Use desktop_promote_prod.yml separately."
          } >> "$GITHUB_STEP_SUMMARY"
