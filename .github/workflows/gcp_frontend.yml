name: Deploy Frontend to Cloud RUN

on:
  push:
    branches: [ "main", "development" ]
    paths:
      - 'web/frontend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'prod'
        type: choice
        options:
          - development
          - prod
      release_version:
        description: 'Release version (optional)'
        required: false
        default: ''

env:
  SERVICE: frontend
  REGION: us-central1

# Serialize writes to the same Cloud Run service while allowing dev and prod to proceed independently.
concurrency:
  group: deploy-cloud-run-frontend-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref == 'refs/heads/development' && 'development' || github.ref == 'refs/heads/main' && 'prod' || format('nondeploy-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  deploy:
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/development' && 'development') || (github.ref == 'refs/heads/main' && 'prod') }}
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - run: gcloud auth configure-docker
      - name: Build and Push Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DEPLOY_ENV="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/development' && 'development') || 'prod' }}"
          IMAGE_TAG="${DEPLOY_ENV}-${SHORT_SHA}"
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }} \
            --build-arg API_URL=${{ vars.API_URL }} \
            -t "gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}" -f web/frontend/Dockerfile .
            
          docker push "gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}"
          echo "IMAGE=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:$IMAGE_TAG" >> "$GITHUB_ENV"
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          secrets: |
            OPENAI_API_KEY=OPENAI_API_KEY:latest

      - name: Verify Cloud Run rollout
        run: |
          python3 backend/scripts/deploy_status_report.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --include-cloud-run \
            --cloud-run-service ${{ env.SERVICE }}

      # If required, use the Cloud Run url output in later steps
      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}

      - name: Generate deployment summary
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-summary
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          service: ${{ env.SERVICE }}

      - name: Notify deployment status on Telegram
        if: always() && github.event.inputs.environment == 'prod'
        uses: ./.github/actions/deployment-notifier
        with:
          environment: ${{ github.event.inputs.environment }}
          release_version: ${{ github.event.inputs.release_version }}
          status: ${{ job.status }}
          telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
