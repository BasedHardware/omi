name: Deploy Apps-Js to Cloud RUN

on:
  push:
    branches: [ "main", "development" ]
    paths:
      - 'plugins/apps-js/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - prod

env:
  SERVICE: apps-js
  REGION: us-central1

jobs:
  deploy:
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/development' && 'development') || (github.ref == 'refs/heads/main' && 'prod') }}
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - run: gcloud auth configure-docker

      - name: Build and Push Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DEPLOY_ENV="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/development' && 'development') || 'prod' }}"
          IMAGE_TAG="${DEPLOY_ENV}-${SHORT_SHA}"
          docker build \
            -t "gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}" -f plugins/apps-js/Dockerfile .
          docker push "gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${IMAGE_TAG}"
          echo "IMAGE=gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          secrets: |
            OPENAI_API_KEY=OPENAI_API_KEY:latest
            OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest
            UPSTASH_REDIS_HOST=UPSTASH_REDIS_HOST:latest
            UPSTASH_REDIS_PASSWORD=UPSTASH_REDIS_PASSWORD:latest
            UPSTASH_REDIS_PORT=UPSTASH_REDIS_PORT:latest
            JWT_SECRET=JWT_SECRET:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            GOOGLE_REDIRECT_URI=GOOGLE_REDIRECT_URI:latest
            GOOGLE_CALLBACK_URL=GOOGLE_CALLBACK_URL:latest
            BASE_URL=BASE_URL:latest
            SUPABASE_URL=SUPABASE_URL:latest
            SUPABASE_KEY=SUPABASE_KEY:latest
            OMI_APP_ID=OMI_APP_ID:latest
            OMI_APP_SECRET=OMI_APP_SECRET:latest
            DECK_APP_ID=DECK_APP_ID:latest
            DECK_APP_SECRET=DECK_APP_SECRET:latest
            SLIDESGPT_API_KEY=SLIDESGPT_API_KEY:latest

      - name: Verify Cloud Run rollout
        run: |
          python3 backend/scripts/deploy_status_report.py \
            --env ${{ vars.ENV }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --include-cloud-run \
            --cloud-run-service ${{ env.SERVICE }}

      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
