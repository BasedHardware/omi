name: Upgrade Backend Listen Helm Chart

on:
  # Auto-apply when chart values or templates change on main, so new secret
  # bindings / env-var references ship to GKE without a manual workflow_dispatch.
  push:
    branches: [ "main" ]
    paths:
      - 'backend/charts/backend-listen/**'
      - 'backend/charts/backend-secrets/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy to'
        required: true
        default: 'development'
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'

env:
  REGION: us-central1

concurrency:
  group: backend-deploy-${{ github.event.inputs.environment || 'development' }}
  cancel-in-progress: false

jobs:
  helm-upgrade:
    # On manual dispatch use the chosen environment; on auto push only deploy
    # to dev (prod still requires an explicit workflow_dispatch for safety).
    environment: ${{ github.event.inputs.environment || 'development' }}
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Validate Environment Input
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "development" && "${{ github.event.inputs.environment }}" != "prod" ]]; then
            echo "Invalid environment: ${{ github.event.inputs.environment }}. Must be 'development' or 'prod'."
            exit 1
          fi
          if [[ "$INPUT_BRANCH" != "$GITHUB_REF_NAME" ]]; then
            echo "branch input must match the dispatched ref: input=$INPUT_BRANCH ref=$GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Validate runtime GCP project
        env:
          RUNTIME_GCP_PROJECT_ID: ${{ vars.RUNTIME_GCP_PROJECT_ID }}
        run: |
          if [[ -z "$RUNTIME_GCP_PROJECT_ID" ]]; then
            echo "RUNTIME_GCP_PROJECT_ID must be set before backend-listen Helm deployment" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Resolve deployed backend-listen image tag
        run: |
          IMAGE="$(kubectl -n ${{ vars.ENV }}-omi-backend get deploy/${{ vars.ENV }}-omi-backend-listen -o jsonpath='{.spec.template.spec.containers[0].image}')"
          TAG="${IMAGE##*:}"
          if [[ -z "$TAG" || "$TAG" == "$IMAGE" || "$TAG" == "latest" ]]; then
            echo "backend-listen is not currently pinned to an immutable image tag: ${IMAGE:-<missing>}" >&2
            echo "Run the backend deploy workflow first so chart-only upgrades preserve a short-SHA image tag." >&2
            exit 1
          fi
          echo "BACKEND_LISTEN_IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Helm diff (dry run)
        run: |
          echo "=== Current release values ==="
          helm -n ${{ vars.ENV }}-omi-backend get values ${{ vars.ENV }}-omi-backend-listen || echo "No existing release found"
          echo ""
          echo "=== Dry run upgrade ==="
          helm -n ${{ vars.ENV }}-omi-backend upgrade --install ${{ vars.ENV }}-omi-backend-listen \
            ./backend/charts/backend-listen \
            -f ./backend/charts/backend-listen/${{ vars.ENV }}_omi_backend_listen_values.yaml \
            --set image.repository=gcr.io/${{ vars.GCP_PROJECT_ID }}/backend \
            --set gcpProjectId=${{ vars.GCP_PROJECT_ID }} \
            --set runtimeGcpProjectId=${{ vars.RUNTIME_GCP_PROJECT_ID }} \
            --set "image.tag=${BACKEND_LISTEN_IMAGE_TAG}" \
            --dry-run

      # The ExternalSecret resource (which tells external-secrets which GCP
      # Secret Manager keys to sync into the K8s `*-omi-backend-secrets`
      # secret) lives in this chart. Without re-applying it, a new chart key
      # never reaches K8s, and the deployment's secretKeyRef resolves to an
      # empty value — code reads os.getenv(...) as None.
      - name: Upgrade backend-secrets Helm chart
        env:
          BACKEND_SECRETS_GSA: ${{ vars.BACKEND_SECRETS_GSA }}
          ENVIRONMENT: ${{ vars.ENV }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          REGION: ${{ env.REGION }}
        run: |
          python3 -m pip install -q pyyaml
          backend/scripts/deploy-backend-secrets.sh

      - name: Upgrade backend-listen Helm chart
        run: |
          helm -n ${{ vars.ENV }}-omi-backend upgrade --install ${{ vars.ENV }}-omi-backend-listen \
            ./backend/charts/backend-listen \
            -f ./backend/charts/backend-listen/${{ vars.ENV }}_omi_backend_listen_values.yaml \
            --set image.repository=gcr.io/${{ vars.GCP_PROJECT_ID }}/backend \
            --set gcpProjectId=${{ vars.GCP_PROJECT_ID }} \
            --set runtimeGcpProjectId=${{ vars.RUNTIME_GCP_PROJECT_ID }} \
            --set "image.tag=${BACKEND_LISTEN_IMAGE_TAG}"

      - name: Verify rollout
        run: |
          if ! kubectl -n ${{ vars.ENV }}-omi-backend rollout status deploy/${{ vars.ENV }}-omi-backend-listen --timeout=300s; then
            python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service backend-listen || true
            exit 1
          fi
          python3 backend/scripts/deploy_status_report.py --env ${{ vars.ENV }} --include-gke --gke-service backend-listen

      - name: Show pod status
        if: always()
        run: |
          kubectl -n ${{ vars.ENV }}-omi-backend get pods -l app.kubernetes.io/instance=${{ vars.ENV }}-omi-backend-listen --no-headers
