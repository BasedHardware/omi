  # ============================================
  # OTA PATCH WORKFLOWS (Shorebird)
  # ============================================

  ios-prod-patch:
    name: Patch iOS to Production
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - app_env
        - firebase
        - shorebird
      vars:
        APP_ID: $NOOTO_APP_ID
        BUNDLE_ID: "com.togodynamics.nooto"
