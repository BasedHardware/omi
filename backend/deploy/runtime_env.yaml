schema_version: 1

environments:
  dev:
    gcp_project: based-hardware-dev
    region: us-central1
    gke:
      backend-listen:
        values_file: backend/charts/backend-listen/dev_omi_backend_listen_values.yaml
        env:
          OMI_LLM_GATEWAY_URL:
            value: http://dev-omi-llm-gateway.dev-omi-backend.svc.cluster.local:8080
            category: service_discovery
          OMI_LLM_GATEWAY_SERVICE_TOKEN:
            secret:
              name: dev-omi-backend-secrets
              key: OMI_LLM_GATEWAY_SERVICE_TOKEN
    cloud_run:
      services:
        backend:
          env:
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            OMI_LLM_GATEWAY_URL:
              value: http://172.16.63.232
              category: service_discovery
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
        backend-sync:
          env:
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            OMI_LLM_GATEWAY_URL:
              value: http://172.16.63.232
              category: service_discovery
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
        backend-integration:
          env:
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            OMI_LLM_GATEWAY_URL:
              value: http://172.16.63.232
              category: service_discovery
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest

  prod:
    gcp_project: based-hardware
    region: us-central1
    gke:
      backend-listen:
        values_file: backend/charts/backend-listen/prod_omi_backend_listen_values.yaml
        env:
          OMI_LLM_GATEWAY_URL:
            value: http://prod-omi-llm-gateway.prod-omi-backend.svc.cluster.local:8080
            category: service_discovery
          OMI_LLM_GATEWAY_SERVICE_TOKEN:
            secret:
              name: prod-omi-backend-secrets
              key: OMI_LLM_GATEWAY_SERVICE_TOKEN
    cloud_run:
      services:
        backend:
          env:
            OMI_LLM_GATEWAY_URL:
              value: TBD_STABLE_PRIVATE_ENDPOINT
              category: service_discovery
              provisional: true
          secrets:
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
        backend-sync:
          env:
            OMI_LLM_GATEWAY_URL:
              value: TBD_STABLE_PRIVATE_ENDPOINT
              category: service_discovery
              provisional: true
          secrets:
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
        backend-integration:
          env:
            OMI_LLM_GATEWAY_URL:
              value: TBD_STABLE_PRIVATE_ENDPOINT
              category: service_discovery
              provisional: true
          secrets:
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
