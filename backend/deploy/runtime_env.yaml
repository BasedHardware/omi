schema_version: 1
environments:
  dev:
    gcp_project: based-hardware-dev
    runtime_gcp_project: based-hardware
    region: us-central1
    llm_gateway:
      namespace: dev-omi-backend
      release_name: dev-omi-llm-gateway
      ingress_name: dev-omi-llm-gateway
      static_address_name: dev-llm-gateway-ilb-ip-address
    gke:
      backend-listen:
        values_file: backend/charts/backend-listen/dev_omi_backend_listen_values.yaml
        env:
          DESKTOP_UPDATE_POINTERS_MODE:
            value: primary
            category: rollout
          DESKTOP_UPDATE_RECONCILE_SAMPLE_RATE:
            value: '0.01'
            category: rollout
          GOOGLE_CLOUD_PROJECT:
            value: based-hardware-dev
          GCP_LOCATION:
            value: us-central1
          USE_VERTEX_AI:
            value: 'true'
          OMI_LLM_GATEWAY_URL:
            value: http://dev-omi-llm-gateway.dev-omi-backend.svc.cluster.local:8080
            category: service_discovery
          OMI_ENV_STAGE:
            value: dev
            category: runtime_identity
          STT_PRERECORDED_MODEL:
            value: parakeet,modulate-velma-2
            category: stt_policy
          GOOGLE_CLIENT_ID:
            config_map:
              name: dev-omi-backend-config
              key: GOOGLE_CLIENT_ID
          REDIS_DB_HOST:
            config_map:
              name: dev-omi-backend-config
              key: REDIS_DB_HOST
          STT_SERVICE_MODELS:
            value: parakeet,modulate-velma-2
            category: stt_policy
          TYPESENSE_HOST:
            config_map:
              name: dev-omi-backend-config
              key: TYPESENSE_HOST
          TWILIO_ACCOUNT_SID:
            config_map:
              name: dev-omi-backend-config
              key: TWILIO_ACCOUNT_SID
          TWILIO_API_KEY_SID:
            config_map:
              name: dev-omi-backend-config
              key: TWILIO_API_KEY_SID
          TWILIO_TWIML_APP_SID:
            config_map:
              name: dev-omi-backend-config
              key: TWILIO_TWIML_APP_SID
          RAPID_API_HOST:
            config_map:
              name: dev-omi-backend-config
              key: RAPID_API_HOST
          CONVERSATION_SUMMARIZED_APP_IDS:
            config_map:
              name: dev-omi-backend-config
              key: CONVERSATION_SUMMARIZED_APP_IDS
          X_OAUTH_CLIENT_ID:
            config_map:
              name: dev-omi-backend-config
              key: X_OAUTH_CLIENT_ID
          X_OAUTH_REDIRECT_URI:
            config_map:
              name: dev-omi-backend-config
              key: X_OAUTH_REDIRECT_URI
          MCP_AUTHORIZATION_SERVER_URL:
            config_map:
              name: dev-omi-backend-config
              key: MCP_AUTHORIZATION_SERVER_URL
          MCP_RESOURCE_URL:
            config_map:
              name: dev-omi-backend-config
              key: MCP_RESOURCE_URL
          MCP_OAUTH_CHATGPT_CLIENT_ID:
            config_map:
              name: dev-omi-backend-config
              key: MCP_OAUTH_CHATGPT_CLIENT_ID
          MCP_OAUTH_CHATGPT_REDIRECT_URIS:
            config_map:
              name: dev-omi-backend-config
              key: MCP_OAUTH_CHATGPT_REDIRECT_URIS
          MCP_OAUTH_PUBLIC_CLIENT_ID:
            config_map:
              name: dev-omi-backend-config
              key: MCP_OAUTH_PUBLIC_CLIENT_ID
          MCP_OAUTH_PUBLIC_REDIRECT_URIS:
            config_map:
              name: dev-omi-backend-config
              key: MCP_OAUTH_PUBLIC_REDIRECT_URIS
          MODULATE_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: MODULATE_API_KEY
          HOSTED_PARAKEET_API_URL:
            value: http://parakeet.omiapi.com
            category: service_discovery
          HOSTED_TRANSLATION_API_URL:
            value: http://nllb.omiapi.com
            category: service_discovery
          OMI_LLM_GATEWAY_FEATURE_MODE:
            value: gateway
            category: rollout
          OMI_LLM_GATEWAY_ALLOW_DIRECT_MODEL_EXCEPTION:
            value: 'true'
            category: rollout
          OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_ENABLED:
            value: 'false'
            category: rollout
          OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_SAMPLE_RATE:
            value: '1.0'
            category: rollout
          OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_ENABLED:
            value: 'false'
            category: rollout
          OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_SAMPLE_RATE:
            value: '1.0'
            category: rollout
          OMI_LLM_GATEWAY_DEV_SHADOW_ALL_ENABLED:
            value: 'false'
            category: rollout
          OMI_LLM_GATEWAY_DEV_SHADOW_ALL_SAMPLE_RATE:
            value: '1.0'
            category: rollout
          OMI_LLM_GATEWAY_SERVICE_TOKEN:
            secret:
              name: dev-omi-backend-secrets
              key: OMI_LLM_GATEWAY_SERVICE_TOKEN
          MEMORY_MODE:
            value: read
            category: memory_rollout
          MEMORY_ENABLED_USERS:
            value: vi7SA9ckQCe4ccobWNxlbdcNdC23
          # Next dogfood (re-enable soon): ,viUv7GtdoHXbK1UBCDlPuTDuPgJ2
            category: memory_rollout
          MEMORY_V3_GET_ENABLED:
            value: 'true'
            category: memory_rollout
          MEMORY_CANONICAL_PROMOTION_CRON_ENABLED:
            value: 'false'
            category: memory_rollout
          MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED:
            value: 'true'
            category: memory_rollout
          MEMORY_TYPESENSE_COLLECTION:
            value: canonical_memory_atoms
            category: memory_rollout
      # Direct pusher bindings are kept here as the dev source contract. The
      # deploy preflight compares this inventory to the rendered chart and
      # queries only live object/key metadata before a Helm upgrade.
      pusher:
        values_file: backend/charts/pusher/dev_omi_pusher_values.yaml
        env:
          GITHUB_TOKEN:
            secret:
              name: dev-omi-backend-secrets
              key: GITHUB_TOKEN
          OPENAI_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: OPENAI_API_KEY
          FAL_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: FAL_KEY
          PINECONE_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: PINECONE_API_KEY
          REDIS_DB_HOST:
            config_map:
              name: dev-omi-backend-config
              key: REDIS_DB_HOST
            clear_historical_secret: true
          REDIS_DB_PASSWORD:
            secret:
              name: dev-omi-backend-secrets
              key: REDIS_DB_PASSWORD
          ADMIN_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: ADMIN_KEY
          MODULATE_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: MODULATE_API_KEY
          GOOGLE_MAPS_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: GOOGLE_MAPS_API_KEY
          GOOGLE_CLIENT_ID:
            config_map:
              name: dev-omi-backend-config
              key: GOOGLE_CLIENT_ID
            clear_historical_secret: true
          HOSTED_PARAKEET_API_URL:
            value: http://parakeet.omiapi.com
            category: service_discovery
          STT_PRERECORDED_MODEL:
            value: parakeet,modulate-velma-2
            category: stt_policy
          STT_SERVICE_MODELS:
            value: parakeet,modulate-velma-2
            category: stt_policy
          GOOGLE_CLIENT_SECRET:
            secret:
              name: dev-omi-backend-secrets
              key: GOOGLE_CLIENT_SECRET
          GOOGLE_APPLICATION_CREDENTIALS:
            secret:
              name: dev-omi-backend-secrets
              key: GOOGLE_APPLICATION_CREDENTIALS
          ENCRYPTION_SECRET:
            secret:
              name: dev-omi-backend-secrets
              key: ENCRYPTION_SECRET
          DD_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: DD_API_KEY
          LANGCHAIN_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: LANGCHAIN_API_KEY
          STRIPE_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: STRIPE_API_KEY
          STRIPE_WEBHOOK_SECRET:
            secret:
              name: dev-omi-backend-secrets
              key: STRIPE_WEBHOOK_SECRET
          MARKETPLACE_APP_REVIEWERS:
            secret:
              name: dev-omi-backend-secrets
              key: MARKETPLACE_APP_REVIEWERS
          TYPESENSE_HOST:
            config_map:
              name: dev-omi-backend-config
              key: TYPESENSE_HOST
            clear_historical_secret: true
          TYPESENSE_API_KEY:
            secret:
              name: dev-omi-backend-secrets
              key: TYPESENSE_API_KEY
          SERVICE_ACCOUNT_JSON:
            secret:
              name: dev-omi-backend-secrets
              key: SERVICE_ACCOUNT_JSON
          METRICS_SECRET:
            secret:
              name: dev-omi-backend-secrets
              key: METRICS_SECRET
    cloud_run:
      workflow_files:
        - .github/workflows/gcp_backend_auto_dev.yml
        - .github/workflows/gcp_backend.yml
        - .github/workflows/gcp_notifications_job.yml
        - .github/workflows/gcp_memory_maintenance_job.yml
        - .github/workflows/gcp_memory_maintenance_job_auto_dev.yml
      network:
        flags:
          --network: omi-dev-vpc-1
          --subnet: omi-us-central1-dev-vpc-1-subnet-1
          --vpc-egress: private-ranges-only
      services:
        backend:
          env:
            SYNC_LEDGER_FENCE_MODE:
              env_var: SYNC_LEDGER_FENCE_MODE
              default: legacy
              category: rollout
            DESKTOP_UPDATE_POINTERS_MODE:
              value: primary
              category: rollout
            DESKTOP_UPDATE_RECONCILE_SAMPLE_RATE:
              value: '0.01'
              category: rollout
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            GCP_LOCATION:
              value: us-central1
            USE_VERTEX_AI:
              value: 'true'
            OMI_ENV_STAGE:
              value: dev
              category: runtime_identity
            GOOGLE_CLIENT_ID:
              env_var: GOOGLE_CLIENT_ID
              category: oauth_metadata
            STT_PRERECORDED_MODEL:
              value: parakeet,modulate-velma-2
              category: stt_policy
            # Dev Cloud Run must stay within the dev Parakeet topology; never point this at
            # the production-only parakeet.omi.me endpoint.
            HOSTED_PARAKEET_API_URL:
              value: http://parakeet.omiapi.com
              category: service_discovery
            # Direct dev Cloud Run /v4/listen traffic remains public while the
            # retired Cloud Run Pusher route drains. It must use the GKE Pusher.
            HOSTED_PUSHER_API_URL:
              value: http://pusher.omiapi.com
              category: service_discovery
            OMI_LLM_GATEWAY_URL:
              env_var: OMI_LLM_GATEWAY_URL
              # The workflow replaces this with the ingress-derived address
              # after the gateway serving gate passes. Direct mode never uses
              # the sentinel, and it is deliberately not a routable contract.
              default: http://127.0.0.1:9
              category: service_discovery
            OMI_LLM_GATEWAY_FEATURE_MODE:
              value: gateway
              category: rollout
            OMI_LLM_GATEWAY_ALLOW_DIRECT_MODEL_EXCEPTION:
              value: 'true'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            OMI_LLM_GATEWAY_DEV_SHADOW_ALL_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_DEV_SHADOW_ALL_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            POSTHOG_HOST:
              value: https://app.posthog.com
              category: telemetry
            MEMORY_MODE:
              value: read
              category: memory_rollout
            MEMORY_ENABLED_USERS:
              value: vi7SA9ckQCe4ccobWNxlbdcNdC23
            # Next dogfood (re-enable soon): ,viUv7GtdoHXbK1UBCDlPuTDuPgJ2
              category: memory_rollout
            MEMORY_V3_GET_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_CRON_ENABLED:
              value: 'false'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_TYPESENSE_COLLECTION:
              value: canonical_memory_atoms
              category: memory_rollout
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            GOOGLE_CLIENT_SECRET:
              secret: GOOGLE_CLIENT_SECRET
              version: latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
            POSTHOG_PROJECT_API_KEY:
              secret: POSTHOG_PROJECT_API_KEY
              version: latest
            MODULATE_API_KEY:
              secret: MODULATE_API_KEY
              version: latest
        backend-sync: &dev_backend_sync
          env:
            SYNC_LEDGER_FENCE_MODE:
              env_var: SYNC_LEDGER_FENCE_MODE
              default: legacy
              category: rollout
            SYNC_FRESH_MAX_AGE_SECONDS:
              value: '21600'
              category: rollout
              provisional: true
            SYNC_BACKFILL_MAX_AGE_SECONDS:
              value: '2592000'
              category: rollout
              provisional: true
            SYNC_CAPTURE_MAX_FUTURE_SKEW_SECONDS:
              value: '300'
              category: rollout
              provisional: true
            SYNC_BACKFILL_USER_DAILY_HOURS:
              value: '4'
              category: rollout
              provisional: true
            SYNC_BACKFILL_GLOBAL_DAILY_HOURS:
              value: '555'
              category: rollout
              provisional: true
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            GCP_LOCATION:
              value: us-central1
            USE_VERTEX_AI:
              value: 'true'
            OMI_ENV_STAGE:
              value: dev
              category: runtime_identity
            GOOGLE_CLIENT_ID:
              env_var: GOOGLE_CLIENT_ID
              category: oauth_metadata
            STT_PRERECORDED_MODEL:
              value: parakeet,modulate-velma-2
              category: stt_policy
            HOSTED_PARAKEET_API_URL:
              value: http://parakeet.omiapi.com
              category: service_discovery
            OMI_LLM_GATEWAY_URL:
              env_var: OMI_LLM_GATEWAY_URL
              default: http://127.0.0.1:9
              category: service_discovery
            OMI_LLM_GATEWAY_FEATURE_MODE:
              value: gateway
              category: rollout
            OMI_LLM_GATEWAY_ALLOW_DIRECT_MODEL_EXCEPTION:
              value: 'true'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            OMI_LLM_GATEWAY_DEV_SHADOW_ALL_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_DEV_SHADOW_ALL_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            POSTHOG_HOST:
              value: https://app.posthog.com
              category: telemetry
            MEMORY_MODE:
              value: read
              category: memory_rollout
            MEMORY_ENABLED_USERS:
              value: vi7SA9ckQCe4ccobWNxlbdcNdC23
            # Next dogfood (re-enable soon): ,viUv7GtdoHXbK1UBCDlPuTDuPgJ2
              category: memory_rollout
            MEMORY_V3_GET_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_CRON_ENABLED:
              value: 'false'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_TYPESENSE_COLLECTION:
              value: canonical_memory_atoms
              category: memory_rollout
            SYNC_BACKFILL_ENABLED:
              value: 'true'
              category: rollout
              provisional: true
          forbidden_env:
            - HOSTED_PUSHER_API_URL
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            GOOGLE_CLIENT_SECRET:
              secret: GOOGLE_CLIENT_SECRET
              version: latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
            POSTHOG_PROJECT_API_KEY:
              secret: POSTHOG_PROJECT_API_KEY
              version: latest
            MODULATE_API_KEY:
              secret: MODULATE_API_KEY
              version: latest
        backend-sync-backfill:
          <<: *dev_backend_sync
          provisional: true
        backend-integration:
          env:
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            GCP_LOCATION:
              value: us-central1
            USE_VERTEX_AI:
              value: 'true'
            OMI_ENV_STAGE:
              value: dev
              category: runtime_identity
            GOOGLE_CLIENT_ID:
              env_var: GOOGLE_CLIENT_ID
              category: oauth_metadata
            STT_PRERECORDED_MODEL:
              value: parakeet,modulate-velma-2
              category: stt_policy
            HOSTED_PARAKEET_API_URL:
              value: http://parakeet.omiapi.com
              category: service_discovery
            OMI_LLM_GATEWAY_URL:
              env_var: OMI_LLM_GATEWAY_URL
              default: http://127.0.0.1:9
              category: service_discovery
            OMI_LLM_GATEWAY_FEATURE_MODE:
              value: gateway
              category: rollout
            OMI_LLM_GATEWAY_ALLOW_DIRECT_MODEL_EXCEPTION:
              value: 'true'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_STRUCTURE_SHADOW_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_CONVERSATION_ACTION_ITEMS_SHADOW_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            OMI_LLM_GATEWAY_DEV_SHADOW_ALL_ENABLED:
              value: 'false'
              category: rollout
            OMI_LLM_GATEWAY_DEV_SHADOW_ALL_SAMPLE_RATE:
              value: '1.0'
              category: rollout
            POSTHOG_HOST:
              value: https://app.posthog.com
              category: telemetry
            MEMORY_MODE:
              value: read
              category: memory_rollout
            MEMORY_ENABLED_USERS:
              value: vi7SA9ckQCe4ccobWNxlbdcNdC23
            # Next dogfood (re-enable soon): ,viUv7GtdoHXbK1UBCDlPuTDuPgJ2
              category: memory_rollout
            MEMORY_V3_GET_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_CRON_ENABLED:
              value: 'false'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_TYPESENSE_COLLECTION:
              value: canonical_memory_atoms
              category: memory_rollout
          forbidden_env:
            - HOSTED_PUSHER_API_URL
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            GOOGLE_CLIENT_SECRET:
              secret: GOOGLE_CLIENT_SECRET
              version: latest
            OMI_LLM_GATEWAY_SERVICE_TOKEN:
              secret: OMI_LLM_GATEWAY_SERVICE_TOKEN
              version: latest
            POSTHOG_PROJECT_API_KEY:
              secret: POSTHOG_PROJECT_API_KEY
              version: latest
            MODULATE_API_KEY:
              secret: MODULATE_API_KEY
              version: latest
      jobs:
        notifications-job:
          env:
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            OMI_ENV_STAGE:
              value: dev
              category: runtime_identity
            # X connector sync still indexes via Pinecone (not memory maintenance).
            PINECONE_INDEX_NAME:
              value: memories-backend-dev
              category: integrations
          forbidden_env:
            - HOSTED_PUSHER_API_URL
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            OPENAI_API_KEY:
              secret: OPENAI_API_KEY
              version: latest
            PINECONE_API_KEY:
              secret: PINECONE_API_KEY
              version: latest
        memory-maintenance-job:
          # Keep the known-good dev maintenance capacity in the checked-in deploy contract.
          # These must not rely on a prior Cloud Run revision retaining live-only patches.
          flags:
            --task-timeout: 3600s
            --cpu: '2'
            --memory: 2Gi
          env:
            GOOGLE_CLOUD_PROJECT:
              value: based-hardware
            OMI_ENV_STAGE:
              value: dev
              category: runtime_identity
            MEMORY_MODE:
              value: read
              category: memory_rollout
            MEMORY_ENABLED_USERS:
              value: vi7SA9ckQCe4ccobWNxlbdcNdC23
            # Next dogfood (re-enable soon): ,viUv7GtdoHXbK1UBCDlPuTDuPgJ2
              category: memory_rollout
            MEMORY_V3_GET_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_CRON_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_CANONICAL_PROMOTION_FAST_TRACK_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_CANONICAL_CONSOLIDATION_ENABLED:
              value: 'true'
              category: memory_rollout
            MEMORY_TYPESENSE_COLLECTION:
              value: canonical_memory_atoms
              category: memory_rollout
            TYPESENSE_HOST_PORT:
              value: '443'
              category: memory_rollout
            PINECONE_INDEX_NAME:
              value: memories-backend-dev
              category: memory_rollout
          secrets:
            SERVICE_ACCOUNT_JSON:
              secret: SERVICE_ACCOUNT_JSON
              version: latest
            ENCRYPTION_SECRET:
              secret: ENCRYPTION_SECRET
              version: latest
            OPENAI_API_KEY:
              secret: OPENAI_API_KEY
              version: latest
            PINECONE_API_KEY:
              secret: PINECONE_API_KEY
              version: latest
            TYPESENSE_HOST:
              secret: TYPESENSE_HOST
              version: latest
            TYPESENSE_API_KEY:
              secret: TYPESENSE_API_KEY
