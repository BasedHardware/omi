    - secretKey: METRICS_SECRET
      remoteKey: METRICS_SECRET
    - secretKey: X_OAUTH_CLIENT_SECRET
      remoteKey: X_OAUTH_CLIENT_SECRET
    - secretKey: MCP_OAUTH_CHATGPT_CLIENT_SECRET
      remoteKey: MCP_OAUTH_CHATGPT_CLIENT_SECRET
    - secretKey: MCP_OAUTH_CLIENTS_JSON
      remoteKey: MCP_OAUTH_CLIENTS_JSON
