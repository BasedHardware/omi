replicaCount: 2

image:
  repository: gcr.io/based-hardware/llm-gateway
  pullPolicy: Always
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
podLabels: {}

service:
  type: ClusterIP
  backendConfig: ""
  port: 8080

ingress:
  enabled: false

env:
  - name: OMI_LLM_GATEWAY_PROD
    value: "true"
  - name: OMI_LLM_GATEWAY_SERVICE_TOKEN
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: OMI_LLM_GATEWAY_SERVICE_TOKEN
  - name: LLM_GATEWAY_ALLOWED_CALLERS
    value: "backend"
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: OPENAI_API_KEY
  - name: ANTHROPIC_API_KEY
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: ANTHROPIC_API_KEY
  - name: METRICS_SECRET
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: METRICS_SECRET
  - name: DD_SERVICE
    value: "llm-gateway"
  - name: DD_ENV
    value: "prod"
  - name: DD_TRACE_ENABLED
    value: "true"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  failureThreshold: 3
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  exec:
    command:
      - sh
      - -ec
      - >-
        curl --fail --silent --show-error --max-time 4
        --header "Authorization: Bearer ${OMI_LLM_GATEWAY_SERVICE_TOKEN}"
        --header "X-Omi-Service-Caller: backend"
        http://127.0.0.1:8080/ready >/dev/null
  failureThreshold: 3
  periodSeconds: 10
  timeoutSeconds: 5

startupProbe:
  httpGet:
    path: /health
    port: 8080
  failureThreshold: 30
  periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: env
              operator: In
              values:
                - prod
