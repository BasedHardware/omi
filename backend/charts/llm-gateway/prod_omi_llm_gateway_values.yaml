replicaCount: 2

image:
  repository: gcr.io/based-hardware/llm-gateway
  pullPolicy: Always
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
podLabels: {}

service:
  type: ClusterIP
  backendConfig: prod-llm-gateway-backend-config
  port: 8080
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "prod-llm-gateway-backend-config"}'

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: "gce-internal"
    kubernetes.io/ingress.regional-static-ip-name: "prod-omi-self-hosted-llm-ip-address"
    kubernetes.io/ingress.allow-http: "true"
  hosts:
    - paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  - name: OMI_LLM_GATEWAY_PROD
    value: "true"
  - name: OMI_LLM_GATEWAY_SERVICE_TOKEN
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: OMI_LLM_GATEWAY_SERVICE_TOKEN
  - name: LLM_GATEWAY_ALLOWED_CALLERS
    value: "backend"
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: OPENAI_API_KEY
  - name: ANTHROPIC_API_KEY
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: ANTHROPIC_API_KEY
  - name: OPENROUTER_API_KEY
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: OPENROUTER_API_KEY
  - name: METRICS_SECRET
    valueFrom:
      secretKeyRef:
        name: prod-omi-backend-secrets
        key: METRICS_SECRET
  - name: GOOGLE_CLOUD_PROJECT
    value: "based-hardware"
  - name: GCP_LOCATION
    value: "us-central1"
  - name: DD_SERVICE
    value: "llm-gateway"
  - name: DD_ENV
    value: "prod"
  - name: DD_TRACE_ENABLED
    value: "true"
  - name: LLM_GATEWAY_ACCOUNTING_ENABLED
    value: "true"
  - name: LLM_GATEWAY_ACCOUNTING_WRITE_TIMEOUT_SECONDS
    value: "1"
  - name: LLM_GATEWAY_ACCOUNTING_MAX_PENDING_TRACES
    value: "1000"
  - name: OMI_LLM_GATEWAY_OUTPUT_BUDGET_EXPERIMENTS
    value: "public_shared_conversation_chat"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 2Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  failureThreshold: 3
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  exec:
    command:
      - sh
      - -ec
      - >-
        curl --fail --silent --show-error --max-time 4
        --header "Authorization: Bearer ${OMI_LLM_GATEWAY_SERVICE_TOKEN}"
        --header "X-Omi-Service-Caller: backend"
        http://127.0.0.1:8080/ready >/dev/null
  failureThreshold: 3
  periodSeconds: 10
  timeoutSeconds: 5

startupProbe:
  httpGet:
    path: /health
    port: 8080
  failureThreshold: 30
  periodSeconds: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: env
              operator: In
              values:
                - prod
