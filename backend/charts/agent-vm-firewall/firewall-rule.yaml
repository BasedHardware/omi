# GCP firewall rule: deny public internet ingress to agent VM port 8080 (#7326).
#
# Agent VMs are tagged `omi-agent-vm` at provision time (desktop Backend-Rust
# build_gce_vm_insert_body). This rule is defense-in-depth when a VM still has
# an external IP or a broad default-allow ingress rule would otherwise reach 8080.
#
# Apply (idempotent):
#   backend/scripts/apply-agent-vm-firewall.sh
#
# Verify before desktop-backend deploy:
#   backend/scripts/agent-vm-reachability-check.sh
#   backend/scripts/agent-vm-reachability-check.sh --live based-hardware
name: omi-agent-vm-deny-public-8080
project: based-hardware
network: default
priority: 1000
direction: INGRESS
action: DENY
rules:
  - protocol: tcp
    ports:
      - "8080"
sourceRanges:
  - 0.0.0.0/0
targetTags:
  - omi-agent-vm
description: Deny public internet ingress to agent VM HTTP/WS port 8080 (#7326)
