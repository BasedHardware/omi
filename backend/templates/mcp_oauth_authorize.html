<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect ChatGPT to Omi</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7f7f7;
            color: #222;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .card {
            width: min(480px, calc(100vw - 32px));
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            padding: 18px 24px;
            border-bottom: 1px solid #eee;
            font-weight: 650;
        }

        .content {
            padding: 28px 24px;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            line-height: 1.25;
        }

        p {
            margin: 0 0 20px 0;
            color: #555;
            line-height: 1.45;
        }

        ul {
            padding: 0;
            margin: 0 0 24px 0;
            list-style: none;
            border-top: 1px solid #eee;
        }

        li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            color: #333;
            font-size: 14px;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            background: #111;
            color: #fff;
            font-weight: 650;
            font-size: 15px;
            padding: 12px 14px;
            cursor: pointer;
        }

        #firebaseui-auth-container {
            margin-top: 20px;
        }

        .error {
            margin-top: 12px;
            color: #b00020;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="header">Omi</div>
        <div class="content">
            <h1>Connect ChatGPT</h1>
            <p>ChatGPT wants to connect to your Omi account.</p>
            <ul>
                {% for permission in permissions %}
                <li>{{ permission }}</li>
                {% endfor %}
            </ul>
            <div id="firebaseui-auth-container"></div>
            <button id="connect-button" style="display:none;">Connect</button>
            <div id="loader" style="display:none;">Loading...</div>
            <div id="error-message" class="error"></div>
        </div>
    </div>

    <script>
        const oauthParams = {{ oauth_params | tojson }};
        const firebaseConfig = {{ firebase_config | tojson }};
        firebase.initializeApp(firebaseConfig);

        let idToken = null;
        const signInOptions = [firebase.auth.GoogleAuthProvider.PROVIDER_ID];
        if (/Mac|iPod|iPhone|iPad/.test(navigator.platform)) {
            signInOptions.push('apple.com');
        }

        function showError(error) {
            document.getElementById('error-message').textContent = error.message || String(error);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('connect-button').style.display = idToken ? 'block' : 'none';
        }

        function submitConsent() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('connect-button').style.display = 'none';
            const formData = new FormData();
            Object.entries(oauthParams).forEach(([key, value]) => formData.append(key, value));
            formData.append('firebase_id_token', idToken);
            fetch('/authorize', { method: 'POST', body: formData, redirect: 'manual' })
                .then(response => {
                    if (response.type === 'opaqueredirect' || response.status === 0) {
                        window.location.reload();
                        return null;
                    }
                    if (response.status >= 300 && response.status < 400) {
                        const location = response.headers.get('Location');
                        if (location) {
                            window.location.href = location;
                            return null;
                        }
                    }
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.error_description || err.detail || 'Authorization failed'); });
                    }
                    return response.json();
                })
                .then(data => {
                    if (data && data.redirect_uri) {
                        window.location.href = data.redirect_uri;
                    }
                })
                .catch(showError);
        }

        document.getElementById('connect-button').addEventListener('click', submitConsent);
        const ui = new firebaseui.auth.AuthUI(firebase.auth());
        ui.start('#firebaseui-auth-container', {
            signInFlow: 'popup',
            signInOptions: signInOptions,
            callbacks: {
                signInSuccessWithAuthResult: function (authResult) {
                    document.getElementById('loader').style.display = 'block';
                    authResult.user.getIdToken().then(function (token) {
                        idToken = token;
                        document.getElementById('firebaseui-auth-container').style.display = 'none';
                        document.getElementById('connect-button').style.display = 'block';
                        document.getElementById('loader').style.display = 'none';
                    }).catch(showError);
                    return false;
                },
                signInFailure: function (error) {
                    showError(error);
                },
                uiShown: function () {
                    document.getElementById('loader').style.display = 'none';
                }
            }
        });
    </script>
</body>

</html>
