        autoscaling.knative.dev/minScale: '1'
        run.googleapis.com/cpu-throttling: 'false'
        run.googleapis.com/network-interfaces: '[{"network":"omi-prod-vpc-1","subnetwork":"omi-us-central1-prod-vpc-1-subnet-1"}]'
