        - name: FAIR_USE_CLASSIFIER_COOLDOWN_SECONDS
          value: '43200'
        - name: FAIR_USE_CLASSIFIER_LOOKBACK_DAYS
          value: '7'
        - name: FAIR_USE_CLASSIFIER_MODEL
          value: gpt-5.1
        - name: FAIR_USE_DAILY_SPEECH_MS
          value: '7200000'
        - name: FAIR_USE_ENABLED
