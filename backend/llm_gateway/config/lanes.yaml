      fallback_eligible_failure_classes:
        - timeout_before_output
        - provider_429_omi_paid
        - provider_5xx_omi_paid
      never_fallback_failure_classes:
        - byok_auth
        - byok_quota
        - byok_rate_limit
        - byok_unsupported_provider
        - missing_byok_key
        - capability_mismatch
        - invalid_config
