feature_bundles:
  - feature: public_shared_conversation_chat
    lane_id: omi:auto:public-shared-conversation-chat
    prompt_version: public_shared_conversation_chat.v1
    parser_version: plain_text.v1
    eval_suite: public_shared_conversation_chat.contract.v1
    promotion_gates:
      request_contract: strict_pydantic
      visibility_fail_closed: required
      rate_limit_fail_closed: required
      direct_provider_fallback: forbidden
      frontend_service_auth: cloud_run_oidc_and_opaque_ip_hmac
  - feature: chat_extraction.requires_context
    lane_id: omi:auto:chat-structured
    prompt_version: chat_extraction.requires_context.v1
    parser_version: RequiresContext.v1
    eval_suite: chat_extraction_requires_context.v1
    promotion_gates:
      schema_valid_rate: ">= 99.5%"
      classification_agreement_delta: ">= 0"
      false_negative_regression: none
      p95_latency_ms: "<= LKG + 10%"
      cost_per_success: "<= LKG + 15%"
  - feature: conversation_structure.extract.shadow
    lane_id: omi:auto:chat-structured
    prompt_version: conversation_structure.extract.v1
    parser_version: ConversationStructureExtraction.v1
    eval_suite: conversation_structure_extract.v1
    promotion_gates:
      schema_valid_rate: ">= 99.5%"
      category_match_rate: ">= 95%"
      title_empty_regression: none
      overview_empty_regression: none
      p95_latency_ms: "<= LKG + 10%"
      cost_per_success: "<= LKG + 15%"
  - feature: conversation_action_items.extract.shadow
    lane_id: omi:auto:chat-structured
    prompt_version: conversation_action_items.extract.v1
    parser_version: ActionItemsExtraction.v1
    eval_suite: conversation_action_items_extract.v1
    promotion_gates:
      schema_valid_rate: ">= 99.5%"
      action_item_count_regression: none
      due_at_parse_regression: none
      p95_latency_ms: "<= LKG + 10%"
      cost_per_success: "<= LKG + 15%"
