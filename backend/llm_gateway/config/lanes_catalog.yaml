  # ---------------------------------------------------------------------------
  # planned (3): the 3 R0 placeholders. They have no real surface, no
  # real provider, no internal eval. Per David's "No prod-loadable
  # placeholder route artifacts", they CANNOT be in the serving config
  # even in dev mode. They stay catalog-only as 'planned'.
  # ---------------------------------------------------------------------------
  - lane_id: omi:auto:stt-realtime
    description: Speech-to-text (real-time)
