# Backend route policy manifest for the primary FastAPI app in backend/main.py.
#
# PR 1 starts report-only: keep semantic claims out of this file until route
# owners review them. Add entries with review_status: reviewed or
# legacy_unreviewed as the route inventory workstream is baselined.
schema_version: 1
service: backend-main
routes:
  - route_type: http
    method: GET
    path: /v2/desktop/previews/{slug}
    policy:
      review_status: reviewed
      auth:
        mechanisms:
          - public
        placement: none
        scopes: []
      byok: not_applicable
      rate_limit:
        policy_name: none
        key_subject: none
        enforcement: none
        placement: none
      timeout_class: default_method
      surface: desktop_update
      visibility: public_undocumented
      data_domain: desktop_updates
      deprecation:
        state: active
