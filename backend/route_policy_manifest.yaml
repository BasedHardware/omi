# Backend route policy manifest for the primary FastAPI app in backend/main.py.
#
# PR 1 starts report-only: keep semantic claims out of this file until route
# owners review them. Add entries with review_status: reviewed or
# legacy_unreviewed as the route inventory workstream is baselined.
schema_version: 1
service: backend-main
routes:
  - route_type: http
    method: POST
    path: /v1/users/account-deletion-wipes/run
    policy:
      review_status: reviewed
      auth:
        mechanisms:
          - service_oidc
        placement: dependency
        scopes: []
      byok: not_applicable
      rate_limit:
        policy_name: none
        key_subject: none
        enforcement: none
        placement: none
      timeout_class: account_deletion_wipe
      surface: internal_task
      visibility: internal
      data_domain: user_profile
      deprecation:
        state: active
  - route_type: http
    method: POST
    path: /v2/integrations/{app_id}/user/persona-chat
    policy:
      review_status: legacy_unreviewed
      auth:
        mechanisms:
          - developer_api_key
        placement: inline
        scopes: []
      byok: not_applicable
      rate_limit:
        policy_name: none
        key_subject: none
        enforcement: none
        placement: none
      timeout_class: streaming
      surface: webhook
      visibility: internal
      data_domain: chat
      deprecation:
        state: active
