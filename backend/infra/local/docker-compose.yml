# Docker Compose for Local Development
# Run: docker-compose up --build
# Access: http://localhost:8000

services:
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: omi-redis
    ports:
      - "6379:6379"
    volumes:
      - omi-redis-data:/data
    command: >
      sh -c "if [ -n \"$$REDIS_DB_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass $$REDIS_DB_PASSWORD;
      else
        redis-server --appendonly yes;
      fi"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: omi-backend
    ports:
      - "8000:8080"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override these for Docker networking
      - REDIS_DB_HOST=redis
      - REDIS_DB_PORT=6379
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
    volumes:
      - omi-temp:/app/_temp
      - omi-samples:/app/_samples
      - omi-segments:/app/_segments
      - omi-speech-profiles:/app/_speech_profiles
      - omi-pretrained-models:/app/pretrained_models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  pusher:
    build:
      context: ../..
      dockerfile: pusher/Dockerfile
    platform: linux/amd64
    container_name: omi-pusher
    ports:
      - "8001:8080"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override these for Docker networking
      - REDIS_DB_HOST=redis
      - REDIS_DB_PORT=6379
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
    volumes:
      - omi-temp:/app/_temp
      - omi-samples:/app/_samples
      - omi-segments:/app/_segments
      - omi-speech-profiles:/app/_speech_profiles
      - omi-pretrained-models:/app/pretrained_models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  omi-redis-data:
    driver: local
  omi-temp:
    driver: local
  omi-samples:
    driver: local
  omi-segments:
    driver: local
  omi-speech-profiles:
    driver: local
  omi-pretrained-models:
    driver: local
