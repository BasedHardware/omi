<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <title>Nooto</title>
    <script>
      // Apply the user's theme preference before the bundle loads so the
      // Tauri window doesn't flash white (or dark) while React boots. HUD
      // windows (?window=floating|whispr|live-transcript) are always dark —
      // they're designed against a dark backdrop regardless of app theme.
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var win = params.get("window");
          var isHud =
            win === "floating" || win === "whispr" || win === "live-transcript";
          var mode = isHud
            ? "dark"
            : localStorage.getItem("nooto.theme.mode") || "system";
          var dark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
