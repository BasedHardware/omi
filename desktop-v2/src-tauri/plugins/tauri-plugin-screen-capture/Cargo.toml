[package]
name = "tauri-plugin-screen-capture"
version = "0.1.0"
edition = "2021"
description = "Cross-platform screen capture plugin for Tauri 2.0"
links = "tauri-plugin-screen-capture"

[dependencies]
tauri = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
tracing = "0.1"
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.21"
kreuzberg-paddle-ocr = "4.8"
ort = { version = "2.0.0-rc.12", features = ["download-binaries", "copy-dylibs", "ndarray"] }
rusqlite = { version = "0.31", features = ["bundled-full", "blob"] }
dirs = "5"

# Platform-specific
[target.'cfg(target_os = "linux")'.dependencies]
x11rb = { version = "0.13", features = ["randr"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Graphics_Gdi",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Foundation",
] }

[target.'cfg(target_os = "macos")'.dependencies]
# Pinned to 0.6/0.3 to match what tao + arboard already pull in. Older
# 0.5/0.2 versions cause `Encode`/`IsRetainable` trait-resolution failures
# when both versions land in the same dep graph.
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSString", "NSArray", "NSDictionary", "NSValue", "NSData"] }
objc2-app-kit = { version = "0.3", features = ["NSWorkspace", "NSRunningApplication", "NSScreen", "NSGraphics"] }
core-graphics = "0.24"
core-foundation = "0.10"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }
