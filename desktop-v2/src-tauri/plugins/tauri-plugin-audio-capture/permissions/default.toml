[default]
description = "Default permissions for the audio capture plugin"
permissions = [
    "allow-list-devices",
    "allow-start-recording",
    "allow-stop-recording",
    "allow-get-capture-state",
    "allow-probe-system-audio",
    "allow-probe-live-capture",
    "allow-request-system-audio-permission",
]

[[permission]]
identifier = "allow-list-devices"
description = "Allows listing input audio devices"
commands.allow = ["list_devices"]

[[permission]]
identifier = "allow-start-recording"
description = "Allows starting audio recording"
commands.allow = ["start_recording"]

[[permission]]
identifier = "allow-stop-recording"
description = "Allows stopping audio recording"
commands.allow = ["stop_recording"]

[[permission]]
identifier = "allow-get-capture-state"
description = "Allows reading the current capture state"
commands.allow = ["get_capture_state"]

[[permission]]
identifier = "allow-probe-system-audio"
description = "Allows running the system-audio capture diagnostic probe"
commands.allow = ["probe_system_audio"]

[[permission]]
identifier = "allow-probe-live-capture"
description = "Allows running the combined mic + system-audio live capture probe"
commands.allow = ["probe_live_capture"]

[[permission]]
identifier = "allow-request-system-audio-permission"
description = "Allows triggering the system-audio TCC prompt and opening System Settings"
commands.allow = ["request_system_audio_permission"]
