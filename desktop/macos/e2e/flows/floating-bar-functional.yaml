version: 2
name: floating-bar-functional
tier: 2
description: Ask Omi open + stubbed typed turn on the floating bar (distinct from perf benchmarks)
app: non-prod
covers:
  - desktop/macos/Desktop/Sources/Chat/ChatDraftStore.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/AIResponseView.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/AskAIInputView.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/AgentPill.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/DelayedActionScheduler.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/FloatingBarLaunchPolicy.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/FloatingBarVoicePlaybackService.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/FloatingControlBarGeometry.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/FloatingControlBarState.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/FloatingControlBarView.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/FloatingControlBarWindow.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/PTTContextVocabularyProvider.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/PushToTalkManager.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+SessionDelegate.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+SessionLifecycle.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+Tools.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubControllerSupport.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubResumeOnceGate.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubInputAdmission.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubSession.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubSessionPolicies.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubTestHarness.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubTools.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeSpawnReceipt.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeToolAuthority.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeTurnPersistence.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/VoiceTurnCoordinator.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/VoiceTurnStateMachine.swift
  - desktop/macos/Desktop/Sources/DesktopDiagnosticsManager.swift
  - desktop/macos/Desktop/Sources/Generated/GeneratedRealtimeTools.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/FloatingBackgroundModifier.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/VoiceWaveformBars.swift
  - desktop/macos/Desktop/Sources/Services/APIClient/APIClient+Tools.swift
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Assert signed-in launch shows floating bar
    state.expect:
      state.floatingBarVisible: true

  - id: S2
    name: Open Ask Omi
    bridge.action:
      name: open_ask_omi
      params:
        reset: "true"
        wait: "true"
    expect:
      result.detail.focused: "true"

  - id: S3
    name: Send stubbed floating-bar query
    bridge.action:
      name: ask
      params:
        query: "Hermetic floating bar [[MARKER:floating-bar]]"
    expect:
      result.detail.sent: "Hermetic floating bar [[MARKER:floating-bar]]"

  - id: S4
    name: Wait for floating-bar chat idle
    bridge.action:
      name: wait_floating_bar_chat_idle
      params:
        timeoutMs: "120000"
    expect:
      result.detail.idle: "true"
      result.detail.submission_observed: "true"

  - id: S5
    name: Assert stub marker echoed in assistant reply
    bridge.action:
      name: floating_bar_chat_snapshot
      params:
        limit: "12"
    expect:
      result.detail.last_assistant_text: "Stub saw marker: floating-bar"

  - id: S6
    name: Assert floating bar still open
    state.expect:
      state.askOmiOpen: true

  - id: S7
    name: Close Ask Omi
    bridge.action:
      name: close_ask_omi
      params:
        wait: "true"

  - id: S8
    name: Logs clean
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
