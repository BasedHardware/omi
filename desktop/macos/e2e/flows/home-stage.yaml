version: 2
name: home-stage
tier: 2
description: Proof-first Dashboard paging, hero cascade, and real background setting
app: non-prod
covers:
  - desktop/macos/Desktop/Sources/MainWindow/Dashboard/ProofFirstDashboard.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/DashboardPage.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/AppsPage.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/ShortcutSettings.swift
  - desktop/macos/Desktop/Sources/DesktopAutomationBridge.swift
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Navigate to Dashboard
    bridge.navigate:
      target: dashboard
      activateApp: false
    wait:
      state.selectedTabIndex: 0

  - id: S2
    name: Cascade resolves to one valid live tier on Home
    bridge.action:
      name: dashboard_snapshot
    expect:
      result.detail.page: home
      result.detail.page_valid: "true"
      result.detail.cascade_resolved: "true"

  - id: S3
    name: Page to canonical Connect data surface
    bridge.action:
      name: dashboard_select_page
      params:
        page: connectData
    expect:
      result.detail.selected: connectData
    wait:
      state.proofFirstDashboardPage: connectData

  - id: S4
    name: Page to Features
    bridge.action:
      name: dashboard_select_page
      params:
        page: features
    expect:
      result.detail.selected: features
    wait:
      state.proofFirstDashboardPage: features

  - id: S5
    name: Switch to the real Solid Dark preference
    bridge.action:
      name: dashboard_set_background_style
      params:
        style: solidDark
    expect:
      result.detail.style: solidDark
    wait:
      state.dashboardBackgroundStyle: solidDark

  - id: S6
    name: Restore Transparent background preference
    bridge.action:
      name: dashboard_set_background_style
      params:
        style: transparent
    expect:
      result.detail.style: transparent
    wait:
      state.dashboardBackgroundStyle: transparent

  - id: S7
    name: Return directly Home
    bridge.action:
      name: dashboard_select_page
      params:
        page: home
    wait:
      state.proofFirstDashboardPage: home

  - id: S8
    name: Logs clean
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
