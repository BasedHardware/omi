version: 2
name: chat
tier: 2
description: Main chat navigation and hermetic typed turn
app: non-prod
covers:
  - desktop/macos/Desktop/Sources/MainWindow/Pages/ChatPage.swift
  - desktop/macos/Desktop/Sources/Providers/ChatProvider.swift
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Navigate to Chat
    bridge.navigate:
      target: chat
      activateApp: false
    wait:
      state.selectedTabIndex: 2

  - id: S2
    name: Send hermetic query
    bridge.action:
      name: ask_main_chat
      params:
        query: "Say [[MARKER:chat-flow]]"
    expect:
      result.detail.sent: "Say [[MARKER:chat-flow]]"

  - id: S3
    name: Wait for idle
    bridge.action:
      name: wait_main_chat_idle
      params:
        timeoutMs: "120000"
    expect:
      result.detail.idle: "true"

  - id: S4
    name: Assert stub marker echoed in assistant reply
    bridge.action:
      name: main_chat_snapshot
      params:
        limit: "12"
    expect:
      result.detail.last_assistant_text: "Stub saw marker: chat-flow"

  - id: S5
    name: Logs clean
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
