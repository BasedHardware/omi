version: 2
name: language
tier: 2
description: Transcription language settings navigation via automation bridge
app: non-prod
covers:
  - desktop/macos/Desktop/Sources/MainWindow/Pages/SettingsPage.swift
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Open Settings transcription section
    bridge.navigate:
      target: settings
      settingsSection: Transcription
      activateApp: false
    wait:
      state.selectedSettingsSection: Transcription

  - id: S2
    name: Assert settings section loaded
    state.expect:
      state.selectedSettingsSection: Transcription

  - id: S3
    name: Set transcription language
    bridge.action:
      name: set_transcription_language
      params:
        language: es
        autoDetect: "false"
    expect:
      result.detail.saved: "true"
      result.detail.language: es

  - id: S4
    name: Transcription language snapshot
    bridge.action:
      name: transcription_language_snapshot
    expect:
      result.detail.language: es
      result.detail.auto_detect: "false"

  - id: S5
    name: Logs clean
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
