  - desktop/macos/Desktop/Sources/FileIndexing/KnowledgeGraphStorage.swift
  - desktop/macos/Desktop/Sources/ProactiveAssistants/Services/AIUserProfileService.swift
  - desktop/macos/Desktop/Sources/APIClient.swift
  - desktop/macos/Desktop/Sources/OmiWAL/WALModel.swift
  - desktop/macos/Desktop/Sources/WAL/StorageSyncService.swift
  - desktop/macos/Desktop/Sources/WAL/StorageSyncView.swift
  - desktop/macos/Desktop/Sources/WAL/WifiSyncService.swift
  - desktop/macos/Desktop/Sources/WAL/WALCloudSyncLogic.swift
  - desktop/macos/Desktop/Sources/WAL/WALService.swift
  - desktop/macos/Desktop/Sources/WAL/WALSyncReconciler.swift
  - desktop/macos/Desktop/Sources/TranscriptionService.swift
  - desktop/macos/Desktop/Sources/TranscriptionRetryService.swift
  - desktop/macos/Desktop/Sources/Rewind/Core/RewindDatabase.swift
  - desktop/macos/Desktop/Sources/ViewModelContainer.swift
  - desktop/macos/Desktop/Sources/Audio/BleAudioProcessor.swift
  - desktop/macos/Desktop/Sources/Audio/BleAudioService.swift
  - desktop/macos/Desktop/Sources/Rewind/Core/RewindStorage.swift
  - desktop/macos/Desktop/Sources/Services/QueryTracer.swift
  - desktop/macos/Desktop/Sources/Rewind/Core/VideoChunkEncoder.swift
  - desktop/macos/Desktop/Sources/Rewind/Services/RewindIndexer.swift
  - desktop/macos/Desktop/Sources/MeetingDetector.swift
  - desktop/macos/Desktop/Sources/Rewind/Services/PowerMonitor.swift
  - desktop/macos/Desktop/Sources/Bluetooth/BtDevice.swift
  - desktop/macos/Desktop/Sources/Bluetooth/DeviceUUIDs.swift
  - desktop/macos/Desktop/Sources/ConcurrencySendable.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/StreamingPCMPlayer.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/SystemAudioMuteController.swift
  - desktop/macos/Desktop/Sources/FileIndexing/IndexedFileRecord.swift
  - desktop/macos/Desktop/Sources/FileIndexing/KnowledgeGraphRecord.swift
  - desktop/macos/Desktop/Sources/LiveNotes/LiveNoteModels.swift
  - desktop/macos/Desktop/Sources/LiveNotes/LiveNotesAccumulator.swift
  - desktop/macos/Desktop/Sources/LiveNotes/LiveNotesMonitor.swift
  - desktop/macos/Desktop/Sources/MemoryBankConnector.swift
  - desktop/macos/Desktop/Sources/MemoryExportConnectionDetector.swift
  - desktop/macos/Desktop/Sources/NotificationRegistrationRepair.swift
  - desktop/macos/Desktop/Sources/Rewind/Core/MemoryModels.swift
  - desktop/macos/Desktop/Sources/Rewind/Core/ObservationRecord.swift
  - desktop/macos/Desktop/Sources/Rewind/Core/ProactiveModels.swift
  - desktop/macos/Desktop/Sources/ScreenActivitySyncService.swift
  - desktop/macos/Desktop/Sources/SingleInstanceGuard.swift
  - desktop/macos/Desktop/Sources/MainWindow/CaptureListeningControls.swift
  - desktop/macos/Desktop/Sources/MainWindow/CaptureListeningLogic.swift
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Snapshot conversations before capture
    bridge.action:
      name: conversation_list_snapshot
    expect:
      ok: true

  - id: S2
    name: Run capture lifecycle with marker transcript
    bridge.action:
      name: capture_test_transcript
      params:
        phase: lifecycle
        text: "[[MARKER:capture-lifecycle]] hermetic desktop capture"
    expect:
      result.detail.stopped: "true"
      result.detail.conversation_count_increased: "true"
      result.detail.segment_count: "1"

  - id: S3
    name: Navigate to Conversations
    bridge.navigate:
      target: conversations
      activateApp: false
    wait:
      state.selectedTabIndex: 1

  - id: S4
    name: Reconcile cached list and canonical detail
    bridge.action:
      name: conversation_reconciliation_snapshot
    expect:
      result.detail.list_loaded: "true"
      result.detail.cached_projection_seen: "true"
      result.detail.detail_id_matches: "true"
      result.detail.detail_has_revision: "true"
      result.detail.detail_transcript_included: "true"
      result.detail.cache_id_matches: "true"
      result.detail.cache_revision_matches: "true"
      result.detail.opened_detail: "true"

  - id: S5
    name: Assert conversation list reflects new capture
    bridge.action:
      name: conversation_list_snapshot
      params:
        limit: "8"
    expect:
      ok: true
      result.detail.is_transcribing: "false"

  - id: S6
    name: Logs clean
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
