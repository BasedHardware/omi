version: 2
name: ptt-lifecycle
tier: 2
description: Real push-to-talk start/release lifecycle through the automation bridge
app: non-prod
covers:
  - desktop/macos/Desktop/Sources/Chat/APIClient+HigherModel.swift
  - desktop/macos/Desktop/Sources/Chat/ExternalSurfaceRunAuthority.swift
  - desktop/macos/Desktop/Sources/DefaultsKey.swift
  - desktop/macos/Desktop/Sources/DesktopAutomationBridge.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/LegacyVoiceJournalImporter.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/PTTAttemptLifecycleRecorder.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/PushToTalkManager.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/PushToTalkManager+InputDeviceRouting.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/ShortcutSettings.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RawWebSocket.swift
  - desktop/macos/Desktop/Sources/RealtimeOmni/RealtimeOmniService.swift
  - desktop/macos/Desktop/Sources/RealtimeOmni/RealtimeOmniTestHarness.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+PushToTalk.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+SessionDelegate.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+SessionLifecycle.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+VoiceOutput.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubController+ScreenEvidence.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubInputAdmission.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeScreenEvidence.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubSessionPolicies.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeSpawnReceipt.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeToolAuthority.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeTurnPersistence.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/ScreenCaptureManager.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/RealtimeHubSettings.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/VoiceTurnCoordinator.swift
  - desktop/macos/Desktop/Sources/VoiceTurnDomain/VoiceTurnStateMachine.swift
  - desktop/macos/Desktop/Sources/FloatingControlBar/GlobalShortcutManager.swift
  - desktop/macos/Desktop/Sources/VADGateService.swift
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Start PTT through the real shortcut lifecycle
    bridge.action:
      name: ptt_start
    expect:
      result.detail.listening: "true"

  - id: S2
    name: Assert typed turn is recording without anomalies
    bridge.action:
      name: ptt_turn_snapshot
    expect:
      result.detail.phase: recording
      result.detail.stale_event_count: "0"
      result.detail.invalid_transition_count: "0"

  - id: S3
    name: Release PTT through the real finalization lifecycle
    bridge.action:
      name: ptt_stop
    expect:
      result.detail.finalized: "true"

  - id: S4
    name: Assert empty capture terminated with the actionable too-short result
    bridge.action:
      name: ptt_turn_snapshot
    expect:
      result.detail.phase: terminal_too_short
      result.detail.terminal_reason: too_short
      result.detail.stale_event_count: "0"
      result.detail.invalid_transition_count: "0"

  - id: S5
    name: Logs contain no bridge failures or invalid voice transitions
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
        - "VoiceTurnCoordinator: invalid transition"
