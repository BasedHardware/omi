version: 2
name: focus
tier: manual
description: Focus history loading and refresh keep the page content stable
app: com.omi.computer-macos
covers:
  - desktop/macos/Desktop/Sources/MainWindow/Pages/FocusPage.swift
preconditions:
  - auth_ready

steps:
  - id: S1
    name: Open Focus history
    do: "Open the Focus page through the non-production automation bridge (`omi-ctl navigate focus`). Verify the Focus heading, monitoring status, and session summary appear."
    expect:
      text_visible:
        - Focus

  - id: S2
    name: Refresh without shifting page content
    do: "Choose Refresh from the Focus actions menu. While loading, verify the progress indicator overlays the existing header and summary rather than replacing or moving them."
    expect:
      text_visible:
        - Focus
