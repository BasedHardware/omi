version: 1
name: ask-omi-open-benchmark
tier: 3
description: Repeated cursor-free Ask Omi open timing for the floating pill.
app: non-prod
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Reset Ask Omi
    bridge.action:
      name: close_ask_omi

  - id: S2
    name: Open Ask Omi 1
    bridge.action:
      name: open_ask_omi
      reset: true
    wait:
      state.askOmiOpen: true

  - id: S3
    name: Close Ask Omi 1
    bridge.action:
      name: close_ask_omi

  - id: S4
    name: Open Ask Omi 2
    bridge.action:
      name: open_ask_omi
      reset: true
    wait:
      state.askOmiOpen: true

  - id: S5
    name: Close Ask Omi 2
    bridge.action:
      name: close_ask_omi

  - id: S6
    name: Open Ask Omi 3
    bridge.action:
      name: open_ask_omi
      reset: true
    wait:
      state.askOmiOpen: true

  - id: S7
    name: Capture Ask Omi Visual
    visual.export:
      name: ask-omi-open
      target: floating

  - id: S8
    name: Assert Ask Omi State
    state.expect:
      state.askOmiOpen: true

  - id: S9
    name: Assert Logs Are Clean
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
        - "unsupported_route"
