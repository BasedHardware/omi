version: 2
name: memories
tier: 2
description: Memories page navigation and refresh via automation bridge
app: non-prod
covers:
  - desktop/macos/Desktop/Sources/OmiSupport/DesktopLocalProfile.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/MemoriesPage.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/PersonaPage.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/MemoryGraph/ForceDirectedSimulation.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/MemoryGraph/MemoryGraphPage.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/MemoryGraph/CanonicalMemoryAtlasView.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/MemoryGraph/MemoryAtlasRenderPlanCache.swift
  - desktop/macos/Desktop/Sources/ViewModelContainer.swift
  - desktop/macos/Desktop/Sources/MainWindow/Pages/MemoryExportDestinationSheet.swift
preconditions:
  - automation_bridge_ready

steps:
  - id: S1
    name: Navigate to Memories
    bridge.navigate:
      target: memories
      activateApp: false
    wait:
      state.selectedTabIndex: 3

  - id: S2
    name: Refresh data
    bridge.action:
      name: refresh_all_data

  - id: S3
    name: Memories snapshot
    bridge.action:
      name: memories_snapshot
    expect:
      result.detail.is_signed_in: "true"
      result.detail.load_state: "loaded"
      result.detail.memory_count_valid: "true"
      # memory_count may be 0 on a fresh profile; happy_path alice seed has 22 default-scope memories.

  - id: S4
    name: Activate memory search without assuming account-specific content
    bridge.action:
      name: memories_search
      params:
        query: "connector-import"
    expect:
      result.detail.search_active: "true"

  - id: S5
    name: Open Atlas exploration page
    bridge.action:
      name: open_memory_atlas
    expect:
      result.detail.opened: "true"
      result.detail.target: "page"

  - id: S6
    name: Scrub Atlas replay
    bridge.action:
      name: memory_atlas_set_time
      params:
        target: "page"
        fraction: "0.45"
    expect:
      result.detail.posted: "true"
      result.detail.target: "page"
      result.detail.fraction: "0.45"

  - id: S7
    name: Zoom and pan Atlas
    bridge.action:
      name: memory_atlas_set_viewport
      params:
        target: "page"
        zoom: "2.2"
        pan_x: "140"
        pan_y: "-80"
    expect:
      result.detail.posted: "true"
      result.detail.target: "page"
      result.detail.zoom: "2.2"

  - id: S8
    name: Logs clean
    log.expect:
      absent:
        - "DesktopAutomationBridge: failed"
