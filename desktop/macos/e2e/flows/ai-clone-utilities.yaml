# E2E Flow: AI Clone utilities — ClipboardWatcher, QRCodeGenerator, TelegramTokenValidator
# Tests: clipboard paste detection, QR code generation, Telegram token validation

version: 2
name: ai-clone-utilities
description: AI Clone utilities flow — verify clipboard watcher detects plugin URLs, QR code renders for bot tokens, and Telegram token validator accepts valid tokens
app: com.omi.computer-macos
covers:
  - desktop/Desktop/Sources/Utilities/ClipboardWatcher.swift
  - desktop/Desktop/Sources/Utilities/QRCodeGenerator.swift
  - desktop/Desktop/Sources/Utilities/TelegramTokenValidator.swift
preconditions:
  - auth_ready

steps:
  - id: AU1
    name: Verify QR code generation
    do: "Open AI Clone settings, enter a Telegram bot token. Verify a QR code is generated and displayed."
    verify: true
