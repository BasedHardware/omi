services:
  desktop-backend:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    container_name: nooto-desktop-backend
    ports:
      - "10201:8080"
    volumes:
      - ./google-credentials.json:/app/google-credentials.json:ro
    environment:
      - PORT=8080
      # Firebase / Firestore
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_AUTH_PROJECT_ID=${FIREBASE_AUTH_PROJECT_ID:-}
      - FIREBASE_API_KEY=${FIREBASE_API_KEY:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      # Google credentials — minify your JSON: cat google-credentials.json | jq -c
      # Same env var used by the Python backend on Coolify
      - SERVICE_ACCOUNT_JSON=${SERVICE_ACCOUNT_JSON:-}
      - SERVICE_ACCOUNT_JSON_BASE64=${SERVICE_ACCOUNT_JSON_BASE64:-}
      # AI
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Encryption
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-}
      # Redis (optional — for conversation sharing)
      - REDIS_DB_HOST=${REDIS_DB_HOST:-}
      - REDIS_DB_PORT=${REDIS_DB_PORT:-6379}
      - REDIS_DB_PASSWORD=${REDIS_DB_PASSWORD:-}
      # OAuth (required for desktop sign-in)
      - BASE_API_URL=${BASE_API_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      # Desktop API keys (served to Swift app via /v1/config/api-keys)
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_CALENDAR_API_KEY=${GOOGLE_CALENDAR_API_KEY:-}
      # Vector DB (optional)
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_HOST=${PINECONE_HOST:-}
      # Agent VM (optional)
      - GCE_PROJECT_ID=${GCE_PROJECT_ID:-}
      - GCE_SOURCE_IMAGE=${GCE_SOURCE_IMAGE:-}
      - AGENT_GCS_BUCKET=${AGENT_GCS_BUCKET:-}
      # Observability
      - RUST_LOG=${RUST_LOG:-omi_desktop_backend=info,tower_http=info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
