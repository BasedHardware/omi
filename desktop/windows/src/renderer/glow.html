<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- Slim entry for the halo window (#/glow). Same <head> (incl. CSP) as
         index.html so behavior is identical, but it loads glow.tsx — only the
         GlowWindow component tree, NOT the full app bundle (React app graph,
         three.js, onnxruntime). See perf/win-slim-aux-windows. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: https: https://*.googleusercontent.com;
        font-src 'self' data:;
        media-src 'self' blob:;
        connect-src 'self'
          https://identitytoolkit.googleapis.com
          https://securetoken.googleapis.com
          https://www.googleapis.com
          https://*.firebaseapp.com
          https://*.firebaseio.com
          https://firebase.googleapis.com
          https://api.omi.me
          wss://api.omi.me
          https://desktop-backend-hhibjajaja-uc.a.run.app
          https://api.openai.com
          wss://api.openai.com
          https://generativelanguage.googleapis.com
          wss://generativelanguage.googleapis.com
          https://api.deepgram.com
          wss://api.deepgram.com
          https://accounts.google.com
          https://cdn.jsdelivr.net;
        frame-src 'self';
        worker-src 'self' blob:;
      "
    />
  </head>

  <body style="background: transparent">
    <div id="root" style="background: transparent"></div>
    <script type="module" src="/src/glow.tsx"></script>
  </body>
</html>
