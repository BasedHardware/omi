allowBuilds:
  '@firebase/util': true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  koffi: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
supportedArchitectures:
  os:
    - current
    # Keep Windows optional native packages in the lockfile from non-Windows hosts;
    # install-time scripts still gate Windows-only staging by process.platform.
    - win32
  cpu:
    - current
    - x64
  libc:
    - current
