# E2E Flow: Desktop app navigation
# Converted from flow1-app-navigation.sh
# Tests: snapshot, sidebar nav, find, fill, scroll, assert, wait, screenshot, tray menu

name: navigation
description: Desktop app navigation — sidebar icons, section switching, text input, scroll, tray menu
covers:
  - Desktop/Sources/MainWindow/SidebarView.swift
  - Desktop/Sources/MainWindow/DesktopHomeView.swift
  - Desktop/Sources/MainWindow/OmiApp.swift
setup: normal
bundle_id: com.omi.desktop-dev

steps:
  - name: Snapshot main window
    assert:
      interactive_count: { min: 3 }
    screenshot: main-window

  - name: Find button element
    find: { role: button }
    save_ref: btn_ref

  - name: Assert element exists and non-existent does not
    assert:
      - { exists: "$btn_ref" }
      - { not_exists: "e99999" }

  - name: Verify sidebar navigation icons
    assert_each:
      type: image
      labels:
        - Home
        - Conversation
        - brain
        - checklist
        - puzzlepiece.fill
        - gearshape.fill
      min_found: 4

  - name: Navigate through sidebar sections
    navigate_sidebar:
      - { type: image, label: Conversation }
      - { type: image, label: brain }
      - { type: image, label: checklist }
      - { type: image, label: Home }
    action: click
    min_success: 3
    screenshot_each: true

  - name: Fill text input
    fill: { type: textfield, value: "agent-swift E2E test" }
    optional: true
    screenshot: after-fill

  - name: Scroll down and up
    scroll:
      - down
      - up

  - name: Wait for element
    wait: { exists: "$btn_ref", timeout: 3000 }

  - name: Verify system tray menu
    assert:
      type: menuitem
      identifier_prefixes:
        - openOmi
        - checkFor
        - resetOnb
        - reportIs
        - signOut
        - quitApp
      min_count: 3

  - name: Verify app responsiveness
    assert:
      interactive_count: { min: 3 }
    screenshot: final
