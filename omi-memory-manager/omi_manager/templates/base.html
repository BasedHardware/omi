<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Omi Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .checkbox-cell input:checked + label { background: #6366f1; border-color: #6366f1; }
    .checkbox-cell label { transition: all 0.15s; }
    .toast { animation: slideIn 0.3s ease, fadeOut 0.5s ease 2.5s forwards; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900">

  <!-- Sidebar + Content -->
  <div class="flex h-full">

    <!-- Sidebar -->
    <nav class="w-56 bg-white border-r border-gray-200 flex flex-col fixed h-full">
      <div class="p-5 border-b border-gray-100">
        <h1 class="text-xl font-bold text-indigo-600">Omi Manager</h1>
      </div>
      <ul class="flex-1 py-4 space-y-1 px-3">
        <li>
          <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium {% if active == 'dashboard' %}bg-indigo-50 text-indigo-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="/memories" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium {% if active == 'memories' %}bg-indigo-50 text-indigo-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            Memories
          </a>
        </li>
        <li>
          <a href="/tasks" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium {% if active == 'tasks' %}bg-indigo-50 text-indigo-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
            Tasks
          </a>
        </li>
        <li>
          <a href="/conversations" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium {% if active == 'conversations' %}bg-indigo-50 text-indigo-700{% else %}text-gray-600 hover:bg-gray-100{% endif %}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            Conversations
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="flex-1 ml-56 p-8 overflow-y-auto">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-indigo-500' };
      const div = document.createElement('div');
      div.className = `toast ${colors[type] || colors.info} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium`;
      div.textContent = message;
      container.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }

    // Select all / none
    function toggleSelectAll(source, name) {
      const checkboxes = document.querySelectorAll(`input[name="${name}"]`);
      checkboxes.forEach(cb => cb.checked = source.checked);
      updateBulkBar();
    }

    function getSelectedIds(name) {
      return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(cb => cb.value);
    }

    function updateBulkBar() {
      const bar = document.getElementById('bulk-bar');
      if (!bar) return;
      const name = bar.dataset.name;
      const ids = getSelectedIds(name);
      const count = document.getElementById('selected-count');
      if (ids.length > 0) {
        bar.classList.remove('hidden');
        count.textContent = ids.length;
      } else {
        bar.classList.add('hidden');
      }
    }

    async function bulkAction(url, name, confirmMsg) {
      const ids = getSelectedIds(name);
      if (ids.length === 0) return;
      if (!confirm(confirmMsg || `Are you sure? (${ids.length} items)`)) return;
      try {
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids })
        });
        const data = await resp.json();
        showToast(`Done! ${data.deleted || data.updated || 0} items processed.`);
        setTimeout(() => location.reload(), 500);
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // Attach checkbox listeners
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('input[type="checkbox"][name]').forEach(cb => {
        cb.addEventListener('change', updateBulkBar);
      });
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
