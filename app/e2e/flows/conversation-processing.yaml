# E2E Flow: Conversation Processing — end-to-end recording to processed conversation lifecycle
# Tests: Recording → processing state → conversation created → summary/action items generated → appears in list
# Core feature: the full lifecycle from stopping a recording to having a fully processed conversation

version: 2
name: conversation-processing
description: Conversation processing flow — record a short conversation, process it, observe processing skeleton in conversations list, wait for completion, verify summary and action items are generated, check conversation detail completeness
app: com.friend.ios.dev
evidence:
  video: true
covers:
  - app/lib/providers/capture_provider.dart
  - app/lib/pages/conversations/widgets/processing_capture.dart
  - app/lib/pages/processing_conversations/page.dart
  - app/lib/pages/conversation_detail/page.dart
  - app/lib/providers/conversation_provider.dart
preconditions:
  - auth_ready  # User signed in and onboarding completed. App shows home screen.
  - microphone_permission  # Mic permission granted.

steps:
  - id: S1
    name: Start phone mic recording
    do: "Tap the central mic button to start phone mic recording. Navigate to the ConversationCapturingPage."
    verify: true
    expect:
      - kind: interactive_count
        min: 1
    evidence:
      - screenshot: step-S1.webp

  - id: S2
    name: Record meaningful content
    do: "Speak clearly for at least 60 seconds. Discuss a topic with specific details — mention names, dates, action items (e.g., 'I need to call Alice by Thursday'). This ensures the AI summary and action item extraction have meaningful content to work with. Verify transcript segments appear."
    verify: true
    expect:
      - kind: text_visible
        values: ["Process Now"]
      - kind: interactive_count
        min: 3
    evidence:
      - screenshot: step-S2.webp
    note: "Recording content quality matters for summary generation. Mentioning specific people, dates, and tasks helps verify that action item extraction works correctly. The AI uses the full transcript to generate structured summaries."

  - id: S3
    name: Tap Process Now
    do: "Tap the 'Process Now' button (yellow/amber with stop icon). If a confirmation dialog appears ('Finished?' with 'Stop Recording?' message), tap 'Confirm'. The app navigates back to the home screen."
    verify: true
    expect:
      - kind: text_visible
        values: ["Conversations"]
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S3.webp
    note: "Process Now calls forceProcessingCurrentConversation() which: (1) stops mic, (2) drains WAL, (3) POSTs to /v1/conversations, (4) creates placeholder with status=processing, (5) navigates to home."

  - id: S4
    name: Observe processing skeleton in conversations list
    do: "On the home screen, observe the processing skeleton widget at the top of the conversations list. It appears as a dark card with placeholder shimmer blocks (no animation) showing: icon placeholder, 'Processing' badge, timestamp placeholder, and title placeholder. This indicates the conversation is being processed on the backend."
    verify: true
    expect:
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S4.webp
    note: "ProcessingConversationWidget shows a static skeleton (no shimmer animation to save battery). Only 1 processing widget shows at a time (most recent). Tapping it navigates to ProcessingConversationPage. The backend processes: transcription finalization, speaker diarization, summarization, action item extraction."

  - id: S5
    name: Wait for processing to complete
    do: "Wait 30-120 seconds for the backend to finish processing. The processing skeleton disappears and is replaced by a completed conversation card at the top of the list. The card shows: auto-generated title, timestamp, duration, and a brief summary preview."
    verify: true
    expect:
      - kind: interactive_count
        min: 5
    evidence:
      - screenshot: step-S5.webp
    note: "Processing completion arrives via WebSocket as ConversationEvent. The event contains the full ServerConversation with summary, action items, and finalized transcript. _processConversationCreated() adds it to the conversation list and removes the processing placeholder. If the event doesn't arrive within 30s, a fallback timer syncs WALs."

  - id: S6
    name: Open completed conversation
    do: "Tap the newly completed conversation card. Verify the detail page shows: conversation title, Summary tab (default) with AI-generated summary sections, and that the summary reflects the topics discussed during recording."
    verify: true
    expect:
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S6.webp
    note: "Summary is generated by the backend AI. It typically includes: overview, key points, decisions made, and follow-up items. Quality depends on transcript length and content clarity."

  - id: S7
    name: Check Action Items tab
    do: "Tap the 'Action Items' tab at the bottom. Verify action items were extracted from the conversation content. Items should include tasks mentioned during recording (e.g., 'Call Alice by Thursday'). Each item has a checkbox for completion tracking."
    verify: true
    expect:
      - kind: interactive_count
        min: 2
    evidence:
      - screenshot: step-S7.webp
    note: "Action items are extracted by AI during conversation processing. Items have: text, completion status, optional deadline, optional goal link. Items can be checked off and sync to the global Action Items tab on home screen."

  - id: S8
    name: Check Transcript tab
    do: "Tap the 'Transcript' tab. Verify the full transcript is displayed with: speaker labels, diarized segments, timestamps, and the complete text of what was spoken during recording."
    verify: true
    expect:
      - kind: interactive_count
        min: 3
    evidence:
      - screenshot: step-S8.webp
    note: "Transcript shows finalized diarized segments. Speaker labels may be generic (Speaker 0, Speaker 1) unless speech profile matched. Segments have start/end timestamps. Scroll to verify full transcript length matches recording duration."

  - id: S9
    name: Return to home
    do: "Press back to return to the home screen. Verify the conversation is in the list."
    verify: true
    expect:
      - kind: text_visible
        values: ["Conversations"]
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S9.webp
