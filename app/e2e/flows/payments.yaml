# E2E Flow: Payments — payment method setup and management
# Tests: payment methods list, Stripe/PayPal setup, active method selection

name: payments
description: Payments management — view payment methods, set active, manage Stripe Connect and PayPal
covers:
  - app/lib/pages/payments/payments_page.dart
  - app/lib/pages/payments/paypal_setup_page.dart
  - app/lib/pages/payments/stripe_connect_setup.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal

steps:
  - name: Navigate to Payments
    note: "Settings → Profile → Payment Methods"
    press: { type: gesture, hint: "settings gear icon top-right" }
    screenshot: settings-open

  - name: Open Profile settings
    press: { type: gesture, hint: "Profile row — first item in settings" }
    screenshot: profile-open

  - name: Open Payment Methods
    scroll: down
    press: { type: gesture, hint: "Payment Methods row in profile settings" }
    screenshot: payments-main

  - name: Verify payments page
    assert:
      text_visible: ["Stripe", "PayPal"]
    note: >
      PaymentMethodCard widgets showing Stripe and PayPal.
      Each card has status badge (Active, Connected, Not Connected)
      and action buttons (Manage, Set Active).
    screenshot: payments-view

  - name: Back to profile
    back: true
    back: true
    back: true
