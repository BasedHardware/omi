# E2E Flow: Settings toggle switch
# Tests: multi-level navigation, switch detection, toggle ON/OFF

name: settings-toggle
description: Navigate to Developer Settings (3 levels deep), find switch widget, toggle ON/OFF, navigate back
covers:
  - app/lib/pages/settings/settings_drawer.dart
  - app/lib/pages/settings/developer.dart
setup: normal

steps:
  - name: Navigate to settings
    press: { type: button, position: rightmost }

  - name: Scroll to Developer Settings
    scroll: down
    screenshot: settings-scrolled

  - name: Open Developer Settings
    press: { type: gesture, hint: "wide row in y=400-520 range after scroll" }
    screenshot: dev-settings

  - name: Find and toggle switch ON
    press: { type: switch, index: 0 }
    screenshot: toggle-on

  - name: Toggle switch OFF
    press: { type: switch, index: 0 }
    screenshot: toggle-off

  - name: Back to settings
    back: true

  - name: Back to home
    back: true
    assert:
      interactive_count: { min: 5 }
