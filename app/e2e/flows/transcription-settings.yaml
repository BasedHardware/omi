# E2E Flow: Transcription Settings — configure STT provider, language, and conversation timeout
# Tests: Navigate to transcription settings, toggle custom STT, select provider, configure API key, change conversation timeout
# Core feature: customizing how speech-to-text transcription works

version: 2
name: transcription-settings
description: Transcription settings flow — navigate to Settings > Transcription Settings, toggle between Omi Cloud and custom STT, select provider (OpenAI/Deepgram/local), enter API key, configure language and model, adjust conversation silence timeout
app: com.friend.ios.dev
evidence:
  video: true
covers:
  - app/lib/pages/settings/transcription_settings_page.dart
  - app/lib/pages/settings/language_settings_page.dart
  - app/lib/providers/user_provider.dart
  - app/lib/providers/capture_provider.dart
preconditions:
  - auth_ready  # User signed in and onboarding completed. App shows home screen.

steps:
  - id: S1
    name: Open settings
    do: "Tap the settings icon (gear, top-right corner) on the home screen."
    verify: true
    expect:
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S1.webp

  - id: S2
    name: Navigate to Profile > Language
    do: "Tap 'Profile' in settings menu, then tap 'Language' (text height icon). The Language Settings page opens showing: Speech & Transcription section header, App Language card (current selection), Primary Language row (current language or 'Not Set'), and Auto Translation toggle switch."
    verify: true
    expect:
      - kind: interactive_count
        min: 3
    evidence:
      - screenshot: step-S2.webp
    note: "LanguageSettingsPage shows three controls: App Language (UI locale), Primary Language (transcription language), and Auto Translation toggle. Primary Language affects WebSocket ?language= param. Auto Translation toggle controls singleLanguageMode."

  - id: S3
    name: Change primary language
    do: "Tap the Primary Language row to open the language picker bottom sheet. A scrollable list of available languages appears with checkmark on the current selection. Select a different language (e.g., 'English' or 'Spanish'). The sheet dismisses and the row updates to show the new selection."
    verify: true
    expect:
      - kind: interactive_count
        min: 3
    evidence:
      - screenshot: step-S3.webp
    note: "Language change calls homeProvider.updateUserPrimaryLanguage(code) which PATCHes /v1/users/preferences. Also calls captureProvider.onRecordProfileSettingChanged() to reconnect WebSocket with new language param. Available languages come from homeProvider.availableLanguages map."

  - id: S4
    name: Toggle auto translation
    do: "Tap the Auto Translation switch to toggle it. If enabled (switch ON), the app detects and translates multiple languages in real-time during recording. If disabled (switch OFF), transcription assumes single-language mode. A loading spinner appears briefly during the update."
    verify: true
    expect:
      - kind: interactive_count
        min: 3
    evidence:
      - screenshot: step-S4.webp
    note: "Toggle calls userProvider.setSingleLanguageMode(!value). When auto-translate is ON (singleLanguageMode=false): backend sends TranslationEvent messages via WebSocket with translated segments. When OFF: no translation events. Calls captureProvider.onTranscriptionSettingsChanged() to reconnect WebSocket."

  - id: S5
    name: Return to settings and open Transcription Settings
    do: "Press back twice (Language → Profile → Settings). Scroll down in settings and tap 'Transcription Settings'. The Transcription Settings page opens showing: source toggle (Omi Cloud vs Custom STT), and current configuration details."
    verify: true
    expect:
      - kind: interactive_count
        min: 3
    evidence:
      - screenshot: step-S5.webp
    note: "TranscriptionSettingsPage in transcription_settings_page.dart. Default source is 'Omi Cloud' (custom STT disabled). AppBar has export/import icons for config backup. Custom STT toggle switches between cloud and self-hosted transcription."

  - id: S6
    name: Toggle Custom STT source
    do: "Tap the source toggle to switch from 'Omi Cloud' to 'Custom STT'. The page expands to show: provider tabs (OpenAI, Deepgram, Local Whisper, On-Device, Custom, Custom Live), API Key input field, Language dropdown, Model dropdown, and an Advanced section toggle."
    verify: true
    expect:
      - kind: interactive_count
        min: 5
    evidence:
      - screenshot: step-S6.webp
    note: "Toggling custom STT sets _useCustomStt=true and shows provider configuration UI. Each provider has different required fields: OpenAI/Deepgram need API key, Local Whisper needs host:port, Custom needs URL, On-Device downloads a Whisper model. Device codec compatibility is checked — some codecs don't work with all providers."

  - id: S7
    name: Select a provider and enter API key
    do: "Select 'OpenAI' provider tab. Enter a test API key in the API Key field. Select language from the dropdown. The model field auto-populates with the default model for the provider. Tap 'Save' to validate and save the configuration."
    verify: true
    expect:
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S7.webp
    note: "Save validates: API key required for OpenAI/Deepgram, host+port for Local Whisper, URL for Custom. On validation success, config is saved to SharedPreferences and captureProvider.onTranscriptionSettingsChanged() reconnects WebSocket with custom STT params (?custom_stt=enabled&stt_service=custom). On failure, _validationError is set."

  - id: S8
    name: Toggle back to Omi Cloud
    do: "Toggle the source back to 'Omi Cloud' to restore default transcription. The custom STT config fields hide. This confirms the toggle works bidirectionally."
    verify: true
    expect:
      - kind: interactive_count
        min: 2
    evidence:
      - screenshot: step-S8.webp
    note: "Switching back to Omi Cloud disables custom STT. WebSocket reconnects without ?custom_stt param. The custom config is preserved in SharedPreferences for future use but not active."

  - id: S9
    name: Return to home
    do: "Press back to return to the settings page, then back to the home screen. Verify the home screen is displayed with conversations list."
    verify: true
    expect:
      - kind: text_visible
        values: ["Conversations"]
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S9.webp
