# E2E Flow: Apps Marketplace — browse, search, view app detail, install
# Tests: Navigate to Apps tab, browse featured apps, view categories, open app detail, verify capabilities
# Core feature: discovering and installing AI apps that enhance Omi conversations

version: 2
name: apps-marketplace
description: Apps Marketplace flow — browse featured apps, view categories (External Integration, Notification), open app detail page, verify app info and capabilities
app: com.friend.ios.dev
evidence:
  video: true
covers:
  - app/lib/pages/apps/page.dart
  - app/lib/pages/apps/app_detail/app_detail.dart
  - app/lib/pages/apps/widgets/app_list_item.dart
  - app/lib/providers/app_provider.dart
  - app/lib/widgets/bottom_nav_bar.dart
preconditions:
  - auth_ready  # User signed in and onboarding completed. App shows home screen.

steps:
  - id: S1
    name: Navigate to Apps tab
    do: "From the home screen, tap the Apps tab (puzzle piece icon, rightmost in bottom navigation bar). Use ADB coordinates: tap at (1020, 2320) on 1080x2400 device."
    verify: true
    expect:
      - kind: text_visible
        values: ["Featured"]
      - kind: interactive_count
        min: 5
    evidence:
      - screenshot: step-S1.webp
    note: "Bottom nav tabs: Home (house), Action Items (list-check), Memories (brain), Apps (puzzle-piece). Apps tab index is 3. ADB tap at x=1020, y=2320 reliably hits the Apps tab."

  - id: S2
    name: Verify Apps marketplace page
    do: "Verify the marketplace shows: 'Create Your Own App' banner at top, search bar ('Search 1500+ Apps') with person/download/filter icons, 'Featured' section with app cards, and category sections."
    verify: true
    expect:
      - kind: text_visible
        values: ["Create Your Own App"]
      - kind: interactive_count
        min: 6
    evidence:
      - screenshot: step-S2.webp
    note: "Marketplace layout: green Omi icon (top-left), settings icon (top-right), 'Create Your Own App' banner, search bar, Featured section with 3 apps, External Integration section, Notification section. Each app shows: icon, name, category, Install/Open button."

  - id: S3
    name: Scroll to see more categories
    do: "Scroll down the apps list to reveal additional categories (External Integration, Notification). Verify more apps are visible with Install buttons."
    verify: true
    expect:
      - kind: text_visible
        values: ["External Integration"]
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S3.webp
    note: "Use gentle ADB swipe: input swipe 540 1500 540 700 500. Categories include: Featured, External Integration (Google Drive, AHDA, BookWatch Friend), Notification (Mentor.01, Map Notes). Apps already installed show 'Open' instead of 'Install'."

  - id: S4
    name: Open app detail page
    do: "Tap on a Featured app (e.g., 'Strict Mentor') to open its detail page. Use agent-flutter: find text 'Strict Mentor' press."
    evidence:
      - screenshot: step-S4.webp
    note: "Scroll back to top first if needed. Tapping the app name or row opens the detail page. The detail page uses a full-screen route (routeToPage)."

  - id: S5
    name: Verify app detail page
    do: "Verify the app detail page shows: app icon and name, author name, Install button, stats row (Ratings, Installs, Price, Conversation type), 'About the App' section, 'Capabilities' section with tags (Chat, Conversations), 'Summary Prompt' section, 'Chat Personality' section."
    verify: true
    expect:
      - kind: text_visible
        values: ["About the App"]
      - kind: interactive_count
        min: 3
    evidence:
      - screenshot: step-S5.webp
    note: "Detail page layout: back button (top-left), share button (top-right), app image, name, author, Install/Open button, stats row (NO RATINGS/0.0, 10+ INSTALLS, Free PRICE, CONVERSATION icon), expandable sections. Install button is green, Open button appears for already-installed apps."

  - id: S6
    name: Return to Apps marketplace
    do: "Tap the back button or press Android back to return to the Apps marketplace list."
    verify: true
    expect:
      - kind: text_visible
        values: ["Featured"]
      - kind: interactive_count
        min: 5
    evidence:
      - screenshot: step-S6.webp
    note: "Back button at top-left of detail page. Use KEYCODE_BACK for reliable navigation."

  - id: S7
    name: Return to home screen
    do: "Tap the Home tab (house icon, leftmost in bottom navigation bar) to return to the home screen. Use ADB: tap at (148, 2320) on 1080x2400 device."
    verify: true
    expect:
      - kind: text_visible
        values: ["Conversations"]
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S7.webp
    note: "Home tab is at index 0 in bottom nav. ADB coordinates: (148, 2320)."
