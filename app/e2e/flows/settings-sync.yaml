# E2E Flow: Settings → Offline Sync — data synchronization
# Tests: sync page navigation, local storage, recordings, fast transfer

name: settings-sync
description: Settings → Offline Sync — view sync status, local storage, recordings list, fast transfer settings
covers:
  - app/lib/pages/settings/settings_drawer.dart
  - app/lib/pages/conversations/sync_page.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal

steps:
  - name: Open settings drawer
    press: { type: button, position: rightmost }

  - name: Open Offline Sync
    press: { type: gesture, hint: "Offline Sync row in settings" }
    screenshot: sync-page

  - name: Verify sync page
    assert:
      text_visible: ["Offline Sync"]
    note: >
      SyncPage shows: sync status, local storage info,
      recordings list, synced conversations, fast transfer settings,
      private cloud sync option.

  - name: Scroll sync page
    scroll: down
    screenshot: sync-scrolled

  - name: Back to settings
    back: true

  - name: Close settings
    back: true
