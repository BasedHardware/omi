# E2E Flow: Record conversation — phone microphone capture
# Tests: record button, capture page, stop recording

name: record-conversation
description: Tap center record button to start phone mic capture, view capturing page, stop recording
covers:
  - app/lib/pages/home/page.dart
  - app/lib/pages/conversation_capturing/page.dart
  - app/lib/widgets/bottom_nav_bar.dart
setup: normal

steps:
  - name: Verify home with record button
    assert:
      interactive_count: { min: 8 }
    note: >
      Center record button (purple microphone icon) is a GestureDetector
      at y≈770-810, centered horizontally (x≈166).
      Only visible when no Omi device is connected.
    screenshot: home-record-button

  - name: Tap record button
    press: { type: gesture, hint: "center record button — GestureDetector at y≈770, x≈166, w≈80, h≈80" }
    screenshot: capturing-page

  - name: Verify capturing page
    assert:
      interactive_count: { min: 2 }
    note: >
      ConversationCapturingPage shows: live transcript, waveform,
      stop button, timer. Recording is active.

  - name: Stop recording
    press: { type: button, hint: "stop/finish button on capture page" }
    screenshot: after-stop

  - name: Verify return to home or processing
    note: "After stopping, may show processing state or return to conversations"
    screenshot: post-recording
