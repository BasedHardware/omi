# E2E Flow: Conversation Detail — transcript, summary, action items, share
# Tests: detail tabs, transcript view, share, edit title
# Discovered by: flow-walker run10 (screen-gesture-27: 18 gesture, 4 icon, 4 inkwell, 1 textformfield)

name: conversation-detail
description: Conversation detail page — transcript/summary/action items tabs, edit title, share, audio playback
covers:
  - app/lib/pages/conversation_detail/page.dart
  - app/lib/pages/conversation_detail/compare_transcripts.dart
  - app/lib/pages/conversation_detail/share.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal
note: "Requires at least one existing conversation. Record one first if none exist."

steps:
  - name: Navigate to conversations tab (tab 0)
    press: { bottom_nav_tab: 0 }
    screenshot: conversations-list

  - name: Open first conversation
    press: { type: gesture, hint: "conversation item in list, y>400" }
    screenshot: conversation-detail

  - name: Verify conversation detail page
    assert:
      interactive_count: { min: 22, verified: "flow-walker run10: 27 elements (18 gesture, 4 icon, 4 inkwell, 1 textformfield)" }
    note: >
      Page has: back button, title (editable TextFormField), share button,
      tab row (Transcript, Summary, Action Items), content area,
      audio playback controls.

  - name: Edit conversation title
    press: { type: textformfield, hint: "title field at top" }
    fill: { type: textformfield, value: "E2E Test Conversation" }
    screenshot: title-edited

  - name: Switch to Summary tab
    press: { type: gesture, hint: "Summary tab in tab row" }
    screenshot: summary-tab

  - name: Switch to Action Items tab
    press: { type: gesture, hint: "Action Items tab in tab row" }
    screenshot: action-items-tab

  - name: Scroll detail content
    scroll: down
    screenshot: detail-scrolled

  - name: Back to conversations
    back: true
    assert:
      bottom_nav_tabs: { min: 4 }
