# E2E Flow: Settings → Device Settings — Omi device management
# Tests: device info, LED brightness, mic gain, double tap action

name: settings-device
description: Settings → Device Settings — view device info, adjust LED brightness and mic gain, configure double tap action
covers:
  - app/lib/pages/settings/settings_drawer.dart
  - app/lib/pages/settings/device_settings.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal
requires: omi_device_connected

steps:
  - name: Open settings drawer
    press: { type: button, position: rightmost }

  - name: Open Device Settings
    note: "Only visible when Omi device is connected via BLE"
    press: { type: gesture, hint: "Device Settings row in settings" }
    screenshot: device-settings

  - name: Verify device settings
    assert:
      text_visible: ["Device Settings"]
    note: >
      Device Info: Name (copy), ID (copy), Firmware (tap for update), SD Card Sync
      Hardware Info: Revision, Model, Manufacturer (all copyable)
      Customization: Double Tap action (dropdown), LED Brightness (slider 0-100%), Mic Gain (slider 0-8)
      Actions: Charging Issues, Disconnect Device, Unpair Device (Limitless only)

  - name: Tap firmware version
    press: { type: gesture, hint: "Firmware row — shows update dialog if available" }
    screenshot: firmware-check

  - name: Back from firmware
    back: true

  - name: Open double tap action picker
    press: { type: gesture, hint: "Double Tap row — shows action selection sheet" }
    screenshot: double-tap-picker

  - name: Close picker
    back: true

  - name: Adjust LED brightness
    press: { type: gesture, hint: "LED Brightness row — shows slider bottom sheet" }
    screenshot: led-brightness

  - name: Close brightness
    back: true

  - name: Adjust mic gain
    press: { type: gesture, hint: "Mic Gain row — shows slider with preset buttons" }
    screenshot: mic-gain

  - name: Close mic gain
    back: true

  - name: Scroll to actions
    scroll: down
    screenshot: device-actions

  - name: Back to settings
    back: true

  - name: Close settings
    back: true
