# E2E Flow: Phone Call Settings — verified numbers management
# Tests: settings navigation, verified number list, empty state

name: phone-calls
description: Phone call settings — view verified numbers, manage phone call configuration
covers:
  - app/lib/pages/settings/phone_call_settings_page.dart
  - app/lib/pages/settings/settings_drawer.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
  - phone_number_verified  # In-app: Settings → Phone Calls → add number → receive SMS → enter code. Requires real phone number on both platforms.
setup: normal

steps:
  - name: Navigate to Phone Calls
    note: "Settings drawer → Phone Calls item"
    press: { type: gesture, hint: "settings gear icon top-right" }
    screenshot: settings-open

  - name: Open Phone Calls setting
    scroll: down
    press: { type: gesture, hint: "Phone Calls row in settings" }
    screenshot: phone-calls-entry

  - name: Verify phone call settings page
    assert:
      interactive_count: { min: 1 }
    note: >
      PhoneCallSettingsPage shows "Your Verified Numbers" list.
      Each number has phone icon, number text, verification timestamp,
      and delete button. Empty state when no numbers verified.
    screenshot: phone-call-settings

  - name: Back to settings
    back: true

  - name: Back to home
    back: true
