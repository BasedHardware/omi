# E2E Flow: Home screen navigation
# Tests: snapshot, settings button, scroll, back navigation

name: home-navigation
description: Home screen snapshot, settings gear press, scroll in settings, back to home
covers:
  - app/lib/pages/home/page.dart
  - app/lib/pages/settings/settings_drawer.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal

steps:
  - name: Verify home screen
    assert:
      text_visible: ["Conversations"]
    screenshot: home

  - name: Press settings gear (rightmost button in top bar)
    press: { type: button, position: rightmost }
    assert:
      text_visible: ["Profile", "Notifications", "Plan & Usage"]
    screenshot: settings

  - name: Scroll down in settings
    scroll: down
    assert:
      text_visible: ["Developer Settings"]
    screenshot: settings-scrolled

  - name: Back to home
    back: true
    assert:
      text_visible: ["Conversations"]
    screenshot: final
