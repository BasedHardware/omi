# E2E Flow: Memory Review — browse, edit, categorize memories
# Tests: memory list, quick edit sheet, category management
# Source: feature vector gap #1 (priority 12, memory layer — highest priority gap)

name: memory-review
description: Memory review — browse memory list, open quick edit sheet, edit content, manage categories
covers:
  - app/lib/pages/memories/page.dart
  - app/lib/pages/memories/widgets/memory_edit_sheet.dart
  - app/lib/pages/memories/widgets/memory_management_sheet.dart
  - app/lib/pages/memories/category_memories_page.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal
note: "Requires existing memories from processed conversations. Record a conversation first if none exist."

steps:
  - name: Navigate to Memories tab
    press: { bottom_nav_tab: 2 }
    screenshot: memories-tab

  - name: Verify memories page has content
    assert:
      interactive_count: { min: 20, verified: "flow-walker run11: 25 elements" }
    note: "Memory list with category chips at top, search bar, graph button, management button, FAB"

  - name: Tap a memory item to review
    press: { type: gesture, hint: "memory item in list, below category chips" }
    screenshot: memory-edit-sheet

  - name: Verify memory edit sheet
    assert:
      interactive_count: { min: 3, hint: "edit fields, category selector, save/delete buttons" }
    note: >
      MemoryEditSheet bottom sheet shows: memory content (editable),
      category chip selector, save button, delete button.
      This is the primary review interface for auto-created memories.

  - name: Edit memory content (if editable field exists)
    fill: { type: textfield, value: "Reviewed and updated via E2E" }
    screenshot: memory-edited

  - name: Close edit sheet
    back: true

  - name: Open category management
    press: { type: gesture, hint: "management/settings icon button near search bar" }
    screenshot: category-management

  - name: Verify category management sheet
    assert:
      interactive_count: { min: 3, hint: "category list with edit/delete actions" }
    note: "MemoryManagementSheet — manage category names, reorder, delete unused categories"
    screenshot: category-sheet

  - name: Close category management
    back: true

  - name: Filter by category chip
    press: { type: gesture, hint: "category chip at top of memory list, first chip after 'All'" }
    screenshot: filtered-by-category

  - name: Tap filtered memory to review
    press: { type: gesture, hint: "memory item in filtered list" }
    screenshot: filtered-memory-detail

  - name: Close detail
    back: true

  - name: Return to home
    press: { bottom_nav_tab: 0 }
    assert:
      bottom_nav_tabs: { min: 4 }
