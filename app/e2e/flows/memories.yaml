# E2E Flow: Memories tab — browse, search, graph, categories
# Tests: memory list, search, graph view, category filter, add/edit memory

name: memories
description: Memories tab — search memories, view graph, filter by category, add memory, quick edit
covers:
  - app/lib/pages/memories/page.dart
  - app/lib/pages/memories/widgets/memory_graph_page.dart
  - app/lib/pages/memories/widgets/memory_edit_sheet.dart
  - app/lib/pages/memories/widgets/memory_management_sheet.dart
  - app/lib/pages/memories/category_memories_page.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal

steps:
  - name: Navigate to Memories tab
    press: { bottom_nav_tab: 2 }
    screenshot: memories-tab

  - name: Verify memories page
    assert:
      interactive_count: { min: 20, verified: "flow-walker run10: 25 elements (15 gesture, 4 icon, 5 inkwell, 1 textfield)" }
    note: >
      Top area has: search bar, graph button, management button.
      FAB (heroTag: memories_fab) at bottom right for adding memories.
      Memory list below with category chips.
    screenshot: memories-view

  - name: Search for a memory
    press: { type: textfield, hint: "SearchBar at top" }
    fill: { type: textfield, value: "test" }
    screenshot: memories-search

  - name: Clear search
    press: { type: gesture, hint: "clear/X button in search bar trailing" }

  - name: Open memory graph
    press: { type: gesture, hint: "graph icon button near search bar" }
    screenshot: memory-graph

  - name: Back from graph
    back: true

  - name: Open memory management
    press: { type: gesture, hint: "management/settings icon button near search bar" }
    screenshot: memory-management

  - name: Memory management sheet
    assert:
      interactive_count: { min: 3, hint: "category filters and action buttons" }
    note: "MemoryManagementSheet — shows category filters and bulk actions"
    screenshot: management-sheet

  - name: Close management sheet
    back: true

  - name: Tap FAB to add memory
    press: { type: button, hint: "FloatingActionButton — add memory" }
    screenshot: add-memory-dialog

  - name: Close add memory dialog
    back: true

  - name: Tap a memory item (if any exist)
    note: "Opens MemoryEditSheet for quick editing"
    press: { type: gesture, hint: "memory item in list" }
    screenshot: memory-edit

  - name: Close edit sheet
    back: true

  - name: Return to home tab
    press: { bottom_nav_tab: 0 }
