# E2E Flow: Memories tab — browse, search, graph, categories
# Tests: memory list, search, graph view, category filter, add/edit memory

name: memories
description: Memories tab — search memories, view graph, filter by category, add memory, quick edit
covers:
  - app/lib/pages/memories/page.dart
  - app/lib/pages/memories/widgets/memory_graph_page.dart
  - app/lib/pages/memories/widgets/memory_edit_sheet.dart
  - app/lib/pages/memories/widgets/memory_management_sheet.dart
  - app/lib/pages/memories/category_memories_page.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal

steps:
  - name: Navigate to Memories tab
    press: { bottom_nav_tab: 2 }
    screenshot: memories-tab

  - name: Verify memories page
    assert:
      text_visible: ["Search memories..."]
    note: >
      Top area has: search bar, graph button, management button.
      FAB (heroTag: memories_fab) at bottom right for adding memories.
      Memory list below with category chips.
    screenshot: memories-view

  - name: Return to home tab
    press: { bottom_nav_tab: 0 }
    assert:
      text_visible: ["Conversations"]
