# E2E Flow: Bottom tab navigation
# Tests: bottom nav bar InkWell detection, 4-tab switching, scroll

name: tab-navigation
description: Bottom nav bar detection, switch between 4 tabs, scroll in tab, return to home
covers:
  - app/lib/pages/home/page.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal

steps:
  - name: Verify home tab and nav bar
    assert:
      text_visible: ["Today"]
      bottom_nav_tabs: { min: 4 }
    screenshot: tab-home

  - name: Switch to Conversations tab
    press: { bottom_nav_tab: 1 }
    assert:
      text_visible: ["Conversations"]
    screenshot: tab-conversations

  - name: Switch to Memories tab
    press: { bottom_nav_tab: 2 }
    assert:
      text_visible: ["Search memories..."]
    screenshot: tab-memories

  - name: Scroll in current tab
    scroll: down

  - name: Switch to Apps tab
    press: { bottom_nav_tab: 3 }
    assert:
      text_visible: ["Featured"]
    screenshot: tab-apps

  - name: Return to home tab
    press: { bottom_nav_tab: 0 }
    assert:
      text_visible: ["Today"]
    screenshot: final
