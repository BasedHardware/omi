# E2E Flow: Speaker Identification (People) — add/manage speakers
# Tests: navigate to people page, add person, view speech samples
# Source: feature vector gap #4 (priority 8, understand layer)

name: speaker-identification
description: Identifying Others (People) — add person with name, view speech samples, delete person, help dialog
covers:
  - app/lib/pages/settings/people.dart
  - app/lib/providers/people_provider.dart
  - app/lib/pages/settings/profile.dart
prerequisites:
  - auth_ready  # User completed real sign-in (Google/Apple) and onboarding. Android: `bash setup.sh android`. iOS: `bash setup.sh ios`. App must show home screen.
setup: normal

steps:
  - name: Open settings drawer
    press: { type: button, position: rightmost, hint: "IconButton — gear icon, rightmost in top bar" }

  - name: Open Profile
    press: { type: gesture, hint: "first wide settings row — Profile, y≈150-200" }

  - name: Scroll to Voice & People section
    scroll: down
    screenshot: profile-voice-people

  - name: Open Identifying Others
    press: { type: gesture, hint: "Identifying Others row in Voice & People section" }
    screenshot: people-page

  - name: Verify people page
    assert:
      interactive_count: { min: 1, hint: "add button in app bar (+ icon)" }
    note: >
      AppBar has: back button, title "People", add (+) button, help (?) button.
      Empty state shows centered icon with hint: "Create a new person and train
      Omi to recognize their speech too!" Populated state shows list of people
      with name, speech samples, and delete button.

  - name: Tap add person button
    press: { type: button, hint: "add (+) icon button in app bar" }
    screenshot: add-person-dialog

  - name: Verify add person dialog
    assert:
      interactive_count: { min: 2, hint: "name text field + Add/Cancel buttons" }
    note: "Dialog has: name TextField (2-40 chars), Cancel and Add buttons"

  - name: Fill person name
    fill: { type: textfield, value: "Test Speaker" }
    screenshot: person-name-filled

  - name: Cancel dialog (don't create in test)
    back: true
    note: "Press back to dismiss without creating. In real use, tap Add to create."

  - name: Back to profile
    back: true

  - name: Back to settings
    back: true

  - name: Close settings drawer
    back: true
    assert:
      bottom_nav_tabs: { min: 4 }
