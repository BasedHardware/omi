# E2E Flow: Onboarding — full new-user journey
# Tests: Auth → Name → Language → Found Omi → Permissions → User Review → Speech Profile → Knowledge Graph → Complete
# Note: Steps 6-7 (Welcome/FindDevices) are skipped by the app. UserReview jumps to SpeechProfile.

version: 2
name: onboarding
description: Full onboarding flow from auth through name, language, permissions, speech profile, to completion
app: com.friend.ios.dev
evidence:
  video: true
covers:
  - app/lib/pages/onboarding/wrapper.dart
  - app/lib/pages/onboarding/auth.dart
  - app/lib/pages/onboarding/name/name_widget.dart
  - app/lib/pages/onboarding/primary_language/primary_language_widget.dart
  - app/lib/pages/onboarding/found_omi/found_omi_widget.dart
  - app/lib/pages/onboarding/permissions/permissions_widget.dart
  - app/lib/pages/onboarding/user_review_page.dart
  - app/lib/pages/onboarding/speech_profile_widget.dart
  - app/lib/pages/onboarding/knowledge_graph_step.dart
  - app/lib/pages/onboarding/complete_screen.dart
preconditions:
  - Fresh app state — clear data or reinstall. Must show auth screen after sign-out.
  - Must be signed in (auth completed via login flow first)

steps:
  - id: S1
    name: Name entry page
    do: "Verify name entry page is showing after auth. Fill name field with 'Test User' and tap Continue."
    expect:
      - kind: interactive_count
        min: 2
    evidence:
      - screenshot: step-S1.png

  - id: S2
    name: Primary language selection
    do: "Verify language selection page. English should be pre-selected or first in the list. Tap to select English, then tap Continue/Confirm."
    expect:
      - kind: text_visible
        values: ["Tell us your primary language"]
    evidence:
      - screenshot: step-S2.png

  - id: S3
    name: Found Omi / How did you hear about us
    do: "Verify the 'How did you hear about Omi?' page. Tap Skip or select an option and Continue."
    evidence:
      - screenshot: step-S3.png

  - id: S4
    name: Permissions request
    do: "Verify permissions page requesting microphone, notifications, location. Grant or skip permissions."
    evidence:
      - screenshot: step-S4.png
    note: "System dialogs may appear. Use agent-flutter dismiss or ADB to handle permission prompts."

  - id: S5
    name: User review page
    do: "Verify the user review/survey page (Loving Omi?). Tap Skip or provide feedback and Continue."
    evidence:
      - screenshot: step-S5.png
    note: "This page skips directly to Speech Profile (steps 6-7 unused)"

  - id: S6
    name: Speech profile setup
    do: "Verify speech profile page. Tap Skip to skip audio capture."
    evidence:
      - screenshot: step-S6.png
    note: "Can skip without recording. Skip goes to Knowledge Graph."

  - id: S7
    name: Knowledge graph preview
    do: "Verify knowledge graph / memory graph preview page. Tap Continue or Skip."
    evidence:
      - screenshot: step-S7.png

  - id: S8
    name: Onboarding complete
    do: "Verify completion screen showing 'You are all set!' and 'Start Using Omi' button. Tap 'Start Using Omi'."
    expect:
      - kind: text_visible
        values: ["You are all set!"]
    evidence:
      - screenshot: step-S8.png

  - id: S9
    name: Home screen
    do: "Verify landing on home screen after completing onboarding"
    expect:
      - kind: interactive_count
        min: 4
    evidence:
      - screenshot: step-S9.png
    note: "Home screen with bottom nav bar (4 tabs) confirms onboarding complete"
