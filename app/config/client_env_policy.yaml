      "revocation": "Rotate in PostHog, update the mobile_public_config CI group, and rebuild affected releases."
    },
    "PUBLIC_INTERCOM_IOS_API_KEY": {
      "owner": "support",
      "purpose": "Public Intercom iOS SDK key",
