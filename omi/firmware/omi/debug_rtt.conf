# Debug overlay for AAD bring-up.
# Routes logs + console to SEGGER RTT so they can be read over the debugger
# with no UART wiring. APPROTECT is left unlocked (default) for SWD access.

CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=16384
CONFIG_LOG_BACKEND_RTT_MODE_BLOCK=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_DEFAULT_LEVEL=3

# Shorten VAD hold so the device drops into hardware AAD after 3s of silence
# (default 10s) for faster test iteration.
CONFIG_OMI_VAD_HOLD_MS=3000
