#
# SD Card Support (all devices required)
#

CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y

# LittleFS for SD NAND (power-loss safe, no FAT dirty-bit issues)
CONFIG_FILE_SYSTEM_LITTLEFS=y

# FAT disabled - SD NAND + FATFS is unstable (no wear leveling, power-loss unsafe)
# CONFIG_FAT_FILESYSTEM_ELM is not set
# CONFIG_FS_FATFS_MOUNT_MKFS is not set
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_DISK_DRIVER_SDMMC=y
